<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#22a85e" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#0e1116" media="(prefers-color-scheme: dark)">
<title>LiveScore · Sports Day 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Archivo:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#eef1f4; --surface:#ffffff; --surface2:#f6f8fa;
    --ink:#161b22; --muted:#8b95a1; --line:#e6eaee;
    --green:#22a85e; --green-d:#0f7a40; --orange:#f47b20; --orange-d:#d96712;
    --red:#e23b3b; --yellow:#e3a900; --teal:#36b6c4;
  }
  /* Auto dark mode — follows the device (phone/PC) system theme, no toggle needed. */
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#0e1116; --surface:#181d24; --surface2:#222932;
      --ink:#e8edf2; --muted:#93a0ad; --line:#2b323c;
      --green:#2bbf6c; --green-d:#46d889; --orange:#f9863a; --orange-d:#ffa05a;
      --red:#ff6060; --yellow:#f0c33c; --teal:#3fc3d2;
    }
    /* keep the elevated surfaces readable: soften the light-mode shadows on dark */
    .fixture,.panel,.md-scoreboard{box-shadow:0 1px 3px rgba(0,0,0,.4)!important;}
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{background:var(--bg);color:var(--ink);font-family:'Inter',system-ui,sans-serif;min-height:100vh;}
  #app{max-width:620px;margin:0 auto;background:var(--bg);min-height:100vh;position:relative;}

  /* TOP BAR */
  .topbar{background:var(--green);color:#fff;display:flex;align-items:center;justify-content:space-between;
    padding:14px 16px;position:sticky;top:0;z-index:50;box-shadow:0 2px 10px rgba(0,0,0,.08);}
  .brand{font-family:'Archivo',sans-serif;font-weight:800;font-size:19px;letter-spacing:.5px;}
  .brand span{font-weight:600;opacity:.85;}
  .admin-chip{background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.35);color:#fff;
    font-size:13px;font-weight:700;padding:6px 12px;border-radius:20px;cursor:pointer;min-width:38px;}
  .admin-chip.on{background:#fff;color:var(--green-d);}

  .screen{display:none;}
  .screen.active{display:block;}

  /* HERO */
  .hero{padding:20px 16px 8px;}
  .hero-title{font-family:'Archivo',sans-serif;font-size:26px;font-weight:800;letter-spacing:-.3px;}
  .hero-title b{color:var(--green);}
  .hero-sub{color:var(--muted);font-size:13px;margin-top:2px;display:flex;align-items:center;gap:6px;}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block;animation:pulse 1.4s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}

  /* TABS */
  .tabbar{display:flex;gap:6px;padding:10px 16px 4px;position:sticky;top:54px;background:var(--bg);z-index:40;}
  .tabbtn{flex:1;padding:9px 4px;font-size:13px;font-weight:700;border-radius:10px;border:none;cursor:pointer;
    background:var(--surface);color:var(--muted);box-shadow:0 1px 2px rgba(0,0,0,.04);transition:.15s;}
  .tabbtn.active{background:var(--green);color:#fff;}

  .list-body{padding:8px 16px 40px;}
  .sec-label{font-size:11px;font-weight:800;letter-spacing:1.4px;text-transform:uppercase;color:var(--muted);
    margin:18px 4px 8px;display:flex;align-items:center;gap:8px;}
  .sec-label::after{content:'';flex:1;height:1px;background:var(--line);}
  .sec-label.ko{color:var(--orange);}

  /* FIXTURE ROW */
  .fixture{background:var(--surface);border-radius:14px;padding:11px 14px;margin-bottom:10px;cursor:pointer;
    box-shadow:0 1px 3px rgba(20,30,45,.06);transition:transform .08s,box-shadow .15s;}
  .fixture:active{transform:scale(.99);}
  .fx-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
  .fx-live{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:800;color:var(--green);letter-spacing:.5px;}
  .fx-live b{font-family:'Archivo';font-variant-numeric:tabular-nums;}
  .fx-ft{font-size:11px;font-weight:800;color:var(--muted);background:var(--surface2);padding:2px 8px;border-radius:5px;letter-spacing:.5px;}
  .fx-up{font-size:11px;font-weight:700;color:var(--muted);}
  .fx-field{font-size:10px;color:var(--muted);background:var(--surface2);padding:2px 7px;border-radius:5px;}
  .fx-row{display:flex;align-items:center;gap:8px;}
  .fx-team{flex:1;display:flex;align-items:center;gap:9px;min-width:0;}
  .fx-team.away{flex-direction:row-reverse;text-align:right;}
  .fx-crest{width:30px;height:30px;flex-shrink:0;}
  .fx-crest svg{width:100%;height:100%;display:block;}
  .fx-name{font-size:13.5px;font-weight:600;line-height:1.15;overflow:hidden;}
  .fx-score{font-family:'Archivo';font-weight:800;font-size:22px;flex-shrink:0;display:flex;gap:6px;font-variant-numeric:tabular-nums;}
  .fx-score span{color:var(--muted);font-weight:600;}
  .fx-time{font-family:'Archivo';font-weight:700;font-size:14px;color:var(--muted);flex-shrink:0;min-width:42px;text-align:center;}

  /* STANDINGS / SCORERS */
  .panel{background:var(--surface);border-radius:14px;padding:6px 4px;margin-bottom:14px;box-shadow:0 1px 3px rgba(20,30,45,.06);overflow:hidden;}
  table.tbl{width:100%;border-collapse:collapse;font-size:12.5px;}
  .tbl th{font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);font-weight:800;padding:8px 3px;text-align:center;}
  .tbl th.l{text-align:left;padding-left:10px;}
  .tbl td{padding:9px 3px;text-align:center;border-top:1px solid var(--line);}
  .tbl td.l{text-align:left;padding-left:10px;font-weight:600;}
  .tbl .nm{display:flex;align-items:center;gap:8px;}
  .tbl .nm svg{width:20px;height:20px;}
  .tbl .pos{color:var(--muted);width:20px;}
  .tbl tr.q td.pos{color:var(--green);font-weight:800;}
  .tbl tr.q td.l{box-shadow:inset 3px 0 0 var(--green);}
  .tbl .pts{font-family:'Archivo';font-weight:800;color:var(--green);}
  .q-note{font-size:11px;color:var(--muted);padding:8px 10px 4px;}
  .sc-rank{font-family:'Archivo';font-weight:800;width:34px;}
  .sc-goals{font-family:'Archivo';font-weight:800;font-size:18px;color:var(--green);width:46px;}
  .sc-team{color:var(--muted);font-size:11px;}
  .sc-top td{background:rgba(34,168,94,.06);}
  .empty{color:var(--muted);font-size:13px;padding:18px;text-align:center;}

  /* MATCH DETAIL */
  #match-body{padding-bottom:152px;}
  .md-top{color:#fff;padding:12px 14px;position:sticky;top:0;z-index:30;}
  .md-back{background:none;border:none;color:#fff;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:4px;}
  .md-scoreboard{background:var(--surface);display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:6px;
    padding:18px 14px;border-bottom:1px solid var(--line);}
  .md-team{display:flex;flex-direction:column;align-items:center;gap:6px;text-align:center;}
  .md-crest{width:46px;height:46px;}
  .md-crest svg{width:100%;height:100%;}
  .md-tname{font-size:12px;font-weight:700;line-height:1.2;max-width:120px;}
  .md-scorewrap{display:flex;align-items:center;gap:12px;}
  .md-score{font-family:'Archivo';font-weight:900;font-size:46px;line-height:1;font-variant-numeric:tabular-nums;}
  .md-v{font-family:'Archivo';font-weight:700;font-size:20px;color:var(--muted);}
  .md-statusbar{background:#2c333c;color:#fff;font-size:12.5px;font-weight:700;letter-spacing:.5px;
    text-align:center;padding:9px;}

  /* TIMELINE */
  .timeline{position:relative;padding:18px 12px 22px;}
  .timeline::before{content:'';position:absolute;top:0;bottom:0;left:50%;width:2px;background:var(--line);transform:translateX(-50%);}
  .tl-empty{position:relative;text-align:center;color:var(--muted);font-size:13px;padding:30px 0;}
  .tl-row{display:grid;grid-template-columns:1fr 56px 1fr;align-items:center;margin-bottom:16px;position:relative;}
  .tl-side{display:flex;align-items:center;gap:8px;min-width:0;}
  .tl-side.left{justify-content:flex-end;text-align:right;}
  .tl-side.right{justify-content:flex-start;text-align:left;}
  .tl-text .tl-type{font-size:11px;font-weight:800;letter-spacing:.5px;}
  .tl-text .tl-name{font-size:12.5px;font-weight:600;color:var(--ink);margin-top:1px;}
  .tl-icon{font-size:15px;line-height:1;flex-shrink:0;}
  .tl-center{display:flex;justify-content:center;}
  .tl-min{font-family:'Archivo';font-weight:800;font-size:12px;background:var(--surface);
    border:2px solid var(--green);color:var(--green);border-radius:50%;width:34px;height:34px;
    display:flex;align-items:center;justify-content:center;font-variant-numeric:tabular-nums;z-index:1;}
  .tl-edit{background:var(--surface2);border:1px solid var(--line);color:var(--muted);font-size:12px;cursor:pointer;padding:3px 7px;border-radius:6px;line-height:1;}
  .tl-edit:hover{color:var(--green-d);border-color:var(--green);}
  .ee-del{border-color:var(--red)!important;color:var(--red)!important;}

  /* DOCK (console + footer) */
  .md-dock{position:fixed;bottom:0;left:0;right:0;z-index:35;}
  .dock-inner{max-width:620px;margin:0 auto;}
  .console{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:1px;background:var(--line);}
  .act{border:none;padding:16px 4px;font-size:13px;font-weight:800;cursor:pointer;color:#fff;}
  .act-goal{background:var(--green);}
  .act-goal:active{background:var(--green-d);}
  .act-evt{background:#3a424c;}
  .act-evt:active{background:#2c333c;}
  .md-footer{background:#1f262e;color:#fff;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:8px 14px;}
  .mf-clock{text-align:center;}
  .mf-status{font-size:10px;font-weight:700;letter-spacing:1.5px;color:#9aa6b2;}
  .mf-time{font-family:'Archivo';font-weight:800;font-size:26px;line-height:1;font-variant-numeric:tabular-nums;}
  .mf-side{display:flex;}
  .mf-side.right{justify-content:flex-end;}
  .mf-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;font-size:13px;font-weight:700;
    padding:8px 16px;border-radius:8px;cursor:pointer;}
  .mf-btn.start{background:var(--green);border-color:var(--green);}
  .mf-btn.stop{background:var(--orange);border-color:var(--orange);}

  /* SHEET / MODAL */
  .sheet-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;align-items:flex-end;justify-content:center;}
  .sheet-overlay.open{display:flex;}
  .sheet{background:var(--surface);width:100%;max-width:620px;border-radius:18px 18px 0 0;padding:8px 18px 26px;
    max-height:86vh;overflow-y:auto;animation:slideup .2s ease;}
  @keyframes slideup{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .sheet-handle{width:40px;height:4px;background:var(--line);border-radius:3px;margin:6px auto 14px;}
  .sheet-title{font-family:'Archivo';font-weight:800;font-size:18px;margin-bottom:16px;}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:11px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
  .field select,.field input{width:100%;background:var(--surface2);border:1.5px solid var(--line);color:var(--ink);
    border-radius:10px;padding:12px;font-family:'Inter';font-size:15px;outline:none;}
  .field select:focus,.field input:focus{border-color:var(--green);}
  .btn-primary{width:100%;padding:14px;background:var(--green);color:#fff;font-size:16px;font-weight:800;
    border:none;border-radius:10px;cursor:pointer;}
  .btn-primary:active{background:var(--green-d);}
  .btn-secondary{width:100%;padding:12px;background:var(--surface2);color:var(--ink);font-size:14px;font-weight:700;
    border:1.5px solid var(--line);border-radius:10px;cursor:pointer;margin-top:8px;}
  .backup-row{display:flex;gap:8px;}
  .backup-row .btn-secondary{margin-top:0;}
  .save-state{font-size:11px;color:var(--muted);text-align:center;margin-bottom:12px;}
  .save-state b{color:var(--green);}
  .err{color:var(--red);font-size:12px;margin-bottom:10px;}


  /* LINEUP / PITCH */
  .view-toggle{display:flex;gap:6px;padding:12px 14px 6px;background:var(--surface);}
  .vt{flex:1;padding:9px;border:none;border-radius:9px;font-weight:700;font-size:13px;background:var(--surface2);color:var(--muted);cursor:pointer;}
  .vt.on{background:var(--ink);color:#fff;}
  .pitch{position:relative;display:flex;flex-direction:column;padding:6px;overflow:hidden;
    background-color:#249150;background-image:repeating-linear-gradient(#249150 0 30px,#2c9c58 30px 60px);min-height:480px;}
  .pitch::before{content:'';position:absolute;left:8px;right:8px;top:50%;height:2px;background:rgba(255,255,255,.35);}
  .pitch::after{content:'';position:absolute;left:50%;top:50%;width:78px;height:78px;border:2px solid rgba(255,255,255,.35);border-radius:50%;transform:translate(-50%,-50%);}
  .pbox{position:absolute;left:50%;transform:translateX(-50%);width:54%;height:50px;border:2px solid rgba(255,255,255,.3);z-index:0;}
  .pbox.top{top:-2px;border-top:none;}
  .pbox.bot{bottom:-2px;border-bottom:none;}
  .phalf{flex:1;display:flex;flex-direction:column;justify-content:space-around;position:relative;z-index:1;padding:14px 0;}
  .prow{display:flex;justify-content:space-around;align-items:center;}
  .ptoken{display:flex;flex-direction:column;align-items:center;gap:4px;width:64px;}
  .phalf.away .ptoken{flex-direction:column-reverse;}
  .pt-shirt{position:relative;width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-family:'Archivo';font-weight:800;font-size:13px;box-shadow:0 2px 6px rgba(0,0,0,.35);}
  .pt-shirt.home{background:#ffffff;color:#15321e;}
  .pt-shirt.away{background:#13233f;color:#fff;}
  .pt-shirt.off{opacity:.4;}
  .pt-name{font-size:9.5px;font-weight:700;color:#fff;text-align:center;text-shadow:0 1px 2px rgba(0,0,0,.6);line-height:1.12;max-width:74px;overflow-wrap:anywhere;}
  .pt-goal{margin-right:1px;}
  .pt-card{position:absolute;top:-2px;right:-3px;width:8px;height:11px;border-radius:2px;display:inline-block;}
  .pt-card.yel{background:var(--yellow);}
  .pt-card.red{background:var(--red);}
  .pt-sub{position:absolute;bottom:-4px;left:-4px;font-size:12px;font-weight:900;}
  .pt-sub.off{color:#ff5a5a;text-shadow:0 0 2px #000;}
  .lineup-note{background:#2c333c;color:#cdd6df;font-size:11px;font-weight:700;letter-spacing:.5px;text-align:center;padding:7px;}
  .bench-wrap{background:var(--surface);padding:14px;}
  .sub-bar{display:flex;gap:8px;margin-bottom:14px;}
  .sub-bar button{flex:1;padding:11px;border:1.5px solid var(--green);background:rgba(34,168,94,.08);color:var(--green-d);font-weight:700;font-size:12.5px;border-radius:10px;cursor:pointer;}
  .bench-head{font-size:11px;font-weight:800;letter-spacing:1.4px;text-transform:uppercase;color:var(--muted);margin-bottom:12px;}
  .bench-cols{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .bteam{font-size:11px;font-weight:800;color:var(--ink);margin-bottom:10px;display:flex;align-items:center;gap:6px;}
  .bteam svg{width:18px;height:18px;flex-shrink:0;}
  .bteam span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .bcol.away{text-align:right;}
  .bcol.away .bteam{flex-direction:row-reverse;}
  .bitem{display:flex;align-items:center;gap:8px;padding:5px 0;}
  .bcol.away .bitem{flex-direction:row-reverse;}
  .bava{width:26px;height:26px;border-radius:50%;background:var(--surface2);border:1px solid var(--line);font-size:9px;font-weight:800;color:var(--muted);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .binfo{min-width:0;}
  .bname{font-size:12px;font-weight:600;line-height:1.2;overflow-wrap:anywhere;}
  .bnum{font-size:10px;color:var(--muted);}
  .bon{color:var(--green);font-size:12px;font-weight:900;}
  .bench-empty{font-size:12px;color:var(--muted);}


  .lu-tools{display:flex;gap:8px;margin-bottom:8px;}
  .lu-tools button{flex:1;padding:11px;border:1.5px solid var(--line);background:var(--surface2);color:var(--ink);font-weight:700;font-size:12.5px;border-radius:10px;cursor:pointer;}
  .lu-slot{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
  .lu-pos{width:40px;flex-shrink:0;font-size:10px;font-weight:800;letter-spacing:.5px;color:var(--green);}
  .lu-slot select{flex:1;background:var(--surface2);border:1.5px solid var(--line);color:var(--ink);border-radius:10px;padding:11px;font-family:'Inter';font-size:14px;}
  .lu-bench{font-size:12.5px;color:var(--muted);margin-top:12px;line-height:1.6;}
  .lu-bench b{color:var(--ink);font-weight:600;}

  /* TOAST */
  .toast{position:fixed;bottom:170px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--ink);color:#fff;
    font-weight:700;font-size:13.5px;padding:11px 22px;border-radius:24px;z-index:2000;transition:transform .3s,opacity .3s;
    opacity:0;visibility:hidden;pointer-events:none;}
  .toast.show{transform:translateX(-50%) translateY(0);opacity:.97;visibility:visible;}
  /* REARRANGE / SCHEDULE EDITOR */
  .rr-setlabel{font-size:11px;font-weight:800;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);margin:16px 2px 8px;}
  .rr-row{display:flex;align-items:center;gap:8px;background:var(--surface2);border:1.5px solid var(--line);border-radius:11px;padding:8px 10px;margin-bottom:7px;}
  .rr-row.moved{border-color:var(--orange);background:rgba(244,123,32,.06);}
  .rr-arrows{display:flex;flex-direction:column;gap:3px;}
  .rr-arrows button{width:30px;height:22px;border:1px solid var(--line);background:var(--surface);color:var(--ink);border-radius:6px;font-size:11px;font-weight:800;cursor:pointer;line-height:1;padding:0;}
  .rr-arrows button:disabled{opacity:.3;cursor:default;}
  .rr-arrows button:active:not(:disabled){background:var(--green);color:#fff;border-color:var(--green);}
  .rr-main{flex:1;min-width:0;}
  .rr-no{font-size:10px;font-weight:800;letter-spacing:.6px;color:var(--green-d);text-transform:uppercase;}
  .rr-teams{font-size:13px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .rr-time{width:88px;flex-shrink:0;background:var(--surface);border:1.5px solid var(--line);color:var(--ink);
    border-radius:8px;padding:9px 6px;font-family:'Inter';font-size:12.5px;text-align:center;outline:none;}
  .rr-time:focus{border-color:var(--green);}
  .rr-field{width:104px;flex-shrink:0;background:var(--surface);border:1.5px solid var(--line);color:var(--ink);
    border-radius:8px;padding:9px 4px;font-family:'Inter';font-size:11.5px;text-align:center;outline:none;cursor:pointer;}
  .rr-field:focus{border-color:var(--green);}
  .rr-field.changed{border-color:var(--orange);color:var(--orange-d);font-weight:700;}
  .rr-pending{font-size:12px;color:var(--orange-d);font-weight:700;text-align:center;margin:6px 0 10px;}
  .rr-diff{background:var(--surface2);border-radius:11px;padding:12px 14px;margin-bottom:12px;font-size:13px;line-height:1.6;}
  .rr-diff b{color:var(--green-d);}
  .rr-diff .arrow{color:var(--orange-d);font-weight:800;}
  .rr-logitem{background:var(--surface2);border-radius:10px;padding:10px 12px;margin-bottom:8px;font-size:12.5px;line-height:1.5;}
  .rr-logitem .rr-logmeta{font-size:10.5px;color:var(--muted);font-weight:700;letter-spacing:.4px;margin-bottom:4px;}
  .rr-note-input{width:100%;background:var(--surface2);border:1.5px solid var(--line);color:var(--ink);border-radius:10px;padding:11px;font-family:'Inter';font-size:14px;outline:none;resize:vertical;min-height:64px;}
  .rr-note-input:focus{border-color:var(--green);}
  /* SQUAD NUMBER EDITOR */
  .num-row{display:flex;align-items:center;gap:10px;background:var(--surface2);border:1.5px solid var(--line);border-radius:11px;padding:8px 12px;margin-bottom:7px;}
  .num-name{flex:1;font-size:14px;font-weight:600;color:var(--ink);min-width:0;overflow-wrap:anywhere;line-height:1.25;}
  .pname-input{flex:1;min-width:0;background:var(--surface);border:1.5px solid var(--line);color:var(--ink);border-radius:8px;padding:10px 11px;font-family:'Inter';font-size:14px;outline:none;}
  .pname-input:focus{border-color:var(--green);}
  .pname-input.dup{border-color:var(--red);background:rgba(226,59,59,.10);}
  .pe-del{flex-shrink:0;width:30px;height:36px;border:1px solid var(--line);background:var(--surface);color:var(--red);border-radius:8px;font-size:13px;font-weight:800;cursor:pointer;line-height:1;padding:0;}
  .pe-del:active{background:var(--red);color:#fff;border-color:var(--red);}
  .pe-add{width:100%;background:var(--surface2);border:1.5px dashed var(--line);color:var(--green-d);border-radius:11px;padding:11px;font-family:'Inter';font-weight:700;font-size:13.5px;cursor:pointer;margin:2px 0 12px;}
  .pe-add:active{border-color:var(--green);color:var(--green);}
  .lu-lock{background:rgba(244,123,32,.10);border:1px solid var(--orange);color:var(--orange-d);border-radius:10px;padding:9px 12px;font-size:12.5px;font-weight:700;text-align:center;margin-bottom:12px;}
  /* HOME / ABOUT / HOW-TO */
  .home-hero{position:relative;border-radius:0 0 26px 26px;overflow:hidden;min-height:418px;display:flex;align-items:flex-end;}
  .home-hero .hh-bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center 28%;}
  .home-hero .hh-in{position:relative;width:100%;text-align:center;color:#fff;padding:24px 18px 22px;background:linear-gradient(to top,rgba(6,30,22,.92) 8%,rgba(6,30,22,.6) 45%,rgba(6,30,22,0));}
  .home-hero .hh-kicker{font-size:11px;font-weight:800;letter-spacing:3px;text-transform:uppercase;color:#ffd9a8;}
  .home-hero .hh-title{font-family:'Archivo',sans-serif;font-size:40px;font-weight:900;letter-spacing:-1px;line-height:.98;margin-top:4px;text-shadow:0 2px 14px rgba(0,0,0,.55);}
  .home-hero .hh-title b{color:var(--orange);}
  .home-hero .hh-meta{font-size:12.5px;color:rgba(255,255,255,.95);margin-top:9px;display:flex;gap:7px;align-items:center;justify-content:center;flex-wrap:wrap;font-weight:600;text-shadow:0 1px 6px rgba(0,0,0,.5);}
  .home-menu{padding:16px;display:flex;flex-direction:column;gap:11px;margin-top:-14px;position:relative;z-index:2;}
  .menu-card{display:flex;align-items:center;gap:14px;background:var(--surface);border:1.5px solid var(--line);border-radius:16px;padding:16px;cursor:pointer;text-align:left;width:100%;transition:transform .08s;}
  .menu-card:active{transform:scale(.985);}
  .menu-card .mc-ico{flex-shrink:0;width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;background:rgba(34,168,94,.12);color:var(--green-d);}
  .menu-card.accent .mc-ico{background:rgba(244,123,32,.14);color:var(--orange-d);}
  .menu-card .mc-tt{flex:1;}
  .menu-card .mc-tt b{display:block;font-size:16px;font-weight:700;color:var(--ink);}
  .menu-card .mc-tt span{display:block;font-size:12.5px;color:var(--muted);margin-top:1px;}
  .menu-card .mc-arr{color:var(--muted);font-size:18px;}
  .page-head{display:flex;align-items:center;gap:10px;padding:16px 16px 6px;}
  #screen-about{position:relative;}
  .about-art{position:absolute;inset:0;z-index:0;pointer-events:none;color:var(--green);opacity:.085;overflow:hidden;}
  @media(prefers-color-scheme:dark){ .about-art{opacity:.13;} }
  #screen-about .page-head, #screen-about .page-body{position:relative;z-index:1;}
  .page-back{width:38px;height:38px;border-radius:10px;border:1.5px solid var(--line);background:var(--surface);color:var(--ink);font-size:16px;cursor:pointer;flex-shrink:0;}
  .page-title{font-family:'Archivo',sans-serif;font-size:21px;font-weight:800;}
  .page-body{padding:6px 16px 28px;}
  .info-card{background:var(--surface);border:1.5px solid var(--line);border-radius:16px;padding:16px;margin-bottom:14px;}
  .info-card h4{font-size:15px;font-weight:700;margin:0 0 6px;}
  .info-card p{font-size:14px;line-height:1.6;color:var(--ink);margin:0;white-space:pre-wrap;}
  .info-row{display:flex;gap:10px;font-size:13.5px;color:var(--ink);padding:7px 0;border-top:1px solid var(--line);}
  .info-row:first-of-type{border-top:none;}
  .info-row .ir-k{color:var(--muted);min-width:74px;font-weight:600;}
  .venue-name{font-size:17px;font-weight:800;}
  .venue-addr{font-size:13px;color:var(--muted);margin-top:2px;}
  .map-prev{margin:12px 0;border-radius:12px;overflow:hidden;border:1.5px solid var(--line);display:block;width:100%;}
  .mode-pills{display:flex;gap:7px;margin:14px 0 12px;flex-wrap:wrap;}
  .mode-pill{display:flex;align-items:center;gap:5px;font-size:12.5px;font-weight:700;padding:8px 12px;border-radius:10px;border:1.5px solid var(--line);background:var(--surface);color:var(--ink);cursor:pointer;}
  .mode-pill.on{background:var(--green);border-color:var(--green);color:#fff;}
  .mode-detail{font-size:14px;color:var(--ink);margin-bottom:4px;font-weight:600;}
  .mode-note{font-size:13px;color:var(--muted);line-height:1.5;margin-bottom:12px;}
  .map-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:8px;background:var(--green);color:#fff;border:none;border-radius:12px;padding:13px;font-family:'Inter';font-weight:700;font-size:14.5px;cursor:pointer;}
  .map-btn:active{background:var(--green-d);}
  .field textarea{width:100%;background:var(--surface2);border:1.5px solid var(--line);color:var(--ink);border-radius:10px;padding:11px;font-family:'Inter';font-size:14px;outline:none;resize:vertical;min-height:70px;}
  .field textarea:focus{border-color:var(--green);}
  /* AGENDA */
  .agenda{padding-top:8px;padding-bottom:4px;}
  .ag-group{font-family:'Archivo',sans-serif;font-size:15px;font-weight:800;color:var(--ink);padding-bottom:10px;margin-bottom:4px;border-bottom:1.5px solid var(--line);}
  .ag-item{display:flex;gap:10px;}
  .ag-time{width:64px;flex-shrink:0;font-size:11px;font-weight:800;color:var(--green-d);text-align:right;padding-top:2px;line-height:1.25;white-space:normal;}
  .ag-rail{width:12px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;}
  .ag-rail .d{width:11px;height:11px;border-radius:50%;background:var(--green);margin-top:3px;flex-shrink:0;}
  .ag-rail .l{flex:1;width:2px;background:var(--line);margin-top:3px;min-height:14px;}
  .ag-body{flex:1;padding-bottom:16px;}
  .ag-title{font-size:14px;font-weight:700;line-height:1.3;}
  .ag-note{font-size:12px;color:var(--muted);margin-top:2px;line-height:1.3;}
  .ag-edit-row{background:var(--surface2);border:1.5px solid var(--line);border-radius:12px;padding:12px;margin-bottom:10px;}
  .ag-edit-section{background:rgba(34,168,94,.07);border-color:var(--green);}
  .ag-edit-head{display:flex;align-items:center;justify-content:space-between;font-size:12px;font-weight:800;color:var(--muted);margin-bottom:8px;letter-spacing:.4px;}
  .ag-edit-btns button{background:var(--surface);border:1.5px solid var(--line);color:var(--ink);border-radius:7px;width:30px;height:28px;font-size:12px;cursor:pointer;margin-left:4px;}
  .ag-edit-btns button:disabled{opacity:.4;}
  .ag-edit-btns .ag-del{color:var(--red);border-color:var(--red);}
  .ag-inp{width:100%;background:var(--surface);border:1.5px solid var(--line);color:var(--ink);border-radius:9px;padding:10px 11px;font-family:'Inter';font-size:14px;outline:none;margin-bottom:7px;}
  .ag-inp:last-child{margin-bottom:0;}
  .ag-inp:focus{border-color:var(--green);}
  /* OUR TEAM — org chart */
  .tm-av,.tm-av-lg{border-radius:50%;overflow:hidden;flex-shrink:0;background:var(--surface2);display:flex;align-items:center;justify-content:center;}
  .tm-av{width:50px;height:50px;}
  .tm-av-lg{width:64px;height:64px;border:2px solid rgba(255,255,255,.5);}
  .tm-av img,.tm-av-lg img{width:100%;height:100%;object-fit:cover;}
  .tm-av-init{font-weight:800;font-size:17px;color:var(--muted);}
  .tm-av-init-lg{font-weight:800;font-size:22px;color:var(--muted);}
  .oc{display:flex;flex-direction:column;align-items:center;}
  .oc-top{width:100%;display:flex;justify-content:center;}
  .oc-head{display:flex;align-items:center;gap:14px;background:linear-gradient(135deg,#173d1e,#0e8f6b);border-radius:16px;padding:14px 18px;color:#fff;max-width:340px;width:100%;cursor:pointer;}
  .oc-head-info{flex:1;}
  .oc-head-tag{font-size:10px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:#ffd9a8;}
  .oc-head-nm{font-family:'Archivo',sans-serif;font-size:21px;font-weight:900;line-height:1.1;}
  .oc-head-rl{font-size:12.5px;opacity:.9;margin-top:1px;}
  .oc-trunk{width:2px;height:20px;background:var(--line);}
  .oc-subtop{width:100%;display:flex;justify-content:center;}
  .oc-subhead{display:flex;align-items:center;gap:12px;background:var(--surface);border:2px solid var(--green);border-radius:14px;padding:11px 16px;max-width:340px;width:100%;cursor:pointer;}
  .oc-subhead-info{flex:1;}
  .oc-subhead-nm{font-size:15px;font-weight:800;color:var(--ink);line-height:1.1;}
  .oc-subhead-rl{font-size:12px;color:var(--green-d);font-weight:600;margin-top:1px;}
  .oc-tree{width:100%;position:relative;padding-left:20px;}
  .oc-tree::before{content:"";position:absolute;left:7px;top:0;bottom:18px;width:2px;background:var(--line);}
  .oc-branch{position:relative;margin-bottom:16px;}
  .oc-branch::before{content:"";position:absolute;left:-13px;top:26px;width:13px;height:2px;background:var(--line);}
  .oc-dept{background:var(--surface);border:1.5px solid var(--line);border-radius:16px;padding:14px;}
  .oc-dept-head{display:flex;align-items:center;gap:7px;font-size:13.5px;font-weight:800;letter-spacing:.3px;color:var(--ink);margin-bottom:12px;}
  .oc-dept-ic{font-size:17px;}
  .oc-count{margin-left:auto;background:var(--surface2);border-radius:20px;padding:1px 10px;font-size:12px;color:var(--muted);font-weight:700;}
  .oc-row{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;}
  .oc-pocs{grid-template-columns:repeat(2,1fr);justify-content:center;margin-bottom:0;}
  .oc-link{width:2px;height:14px;background:var(--line);margin:0 auto;}
  .oc-sub{font-size:11px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);margin:12px 0 8px;display:flex;align-items:center;gap:8px;}
  .oc-sub::after{content:"";flex:1;height:1px;background:var(--line);}
  .oc-node{background:var(--surface);border:1.5px solid var(--line);border-radius:13px;padding:11px 6px;display:flex;flex-direction:column;align-items:center;gap:5px;position:relative;}
  .oc-node[onclick]{cursor:pointer;}
  .oc-node.poc{border-color:var(--green);border-width:2px;background:rgba(34,168,94,.07);padding-top:15px;}
  .oc-badge{position:absolute;top:-1px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;font-size:9px;font-weight:800;letter-spacing:1px;padding:2px 9px;border-radius:0 0 8px 8px;}
  .oc-nm{font-size:12.5px;font-weight:700;text-align:center;overflow-wrap:anywhere;line-height:1.15;}
  .oc-rl{font-size:10px;color:var(--muted);text-align:center;line-height:1.2;}
  /* manage list + edit sheet (reused) */
  .tm-row{display:flex;align-items:center;gap:12px;padding:10px 4px;border-bottom:1px solid var(--line);cursor:pointer;}
  .tm-row .tm-av{width:42px;height:42px;}
  .tm-row .tm-av-init{font-size:15px;}
  .tm-row-info{flex:1;min-width:0;}
  .tm-row-name{font-size:14.5px;font-weight:700;}
  .tm-row-sub{font-size:12px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .tm-row-arr{color:var(--muted);font-size:20px;}
  .tm-photo-edit{display:flex;flex-direction:column;align-items:center;gap:10px;margin-bottom:16px;}
  .tm-photo-edit .tm-av-lg{width:90px;height:90px;border:2.5px dashed var(--line);cursor:pointer;}
  .tm-photo-label{font-size:12.5px;color:var(--muted);}
  .num-hash{font-family:'Archivo';font-weight:800;color:var(--muted);font-size:15px;}
  .num-input{width:58px;text-align:center;background:var(--surface);border:1.5px solid var(--line);color:var(--ink);border-radius:8px;padding:9px 4px;font-family:'Archivo';font-weight:800;font-size:15px;outline:none;}
  .num-input:focus{border-color:var(--green);}
  .num-input.dup{border-color:var(--red);background:rgba(226,59,59,.10);color:var(--red);}
  .num-warn{color:var(--red);font-size:12.5px;font-weight:700;text-align:center;margin:2px 0 10px;min-height:17px;}
</style>
</head>

const PASSWORDS = { male: 'male2025', female: 'female2025' };
const ADMIN_USERS = { 'admin.m': 'male', 'admin.f': 'female' };   // username → tournament
let adminSession = null;
let managerSession = null;   // team name when signed in as that team's captain/manager

// Keep admin/manager signed in across page refreshes on this device (avoids
// re-login on every refresh, which also means fewer redundant cloud reads).
const SESSION_KEY = 'livescore_session';
function saveSession(){
  try{
    if(adminSession) localStorage.setItem(SESSION_KEY, JSON.stringify({role:'admin', value:adminSession}));
    else if(managerSession) localStorage.setItem(SESSION_KEY, JSON.stringify({role:'manager', value:managerSession}));
    else localStorage.removeItem(SESSION_KEY);
  }catch(e){}
}
function restoreSession(){
  try{
    const raw=localStorage.getItem(SESSION_KEY); if(!raw) return;
    const s=JSON.parse(raw);
    if(s.role==='admin' && PASSWORDS[s.value]!==undefined) adminSession=s.value;
    else if(s.role==='manager' && allTeams().includes(s.value)) managerSession=s.value;
  }catch(e){}
}

// ── Team manager credentials ────────────────────────────────────────────────
// Each team gets a username (slug) and a stable password derived from its name.
// Admins can view the full list under Admin → Team manager logins to hand out.
// Changing TEAM_SALT rotates every team password at once.
const TEAM_SALT = 'sportsday2026';
function allTeams(){ return [...data.male.groupA.teams, ...data.male.groupB.teams, ...data.female.group.teams]; }
function teamDivision(team){
  if([...data.male.groupA.teams, ...data.male.groupB.teams].includes(team)) return 'male';
  if(data.female.group.teams.includes(team)) return 'female';
  return null;
}
function teamUsername(team){ return team.toLowerCase().replace(/[^a-z0-9]+/g,'').slice(0,18); }
function teamPassword(team){
  let h = 2166136261 >>> 0; const s = TEAM_SALT + '|' + team.toLowerCase();
  for(let i=0;i<s.length;i++){ h = Math.imul(h ^ s.charCodeAt(i), 16777619) >>> 0; }
  const chars = 'abcdefghijkmnpqrstuvwxyz23456789'; let out = '';
  for(let i=0;i<6;i++){ h = Math.imul(h ^ (h>>>13), 16777619) >>> 0; out += chars[h % chars.length]; }
  return out;
}
function findTeamByUsername(u){ u=(u||'').toLowerCase().trim(); return allTeams().find(t=>teamUsername(t)===u)||null; }

// ── Permission helpers ──────────────────────────────────────────────────────
function isDivAdmin(m){ return adminSession === matchDivision(m.id); }
// Can the current user edit this team in this match at all? (admin of its division, or its manager)
function canEditTeamInMatch(m, team){
  if(team!==m.home && team!==m.away) return false;
  return isDivAdmin(m) || managerSession === team;
}
// Lineup (formation) edits: admins anytime; managers only before kickoff.
function canEditLineup(m, team){ return canEditTeamInMatch(m, team) && (isDivAdmin(m) || m.status === 'upcoming'); }
// Substitutions: admins anytime; managers only once the match is live.
function canSub(m, team){ return canEditTeamInMatch(m, team) && (isDivAdmin(m) || m.status === 'live'); }
function managerChip(team){ const w=team.split(/\s+/)[0].toUpperCase(); return w.length>9?w.slice(0,8)+'\u2026':w; }

// ═══════════════════════════════════════════
// PERSISTENCE  —  local drive (localStorage) + web drive (JSON export/import)
// ═══════════════════════════════════════════
const STORAGE_KEY = 'livescore_sportsday2026_v3';

// Pull only the editable, per-match fields so structure stays code-controlled.
function serializeState() {
  const matches = {};
  eachMatch(m => {
    matches[m.id] = {
      status:m.status, time:m.time, no:m.no, field:m.field,
      homeScore:m.homeScore, awayScore:m.awayScore,
      home:m.home, away:m.away, events:m.events||[],
      clockElapsed:m.clockElapsed||0, clockStart:m.clockStart||null, clockRunning:!!m.clockRunning,
      lineup:m.lineup||null
    };
  });
  const order = {};
  namedMatchSets().forEach(s => { order[s.key] = s.arr.map(m => m.id); });
  const playerRosters = {};
  Object.keys(PLAYERS).forEach(t => { playerRosters[t] = PLAYERS[t].slice(); });
  return { savedAt: Date.now(), version: 4, matches, order, scheduleLog, playerNumbers: PLAYER_NUMBERS, playerRosters, eventInfo };
}

function saveData() {
  const state = serializeState();
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch (e) { /* storage full or blocked — silent */ }
  cloudPush(state);            // push the same state to the shared online store
  updateSaveState();
}

function applyState(state) {
  if (!state || !state.matches) return;
  eachMatch(m => {
    const s = state.matches[m.id];
    if (!s) return;
    m.status=s.status; m.time=s.time;
    if (s.no!==undefined) m.no=s.no;
    if (s.field!==undefined) m.field=s.field;
    m.homeScore=(s.homeScore===undefined?null:s.homeScore);
    m.awayScore=(s.awayScore===undefined?null:s.awayScore);
    if (s.home) m.home=s.home;
    if (s.away) m.away=s.away;
    m.events=s.events||[];
    m.clockElapsed=s.clockElapsed||0;
    m.clockStart=s.clockStart||null;
    m.clockRunning=!!s.clockRunning;
    if(s.lineup)m.lineup=s.lineup;
  });
  // Restore the saved display order per set (reorder arrays in place).
  if (state.order) {
    namedMatchSets().forEach(s => {
      const ord = state.order[s.key];
      if (!ord) return;
      const byId = {}; s.arr.forEach(m => byId[m.id] = m);
      const reordered = ord.map(id => byId[id]).filter(Boolean);
      s.arr.forEach(m => { if (!ord.includes(m.id)) reordered.push(m); }); // keep any new code-added matches
      if (reordered.length === s.arr.length) { s.arr.length = 0; reordered.forEach(m => s.arr.push(m)); }
    });
  }
  if (Array.isArray(state.scheduleLog)) scheduleLog = state.scheduleLog;
  if (state.playerNumbers && typeof state.playerNumbers === 'object') PLAYER_NUMBERS = state.playerNumbers;
  if (state.playerRosters && typeof state.playerRosters === 'object') {
    Object.entries(state.playerRosters).forEach(([t, arr]) => {
      if (PLAYERS[t] && Array.isArray(arr)) { PLAYERS[t].length = 0; arr.forEach(n => PLAYERS[t].push(n)); }
    });
  }
  if (state.eventInfo && typeof state.eventInfo === 'object') {
    eventInfo = Object.assign({}, eventInfo, state.eventInfo);   // merge so new fields keep defaults
  }
}

// Web drive: download a backup file the user saves to OneDrive / Google Drive.
function exportData() {
  const blob = new Blob([JSON.stringify(serializeState(), null, 2)], { type:'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const stamp = new Date().toISOString().slice(0,16).replace(/[:T]/g,'-');
  a.href = url; a.download = `sportsday2026-scores-${stamp}.json`;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
  showToast('Backup downloaded');
}

// Web drive: restore from a backup file.
function importData(input) {
  const file = input.files && input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const state = JSON.parse(reader.result);
      applyState(state);
      saveData();
      renderAll();
      if (document.getElementById('modal').classList.contains('open') && adminSession) openAdminMenu();
      showToast('Backup restored');
    } catch (e) { showToast('Error: invalid backup file'); }
  };
  reader.readAsText(file);
  input.value = '';
}

function updateSaveState() {
  const el = document.getElementById('save-state');
  if (!el) return;
  let raw; try { raw = JSON.parse(localStorage.getItem(STORAGE_KEY)); } catch(e){}
  const t = raw && raw.savedAt ? new Date(raw.savedAt) : null;
  const stamp = t ? `${String(t.getHours()).padStart(2,'0')}:${String(t.getMinutes()).padStart(2,'0')}:${String(t.getSeconds()).padStart(2,'0')}` : null;

    ? `<b style="color:var(--green)">● Online</b> — synced to all devices`
    : `<b style="color:var(--orange)">● Offline</b> — saved locally, will sync when back online`;

let fbApp = null, db = null, docRef = null, unsubscribeSnap = null;

// A per-device id so we can ignore the echo of our own writes coming back over the listener.
let DEVICE_ID;
try {

  if (!DEVICE_ID) { DEVICE_ID = 'dev_' + Math.random().toString(36).slice(2) + Date.now().toString(36); localStorage.setItem('livescore_device_id', DEVICE_ID); }

function cloudEnabled() {

  return !!(c.apiKey && c.projectId
    && !c.apiKey.startsWith('YOUR-') && !c.projectId.startsWith('YOUR-'));
}

function setCloudOnline(on) { cloudOnline = on; updateSaveState(); }

function initCloud() {
  if (!cloudEnabled()) { console.log('[cloud] Firebase config not filled in — running device-only'); return; }
  if (!window.firebase) {                       // CDN blocked / didn't load
    cloudError = 'Cloud library failed to load (check internet / ad-blockers).';
    console.error('[cloud] window.firebase is undefined — the CDN script did not load');
    updateSaveState();
    return;
  }
  try {
    fbApp = firebase.initializeApp(FIREBASE_CONFIG);
    db = firebase.firestore();
    try { db.settings({ ignoreUndefinedProperties: true }); } catch (e) {}   // knockout matches have no `no` field
    docRef = db.collection(FIRESTORE_DOC_PATH[0]).doc(FIRESTORE_DOC_PATH[1]);
    cloudReady = true;
    console.log('[cloud] Firebase initialized, attaching listener…');
    // onSnapshot fires immediately with current data (acts as the initial pull),
    // then again in real time whenever any device writes — no separate pull call needed.
    unsubscribeSnap = docRef.onSnapshot(
      snap => {
        rtError = '';
        if (!snap.exists) { setCloudOnline(true); return; }   // no doc yet — first save will create it
        const row = snap.data();
        if (!row || !row.data) { setCloudOnline(true); return; }
        if (row.updatedBy === DEVICE_ID) { cloudError = ''; setCloudOnline(true); return; }  // our own write echoing back
        console.log('[cloud] remote update received');
        applyRemoteState(row.data);
        showToast('Scores updated');
        cloudError = ''; setCloudOnline(true);
      },
      err => {
        rtError = 'Live updates off: ' + err.message + ' (check Firestore rules allow read/write).';
        console.error('[cloud] listener error', err);
        setCloudOnline(false);
      }
    );
    subscribeTeam();
  } catch (e) { cloudError = 'Init error: ' + e.message; cloudReady = false; console.error('[cloud]', e); updateSaveState(); }
}

function applyRemoteState(state) {
  applyingRemote = true;
  applyState(state);
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
  applyingRemote = false;
  renderAll();
  if (adminSession && document.getElementById('save-state')) updateSaveState();
}

// Firestore rejects undefined values; drop any undefined keys at every level.
function cleanForFirestore(v){
  if(Array.isArray(v)) return v.map(cleanForFirestore);
  if(v && typeof v==='object'){
    const out={};
    for(const k in v){ const cv=cleanForFirestore(v[k]); if(cv!==undefined) out[k]=cv; }
    return out;
  }
  return v;
}
async function cloudPush(state) {
  if (!cloudReady || applyingRemote) return;          // don't re-push state we just received
  try {
    await docRef.set({ data: cleanForFirestore(state), updatedBy: DEVICE_ID, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
    cloudError = ''; setCloudOnline(true);
  } catch (e) { cloudError = 'Save failed: ' + (e.message || e); console.error('[cloud] push', e); setCloudOnline(false); }
}

// LIVE CLOCK  —  counts up from kickoff, manual start/stop
// ═══════════════════════════════════════════
function clockSeconds(m) {
  let s = m.clockElapsed || 0;
  if (m.clockRunning && m.clockStart) s += (Date.now() - m.clockStart) / 1000;
  const cap = matchMaxMinute(m) * 60;
  return Math.min(s, cap);
}
function fmtClock(s) {
  const mm = Math.floor(s / 60), ss = Math.floor(s % 60);
  return String(mm).padStart(2,'0') + ':' + String(ss).padStart(2,'0');
}
function startClock(id) {
  const m = getMatchById(id); if (!m) return;
  if (!m.clockRunning) {
    m.clockRunning = true;
    m.clockStart = Date.now();
    if (m.status === 'upcoming') m.status = 'live';
  }
  saveData(); renderAll(); if (adminSession) showEditMatch(id);
}
function pauseClock(id) {
  const m = getMatchById(id); if (!m) return;
  m.clockElapsed = clockSeconds(m);
  m.clockRunning = false; m.clockStart = null;
  saveData(); renderAll(); if (adminSession) showEditMatch(id);
}
function resetClock(id) {
  const m = getMatchById(id); if (!m) return;
  m.clockElapsed = 0; m.clockRunning = false; m.clockStart = null;
  saveData(); renderAll(); if (adminSession) showEditMatch(id);
}
// Tick running clocks once per second without a full re-render.
setInterval(() => {
  eachMatch(m => {
    if (!m.clockRunning) return;
    const secs = clockSeconds(m);
    const card = document.getElementById('clock-' + m.id);
    if (card) card.textContent = fmtClock(secs);
    const modal = document.getElementById('modalclock-' + m.id);
    if (modal) modal.textContent = fmtClock(secs);
  });
}, 1000);

// ---------- STANDINGS (compute unchanged) ----------
function computeStandings(teams, matches){
  const table={};
  teams.forEach(t=>{ table[t]={played:0,w:0,d:0,l:0,gf:0,ga:0,pts:0}; });
  matches.forEach(m=>{
    const hasScore=m.homeScore!==null&&m.awayScore!==null;
    if((m.status==='ft'||m.status==='live')||(hasScore&&m.status==='upcoming')){
      const h=m.home,a=m.away,hs=m.homeScore??0,as=m.awayScore??0;
      if(!table[h]||!table[a])return;
      if(m.status==='ft'||m.status==='live'){
        table[h].played++;table[a].played++;
        if(hs>as){table[h].w++;table[h].pts+=3;table[a].l++;}
        else if(hs<as){table[a].w++;table[a].pts+=3;table[h].l++;}
        else{table[h].d++;table[h].pts++;table[a].d++;table[a].pts++;}
      }
      table[h].gf+=hs;table[h].ga+=as;table[a].gf+=as;table[a].ga+=hs;
    }
  });
  return Object.entries(table).map(([name,s])=>({name,...s,gd:s.gf-s.ga}))
    .sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf);
}
function computeScorers(allMatches){
  const sc={};
  allMatches.forEach(m=>{(m.events||[]).forEach(e=>{
    if(e.type!=='goal')return;
    const name=(e.player||'').trim(); if(!name)return;
    let team;
    if(e.team==='home')team=m.home; else if(e.team==='away')team=m.away;
    else{const pl=name.toLowerCase();const aw=(PLAYERS[m.away]||[]).map(p=>p.toLowerCase());const ho=(PLAYERS[m.home]||[]).map(p=>p.toLowerCase());team=(aw.includes(pl)&&!ho.includes(pl))?m.away:m.home;}
    const key=team+'|'+name;
    if(!sc[key])sc[key]={name,team,goals:0};
    sc[key].goals++;
  });});
  return Object.values(sc).sort((a,b)=>b.goals-a.goals);
}

function renderTimeline(m){
  const admin=adminSession===matchDivision(m.id);
  const evs=(m.events||[]).map((e,idx)=>({...e,_i:idx}));
  evs.sort((a,b)=>(parseInt(b.minute)||0)-(parseInt(a.minute)||0));
  if(!evs.length) return `<div class="timeline"><div class="tl-empty">No goals or cards yet.</div></div>`;
  const rows=evs.map(e=>{
    const side=e.team==='away'?'away':'home';
    const team=side==='home'?m.home:m.away;
    const no=jerseyNo(team,e.player);
    const meta=EVENT_META[e.type]||EVENT_META.goal;
    const txt=`<div class="tl-text"><div class="tl-type" style="color:${meta.color}">${meta.label}</div><div class="tl-name">${no?no+' | ':''}${e.player||''}</div></div>`;
    const icon=`<span class="tl-icon">${meta.icon}</span>`;
    const bubble=`<span class="tl-min" style="border-color:${meta.color};color:${meta.color}">${(e.minute!==''&&e.minute!=null)?e.minute+"'":'-'}</span>`;
    const del=admin?`<button class="tl-edit" onclick="editEvent('${m.id}',${e._i})" title="Edit / delete">\u270E</button>`:'';
    if(side==='home'){
      return `<div class="tl-row"><div class="tl-side left">${del}${txt}${icon}</div><div class="tl-center">${bubble}</div><div class="tl-side right"></div></div>`;
    }
    return `<div class="tl-row"><div class="tl-side left"></div><div class="tl-center">${bubble}</div><div class="tl-side right">${icon}${txt}${del}</div></div>`;
  }).join('');
  return `<div class="timeline">${rows}</div>`;
}

      </div>
    </div></div>`;
  document.getElementById('match-body').innerHTML=`
    <div class="md-top" style="background:${accent}"><button class="md-back" onclick="backToList()">\u2039 Back</button></div>

function quickEvent(side){

function confirmEvent(side){
  const m=getMatchById(openMatchId); if(!m)return;
  const type=document.getElementById('sheet-type').value;
  const player=document.getElementById('sheet-player').value;
  const minute=document.getElementById('sheet-min').value;
  if(!player){showToast('Choose a player');return;}
  m.events=m.events||[]; m.events.push({team:side,type,player,minute});
  saveData(); closeModal(); renderAll(); showToast('Event added');
}
function removeEvent(id,idx){
  const m=getMatchById(id); if(!m||!m.events[idx])return;
  const ev=m.events[idx];
  if(ev.pair){
    ensureLineup(m); const L=m.lineup[ev.team];
    const onEv=m.events.find(e=>e.pair===ev.pair&&e.type==='sub_on');
    const offEv=m.events.find(e=>e.pair===ev.pair&&e.type==='sub_off');
    if(onEv&&offEv){ const si=L.starters.indexOf(onEv.player); if(si>=0)L.starters[si]=offEv.player; const bi=L.bench.indexOf(offEv.player); if(bi>=0)L.bench[bi]=onEv.player; }
    m.events=m.events.filter(e=>e.pair!==ev.pair);
    saveData(); closeModal(); renderAll(); showToast('Substitution removed'); return;
  }
  m.events.splice(idx,1); recomputeScore(m); saveData(); closeModal(); renderAll(); showToast('Event deleted');
}

    openSheet('\u270E Edit substitution \u2014 '+team,

       <div class="field"><label>Minute (0\u2013${max})</label><select id="ee-min">${minuteOptions(max, offEv?offEv.minute:'')}</select></div>

function doLogin(){
  const u=(document.getElementById('login-username').value||'').trim().toLowerCase();
  const p=(document.getElementById('login-password').value||'').trim();
  if(!u||!p){ showLoginError('Enter username and password.'); return; }
  // 1. Admin — username admin.m (male) or admin.f (female) + matching password
  const adminKey = ADMIN_USERS[u];
  if(adminKey){
    if(PASSWORDS[adminKey].toLowerCase()===p.toLowerCase()){
      adminSession=adminKey; managerSession=null; saveSession(); closeModal(); renderAll();
      showToast(adminKey.toUpperCase()+' admin \u2014 you can now score'); return;
    }
    showLoginError('Incorrect password.'); return;
  }
  // 2. Team manager — team username + team password
  const team=findTeamByUsername(u);
  if(team && teamPassword(team)===p){
    managerSession=team; adminSession=null; saveSession(); closeModal(); renderAll();
    showToast('Signed in as '+team+' manager'); return;
  }
  showLoginError('Incorrect username or password.');

// merge baked seed with Firestore overrides → final member list
function teamMembers(){
  const out = [];
  const seedIds = new Set();
  TEAM_SEED.forEach(s=>{
    seedIds.add(s.id);
    const ov = teamOverrides[s.id] || {};
    if(ov.deleted) return;
    out.push({ id:s.id, user:s.user,
      nick: ov.nick!==undefined ? ov.nick : s.nick,
      role: ov.role!==undefined ? ov.role : s.role,
      dept: ov.dept!==undefined ? ov.dept : s.dept,
      lead: ov.lead!==undefined ? ov.lead : (s.lead||false),
      head: ov.head!==undefined ? ov.head : (s.head||false),
      subhead: ov.subhead!==undefined ? ov.subhead : (s.subhead||false),
      photo: ov.photo || '' });
  });
  // admin-added members (ids not in seed)
  Object.keys(teamOverrides).forEach(id=>{
    if(seedIds.has(id)) return;
    const ov = teamOverrides[id];
    if(ov.deleted) return;
    out.push({ id, user:ov.user||'', nick:ov.nick||'', role:ov.role||'', dept:ov.dept||'Lens & Code', lead:!!ov.lead, head:!!ov.head, subhead:!!ov.subhead, photo:ov.photo||'' });
  });
  return out;
}

function renderTeam(){
  const el = document.getElementById('team-body'); if(!el) return;

  if(admin) html += `<button class="btn-primary" style="margin-bottom:16px" onclick="openTeamManage()">\u270E Manage team</button>`;

  const subheads = members.filter(m=>m.subhead && !m.head);

  html += `<div class="oc">`;
  // ---- top: head coordinator ----
  if(heads.length){
    html += `<div class="oc-top">` + heads.map(m=>`
      <div class="oc-head" ${admin?`onclick="openTeamEdit('${m.id}')"`:''}>

  // ---- second level: deputies / cross-event roles (below head) ----
  if(subheads.length){
    html += `<div class="oc-subtop">` + subheads.map(m=>`
      <div class="oc-subhead" ${admin?`onclick="openTeamEdit('${m.id}')"`:''}>

          <div class="oc-subhead-rl">${escHtml(m.role||'')}</div>
        </div>
      </div>`).join('') + `</div><div class="oc-trunk"></div>`;
  }

  // ---- tree of departments (left spine + branch stubs) ----
  html += `<div class="oc-tree">`;
  const known = new Set(TEAM_DEPTS);
  const renderDept = (dept)=>{
    const inDept = members.filter(m=>m.dept===dept && !m.head && !m.subhead);
    if(!inDept.length) return '';
    const leads = inDept.filter(m=>m.lead);
    const rest  = inDept.filter(m=>!m.lead);
    let h = `<div class="oc-branch"><div class="oc-dept">
      <div class="oc-dept-head"><span class="oc-dept-ic">${DEPT_ICON[dept]||'\uD83D\uDC65'}</span> ${escHtml(dept)} <span class="oc-count">${inDept.length}</span></div>`;
    if(leads.length) h += `<div class="oc-row oc-pocs">${leads.map(m=>ocNode(m,admin,'poc')).join('')}</div>`;
    if(leads.length && rest.length) h += `<div class="oc-link"></div>`;
    if(dept==='Sports'){
      const g = subgroupSports(rest);
      Object.keys(g).forEach(label=>{
        const a=g[label]; if(!a.length) return;
        h += `<div class="oc-sub">${escHtml(label)}</div><div class="oc-row">${a.map(m=>ocNode(m,admin,'mem')).join('')}</div>`;
      });
    } else if(rest.length){
      h += `<div class="oc-row">${rest.map(m=>ocNode(m,admin,'mem')).join('')}</div>`;
    }
    return h + `</div></div>`;
  };
  TEAM_DEPTS.forEach(dept=>{ html += renderDept(dept); });
  // catch-all: any member with a department not in TEAM_DEPTS still shows
  const extraDepts = [...new Set(members.filter(m=>!m.head && !m.subhead && !known.has(m.dept)).map(m=>m.dept))];
  extraDepts.forEach(dept=>{ html += renderDept(dept); });
  html += `</div></div>`;
  el.innerHTML = html;
}

async function teamHandlePhoto(input){
  const file=input.files[0]; if(!file) return;
  const r=new FileReader();
  r.onload=async e=>{
    const c=await teamCompress(e.target.result, 240, 240, 0.72);
    teamPhotoBuf=c;
    const img=document.getElementById('tm-edit-img');
    const av=document.getElementById('tm-edit-av');
    if(img){ img.src=c; } else { av.innerHTML=`<img src="${c}" id="tm-edit-img">`; }
  };
  r.readAsDataURL(file);
}
function teamCompress(dataUrl,maxW,maxH,q){
  return new Promise(res=>{
    const img=new Image();
    img.onload=()=>{
      const cv=document.createElement('canvas');
      let w=img.width,h=img.height;
      if(w>h){ if(w>maxW){h=h*maxW/w;w=maxW;} } else { if(h>maxH){w=w*maxH/h;h=maxH;} }
      cv.width=w; cv.height=h; cv.getContext('2d').drawImage(img,0,0,w,h);
      res(cv.toDataURL('image/jpeg',q));
    };
    img.src=dataUrl;
  });
}
async function saveTeamEdit(isNew){
  if(!db){ showToast('Cloud not connected'); return; }

  const rank=document.getElementById('tm-rank').value;
  let id=document.getElementById('tm-id').value;
  // Write fields explicitly (no trimming) — merge:true would otherwise leave a
  // stale override when a value is changed back to its seed default.
  const payload = { nick, role, dept, lead: rank==='lead', head: rank==='head', subhead: rank==='subhead' };
  if(teamPhotoBuf) payload.photo = teamPhotoBuf;
  if(isNew){
    id = 'tx_'+Date.now().toString(36);
    const user=(document.getElementById('tm-user')||{}).value||'';
    payload.user=user.trim();

  try{
    await db.collection(TEAM_COLL).doc(id).set(payload, {merge:true});

async function deleteTeamMember(id){
  if(!confirm('Remove this person from the team?')) return;
  const seed = TEAM_SEED.find(s=>s.id===id);
  try{
    if(seed) await db.collection(TEAM_COLL).doc(id).set({deleted:true}, {merge:true});  // hide seed member
    else await db.collection(TEAM_COLL).doc(id).delete();                                // remove added member
    showToast('Removed'); openTeamManage();
  }catch(e){ showToast('Error: '+e.message); }
}


function escHtml(s){ return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function slotName(es, i){
  const id = es.order[i], mu = swapEditor.mu[id];
  return mu.round ? mu.round : ('Match ' + (es.slots[i].no!=null ? es.slots[i].no : (i+1)));

function openRearrange(){
  const sets = namedMatchSets().filter(s => s.division === adminSession);
  swapEditor = { mu:{}, sets: sets.map(s => ({
    key:s.key, label:s.label,
    order:     s.arr.map(m => m.id),
    origOrder: s.arr.map(m => m.id),
    slots:     s.arr.map(m => ({ time:m.time, field:m.field, no:m.no })),
    origSlots: s.arr.map(m => ({ time:m.time, field:m.field, no:m.no })),
  })) };
  sets.forEach(s => s.arr.forEach(m => { swapEditor.mu[m.id] = { home:m.home, away:m.away, round:m.round, no:m.no }; }));
  renderRearrange();
}

function renderRearrange(){
  if(!swapEditor) return;
  const FIELD_PRESETS = [
    { label:'Field 1 · 7v7', value:'Field 1 (7v7)' },
    { label:'Field 2 · 6v6', value:'Field 2 (6v6)' },
  ];
  let html = `<div class="save-state" style="text-align:left;margin:0 0 12px">Slide ▲▼ to swap match slots. Edit time, or set the pitch (Field 1 = 7v7, Field 2 = 6v6) — the lineup auto-adjusts. Nothing saves until you confirm.</div>`;
  swapEditor.sets.forEach(es => {
    html += `<div class="rr-setlabel">${es.label}</div>`;
    es.order.forEach((id, i) => {
      const mu = swapEditor.mu[id];
      const fieldChanged = es.slots[i].field !== es.origSlots[i].field;
      const moved = es.origOrder[i] !== id || es.origSlots[i].time !== es.slots[i].time || fieldChanged;
      const curVal = es.slots[i].field || '';
      const known = FIELD_PRESETS.some(p=>p.value===curVal);
      const opts = (known?'':`<option value="${escHtml(curVal)}" selected>${escHtml(curVal)||'—'}</option>`) +
        FIELD_PRESETS.map(p=>`<option value="${p.value}" ${curVal===p.value?'selected':''}>${p.label}</option>`).join('');
      html += `<div class="rr-row ${moved?'moved':''}">
        <div class="rr-arrows">
          <button onclick="swapMove('${es.key}',${i},-1)" ${i===0?'disabled':''}>\u25B2</button>
          <button onclick="swapMove('${es.key}',${i},1)" ${i===es.order.length-1?'disabled':''}>\u25BC</button>
        </div>
        <div class="rr-main">
          <div class="rr-no">${escHtml(slotName(es,i))}</div>
          <div class="rr-teams">${escHtml(mu.home)} <span style="color:var(--muted)">v</span> ${escHtml(mu.away)}</div>
        </div>
        <input class="rr-time" value="${escHtml(es.slots[i].time||'')}" onchange="swapTime('${es.key}',${i},this.value)" placeholder="Time">
        <select class="rr-field ${fieldChanged?'changed':''}" onchange="swapField('${es.key}',${i},this.value)">${opts}</select>
      </div>`;
    });
  });
  const dirty = rearrangeDirty();
  html += dirty ? `<div class="rr-pending">\u25CF You have unsaved changes</div>` : '';
  html += `<button class="btn-primary" ${dirty?'':'disabled style="opacity:.5"'} onclick="reviewRearrange()">Review & apply</button>`;
  html += `<button class="btn-secondary" onclick="openScheduleLog()">\uD83D\uDCDC Change log${scheduleLog.length?' ('+scheduleLog.length+')':''}</button>`;
  html += `<button class="btn-secondary" onclick="openAdminMenu()">\u2190 Back</button>`;
  openSheet('Rearrange schedule', html);
}

function swapMove(key, i, dir){
  const es = swapEditor.sets.find(s => s.key === key);
  const j = i + dir;
  if (j < 0 || j >= es.order.length) return;
  [es.order[i], es.order[j]] = [es.order[j], es.order[i]];  // matchups swap slots; slots stay pinned
  renderRearrange();
}

function swapTime(key, i, val){
  const es = swapEditor.sets.find(s => s.key === key);
  es.slots[i].time = val.trim();
  renderRearrange();
}

function fieldFormat(field){
  const m=String(field||'').match(/(\d+)\s*v\s*(\d+)/i);
  return m ? (m[1]+'v'+m[2]) : '7v7';
}
function swapField(key, i, val){
  const es = swapEditor.sets.find(s => s.key === key);
  es.slots[i].field = val;   // value is the full field string, e.g. "Field 2 (6v6)"
  renderRearrange();
}

function rearrangeDirty(){
  return swapEditor.sets.some(es =>
    es.order.some((id,i) => id !== es.origOrder[i]) ||
    es.slots.some((sl,i) => sl.time !== es.origSlots[i].time || sl.field !== es.origSlots[i].field)
  );
}

// Per-matchup diff: where did each match start vs where does it end up?
function rearrangeChanges(){
  const out = [];
  swapEditor.sets.forEach(es => {
    es.order.forEach((id, i) => {
      const origPos = es.origOrder.indexOf(id);
      const oldTime  = es.origSlots[origPos]?.time,  newTime  = es.slots[i].time;
      const oldField = es.origSlots[origPos]?.field, newField = es.slots[i].field;
      if (oldTime !== newTime || oldField !== newField || origPos !== i) {
        const mu = swapEditor.mu[id];
        const fromParts = [oldTime, oldField].filter(Boolean).join(' · ');
        const toParts   = [newTime, newField].filter(Boolean).join(' · ');
        out.push({
          label: (mu.round ? mu.round + ' \u2014 ' : '') + mu.home + ' v ' + mu.away,
          from: fromParts || '—',
          to:   toParts   || '—',
        });
      }
    });
  });
  return out;
}

function reviewRearrange(){
  const changes = rearrangeChanges();
  if (!changes.length) { showToast('No changes to apply'); return; }
  let html = `<div class="save-state" style="text-align:left;margin:0 0 12px">Confirm the schedule changes below. Add a short reason so the team has a record of why.</div>`;
  html += `<div class="rr-diff">` + changes.map(c =>
    `<div><b>${escHtml(c.label)}</b><br>${escHtml(c.from)} <span class="arrow">\u2192</span> ${escHtml(c.to)}</div>`
  ).join('<div style="height:8px"></div>') + `</div>`;
  html += `<div class="field"><label>Reason / note (optional)</label>
    <textarea class="rr-note-input" id="swap-reason" placeholder="e.g. Team requested swap \u2014 player arriving late"></textarea></div>`;
  html += `<button class="btn-primary" onclick="confirmRearrange()">Confirm changes</button>`;
  html += `<button class="btn-secondary" onclick="renderRearrange()">\u2190 Keep editing</button>`;
  openSheet('Confirm changes', html);
}

function confirmRearrange(){
  const changes = rearrangeChanges();
  const note = (document.getElementById('swap-reason')||{}).value || '';
  // Apply working copy to live data: reorder each set, re-pin slot fields to position.
  swapEditor.sets.forEach(es => {
    const set = setByKey(es.key); if(!set) return;
    const byId = {}; set.arr.forEach(m => byId[m.id] = m);
    const newArr = es.order.map(id => byId[id]).filter(Boolean);
    newArr.forEach((m, i) => {
      m.time = es.slots[i].time;
      if (es.slots[i].field !== undefined) m.field = es.slots[i].field;
      if (es.slots[i].no !== undefined) m.no = es.slots[i].no;
      // If the format (starter count) changed, drop the lineup so ensureLineup rebuilds to the new size
      const want = starterCount(m);
      ['home','away'].forEach(side=>{
        const ln = m.lineup && m.lineup[side];
        if (ln && Array.isArray(ln.starters) && ln.starters.length !== want) m.lineup = null;
      });
    });
    set.arr.length = 0; newArr.forEach(m => set.arr.push(m));
  });
  scheduleLog.unshift({
    at: Date.now(), by: adminSession,
    note: note.trim(),
    changes: changes.map(c => `${c.label}: ${c.from} → ${c.to}`)
  });
  if (scheduleLog.length > 50) scheduleLog.length = 50;
  swapEditor = null;
  saveData();
  renderAll();
  closeModal();
  showToast('Schedule updated');
}

function openScheduleLog(){
  let html = `<div class="save-state" style="text-align:left;margin:0 0 12px">A record of every schedule change made, with reasons.</div>`;
  if (!scheduleLog.length) {
    html += `<div class="empty" style="padding:20px;text-align:center;color:var(--muted)">No changes logged yet.</div>`;
  } else {
    html += scheduleLog.map(e => {
      const t = new Date(e.at);
      const when = `${String(t.getHours()).padStart(2,'0')}:${String(t.getMinutes()).padStart(2,'0')} \u00B7 ${t.getDate()}/${t.getMonth()+1}`;
      return `<div class="rr-logitem">
        <div class="rr-logmeta">${when} \u00B7 ${escHtml((e.by||'').toUpperCase())} admin</div>
        ${(e.changes||[]).map(c=>escHtml(c)).join('<br>')}
        ${e.note ? `<div style="margin-top:5px;color:var(--orange-d)"><b>Reason:</b> ${escHtml(e.note)}</div>` : ''}
      </div>`;
    }).join('');
  }
  html += `<button class="btn-secondary" onclick="${swapEditor?'renderRearrange()':'openAdminMenu()'}">\u2190 Back</button>`;
  openSheet('Schedule change log', html);
}

// Override clock + import handlers from the engine so they refresh the new UI.
function startClock(id){ const m=getMatchById(id); if(!m)return; if(!m.clockRunning){m.clockRunning=true;m.clockStart=Date.now();if(m.status==='upcoming')m.status='live';} saveData(); renderAll(); }
function pauseClock(id){ const m=getMatchById(id); if(!m)return; m.clockElapsed=clockSeconds(m); m.clockRunning=false; m.clockStart=null; saveData(); renderAll(); }
function resetClock(id){ const m=getMatchById(id); if(!m)return; m.clockElapsed=0; m.clockRunning=false; m.clockStart=null; saveData(); renderAll(); }
function importData(input){
