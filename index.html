function pickFeatured(ms){
  var live=ms.find(function(m){return m.status==='live';}); if(live)return live;
  var up=ms.find(function(m){return m.status==='upcoming';}); if(up)return up;
  var fts=ms.filter(function(m){return m.status==='ft';}); if(fts.length)return fts[fts.length-1];
  return ms[0]||null;
}
function renderUpNext(){
  var el=document.getElementById('home-upnext'); if(!el||!data||!data.male) return;
  var all=[].concat(
    data.male.groupA.matches,data.male.groupB.matches,data.male.knockout,
    data.female.group.matches,data.female.knockout);

  // ── Match card builder ──────────────────────────────────────────────────
  function matchCard(m, isLive){
    var ft=m.status==='ft';
    var tag=isLive
      ?'<span class="upnext-tag"><span class="dot"></span>LIVE</span>'
      :ft?'<span class="upnext-tag" style="color:var(--muted)">FULL TIME</span>'
      :'<span class="upnext-tag" style="color:var(--green-d)">&#9654; UP NEXT</span>';
    var ctr=isLive
      ?'<div class="upnext-sc">'+((m.homeScore??0)+' - '+(m.awayScore??0))+'</div><div class="upnext-clock">'+fmtClock(clockSeconds(m))+"'</div>"
      :ft
      ?'<div class="upnext-sc">'+((m.homeScore??0)+' - '+(m.awayScore??0))+'</div>'
      :'<div class="upnext-vs">vs</div><div class="upnext-time">'+escHtml(m.time||'—')+'</div>';
    var homeLogo=getLogo(m.home);var awayLogo=getLogo(m.away);
    function avHtml(logo){
      if(logo.startsWith('<svg')) return '<div class="upnext-logo-svg">'+logo+'</div>';
      if(logo.startsWith('data:')||logo.startsWith('http')) return '<img src="'+logo+'" class="upnext-logo-img">';
      return '<span class="upnext-logo-emoji">'+logo+'</span>';
    }
    var homeAv=avHtml(homeLogo);var awayAv=avHtml(awayLogo);
    return '<div class="upnext-card" onclick="(function(){goMatches();openMatch(\''+m.id+'\')})()">'+
      tag+
      '<div class="upnext-score">'+
        '<div class="upnext-team">'+homeAv+'<span class="nm">'+escHtml(m.home)+'</span></div>'+
        '<div class="upnext-ctr">'+ctr+'</div>'+
        '<div class="upnext-team">'+awayAv+'<span class="nm">'+escHtml(m.away)+'</span></div>'+
      '</div></div>';
  }

  // ── Pick matches to show ────────────────────────────────────────────────
  var liveMatches=all.filter(function(x){return x.status==='live';});
  var upcoming=all.filter(function(x){return x.status==='upcoming';});
  var ftMatches=all.filter(function(x){return x.status==='ft';});

  var html='';

  // Live section: show ALL live matches
  if(liveMatches.length){
    html+='<div class="upnext-lbl">&#128250; Live now</div>';
    liveMatches.forEach(function(m){ html+=matchCard(m,true); });
  }

  // Up next section: always show next upcoming (even when live matches running)
  if(upcoming.length){
    var nextTime=upcoming[0].time||'';
    var sameTime=upcoming.filter(function(x){return (x.time||'')===(nextTime);});
    html+='<div class="upnext-lbl" style="margin-top:12px">Up next</div>';
    sameTime.forEach(function(m){ html+=matchCard(m,false); });
  }

  // Fall back when nothing live/upcoming: last FT match
  if(!liveMatches.length&&!upcoming.length&&ftMatches.length){
    html+='<div class="upnext-lbl">Recent match</div>';
    html+=matchCard(ftMatches[ftMatches.length-1],false);
  }

  // ── Group leaders ───────────────────────────────────────────────────────
  function groupLeader(teams, matches, label){
    var rows=computeStandings(teams,matches);
    if(!rows.length||rows[0].played===0) return '';
    var t=rows[0];
    var logo=getLogo(t.name);
    var av=logo.startsWith('<svg')?'<div class="home-stat-logo-svg">'+logo+'</div>':logo.startsWith('data:')||logo.startsWith('http')?'<img src="'+logo+'" class="home-stat-logo">':'<span style="font-size:22px">'+logo+'</span>';
    return '<div class="home-stat-row">'+av+
      '<div class="home-stat-info"><span class="home-stat-name">'+escHtml(t.name)+'</span>'+
      '<span class="home-stat-sub">'+escHtml(label)+'</span></div>'+
      '<div class="home-stat-val">'+t.pts+' pts</div></div>';
  }
  var leaders=
    groupLeader(data.male.groupA.teams,data.male.groupA.matches,'Male · Group A')+
    groupLeader(data.male.groupB.teams,data.male.groupB.matches,'Male · Group B')+
    groupLeader(data.female.group.teams,data.female.group.matches,'Female · Group');

  // ── Top scorer ──────────────────────────────────────────────────────────
  var allGoals=computeScorers([].concat(
    data.male.groupA.matches,data.male.groupB.matches,data.male.knockout,
    data.female.group.matches,data.female.knockout));
  var topStr='';
  if(allGoals.length&&allGoals[0].goals>0){
    var ts=allGoals[0];
    var tsLogo=getLogo(ts.team);
    var tsAv=tsLogo.startsWith('<svg')?'<div class="home-stat-logo-svg">'+tsLogo+'</div>':tsLogo.startsWith('data:')||tsLogo.startsWith('http')?'<img src="'+tsLogo+'" class="home-stat-logo">':'<span style="font-size:22px">'+tsLogo+'</span>';
    topStr='<div class="home-stat-row">'+tsAv+
      '<div class="home-stat-info"><span class="home-stat-name">'+escHtml(ts.name)+'</span>'+
      '<span class="home-stat-sub">'+escHtml(ts.team)+'</span></div>'+
      '<div class="home-stat-val">⚽ '+ts.goals+'</div></div>';
  }

  if(leaders||topStr){
    html+='<div class="home-stats-card">';
    if(leaders){
      html+='<div class="home-stat-lbl">&#127942; Top of group</div>'+leaders;
    }
    if(topStr){
      html+=leaders?'<div class="home-stat-divider"></div>':'';
      html+='<div class="home-stat-lbl">&#9917; Top scorer</div>'+topStr;
    }
    html+='</div>';
  }

  if(html){
    html+='<div class="upnext-cta"><button onclick="goMatches()">View all matches</button></div>';
  }
  el.innerHTML=html;
}
function pickFeaturedAll(ms){
  // All live matches
  var lives=ms.filter(function(m){return m.status==='live';});
  if(lives.length) return lives;
  // All upcoming matches sharing the same earliest start time
  var ups=ms.filter(function(m){return m.status==='upcoming';});
  if(ups.length){
    var t=ups[0].time||'';
    return ups.filter(function(m){return (m.time||'')===t;});
  }
  // Fall back to last FT match
  var fts=ms.filter(function(m){return m.status==='ft';});
  if(fts.length) return [fts[fts.length-1]];
  return ms.length?[ms[0]]:[];
}
function featuredCard(m){
  if(!m) return '<div class="feat"><div class="feat-tag up">No matches yet</div></div>';
  return featuredCards([m]);
}
function featuredCards(matches){
  if(!matches||!matches.length) return '<div class="feat"><div class="feat-tag up">No matches yet</div></div>';
  var posterEl=document.getElementById('dash-poster');
  var bgStyle=posterEl&&posterEl.src?'background-image:url('+posterEl.src+');':'';
  function oneMatch(m){
    var live=m.status==='live';
    var tag=live?'<span class="feat-tag"><span class="dot"></span>LIVE</span>'
      :m.status==='ft'?'<span class="feat-tag up">FULL TIME</span>':'<span class="feat-tag up">UP NEXT</span>';
    var score=(m.status==='upcoming')
      ? '<div class="feat-score">vs<small>'+(escHtml(m.time||''))+'</small></div>'
      : '<div class="feat-score">'+(m.homeScore!=null?m.homeScore:0)+' - '+(m.awayScore!=null?m.awayScore:0)+'<small>'+(live?fmtClock(clockSeconds(m))+"'":(m.status==='ft'?'Full time':''))+'</small></div>';
    var homeL=getLogo(m.home);var awayL=getLogo(m.away);
    function av(l){return l.startsWith('<svg')?'<div class="feat-logo-svg">'+l+'</div>':l.startsWith('data:')||l.startsWith('http')?'<img src="'+l+'" class="feat-logo-img">':'<span class="cr">'+l+'</span>';}
    return '<div class="feat-match-block" onclick="openMatch(\''+m.id+'\')">'+
      tag+'<div class="feat-meta">'+(m.field?escHtml(m.field):'')+'</div>'+
      '<div class="feat-grid">'+
        '<div class="feat-team">'+av(homeL)+'<span class="nm">'+escHtml(m.home)+'</span></div>'+
        score+
        '<div class="feat-team">'+av(awayL)+'<span class="nm">'+escHtml(m.away)+'</span></div>'+
      '</div></div>';
  }
  var multi=matches.length>1;
  return '<div class="feat" style="'+bgStyle+'"><div class="feat-overlay"></div>'+
    '<div class="'+(multi?'feat-multi':'feat-single')+'">'+
      matches.map(oneMatch).join(multi?'<div class="feat-divider"></div>':'')+
    '</div>'+
    '<div class="feat-cta"><button onclick="goMatches()">All fixtures</button></div></div>';
}
function railAgenda(){
  var ag=(eventInfo.agenda||[]).filter(function(a){return !a.header;}).slice(0,6);
  if(!ag.length) return '';
  return '<div class="panel-card"><h3>&#9201; Schedule</h3>'+ag.map(function(a){
    return '<div style="display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--line)"><b style="font-family:\'Archivo Narrow\';color:var(--green-d);min-width:70px;font-size:12px">'+escHtml(a.time||'')+'</b><span style="font-size:13px">'+escHtml(a.title||'')+'</span></div>';
  }).join('')+'</div>';
}
function renderDashboard(){
  var body=document.getElementById('dash-body'); if(!body||!data||!data.male)return;
  var div=dashDiv;
  var dball=div==='male'?[].concat(data.male.groupA.matches,data.male.groupB.matches,data.male.knockout)
                        :[].concat(data.female.group.matches,data.female.knockout);
  var everything=[].concat(data.male.groupA.matches,data.male.groupB.matches,data.male.knockout,data.female.group.matches,data.female.knockout);
  var feats=pickFeaturedAll(everything);
  var fixturesHtml=div==='male'
    ? fixturesBlock('Group A',data.male.groupA.matches)+fixturesBlock('Group B',data.male.groupB.matches)+fixturesBlock('Knockouts',data.male.knockout,true)
    : fixturesBlock('Group stage',data.female.group.matches)+fixturesBlock('Final',data.female.knockout,true);
  var tables=div==='male'
    ? '<div class="panel-card"><h3>&#127942; Group A table</h3>'+standTable(data.male.groupA.teams,data.male.groupA.matches)+'</div>'+
      '<div class="panel-card"><h3>&#127942; Group B table</h3>'+standTable(data.male.groupB.teams,data.male.groupB.matches)+'</div>'
    : '<div class="panel-card"><h3>&#127942; Standings</h3>'+standTable(data.female.group.teams,data.female.group.matches)+'</div>';
  var scorers='<div class="panel-card"><h3>&#9917; Top scorers</h3>'+scorersTable(dball)+'</div>';
  body.innerHTML=featuredCards(feats)+
    '<div class="dash-grid"><div><div class="panel-card"><h3>&#128197; Fixtures</h3><div class="dash-fixtures">'+fixturesHtml+'</div></div></div>'+
    '<div class="dash-rail">'+tables+scorers+railAgenda()+'</div></div>';
}

function renderTimeline(m){
  const admin=adminSession===matchDivision(m.id);
  const evs=(m.events||[]).map((e,idx)=>({...e,_i:idx}));
  evs.sort((a,b)=>(parseInt(b.minute)||0)-(parseInt(a.minute)||0));
  if(!evs.length) return `<div class="timeline"><div class="tl-empty">No goals or cards yet.</div></div>`;
  const rows=evs.map(e=>{
    const side=e.team==='away'?'away':'home';
    const team=side==='home'?m.home:m.away;
    const no=jerseyNo(team,e.player);
    const meta=EVENT_META[e.type]||EVENT_META.goal;
    const txt=`<div class="tl-text"><div class="tl-type" style="color:${meta.color}">${meta.label}</div><div class="tl-name">${no?no+' | ':''}${e.player||''}</div></div>`;
    const icon=`<span class="tl-icon">${meta.icon}</span>`;
    const bubble=`<span class="tl-min" style="border-color:${meta.color};color:${meta.color}">${(e.minute!==''&&e.minute!=null)?e.minute+"'":'-'}</span>`;
    const del=admin?`<button class="tl-edit" onclick="editEvent('${m.id}',${e._i})" title="Edit / delete">\u270E</button>`:'';
    if(side==='home'){
      return `<div class="tl-row"><div class="tl-side left">${del}${txt}${icon}</div><div class="tl-center">${bubble}</div><div class="tl-side right"></div></div>`;
    }
    return `<div class="tl-row"><div class="tl-side left"></div><div class="tl-center">${bubble}</div><div class="tl-side right">${icon}${txt}${del}</div></div>`;
  }).join('');
  return `<div class="timeline">${rows}</div>`;
}
function renderMatchScreen(id){
  const m=getMatchById(id); if(!m)return;
  const div=matchDivision(id);
  const admin=adminSession===div;
  const accent=divAccent(div);
  const hs=m.status==='upcoming'?'\u2013':(m.homeScore??0);
  const as=m.status==='upcoming'?'\u2013':(m.awayScore??0);
  const running=!!m.clockRunning;
  const statusTxt=m.status==='live'?'LIVE':m.status==='ft'?'FULL TIME':'KICKOFF '+(m.time||'');
  const bar = m.status==='upcoming' ? statusTxt : `${statusTxt} \u00B7 ${m.homeScore??0} : ${m.awayScore??0}`;
  const dock = `
    <div class="md-dock"><div class="dock-inner">
      ${admin?`<div class="console">
        <button class="act act-goal" onclick="quickGoal('home')">\u26BD Goal</button>
        <button class="act act-evt" onclick="quickEvent('home')">+ Event</button>
        <button class="act act-evt" onclick="quickEvent('away')">+ Event</button>
        <button class="act act-goal" onclick="quickGoal('away')">\u26BD Goal</button>
      </div>`:''}
      <div class="md-footer">
        <div class="mf-side">${admin?`<button class="mf-btn" onclick="resetClock('${id}')">Reset</button>`:''}</div>
        <div class="mf-clock"><div class="mf-status">${m.status==='ft'?'FULL TIME':m.status==='live'?'LIVE':'CLOCK'}</div>
          <div class="mf-time" id="modalclock-${id}">${fmtClock(clockSeconds(m))}</div></div>
        <div class="mf-side right">${admin?`<button class="mf-btn ${running?'stop':'start'}" onclick="${running?`pauseClock('${id}')`:`startClock('${id}')`}">${running?'Pause':'Start'}</button>`:''}</div>
      </div>
    </div></div>`;
  document.getElementById('match-body').innerHTML=`
    <div class="md-top" style="background:${accent}"><button class="md-back" onclick="backToList()">\u2039 Back</button></div>
    <div class="md-scoreboard">

function confirmEvent(side){
  const m=getMatchById(openMatchId); if(!m)return;
  const type=document.getElementById('sheet-type').value;
  const player=document.getElementById('sheet-player').value;
  const minute=document.getElementById('sheet-min').value;
  if(!player){showToast('Choose a player');return;}
  m.events=m.events||[]; m.events.push({team:side,type,player,minute});
  saveData(); closeModal(); renderAll(); showToast('Event added');
}
function removeEvent(id,idx){
  const m=getMatchById(id); if(!m||!m.events[idx])return;
  const ev=m.events[idx];
  if(ev.pair){
    ensureLineup(m); const L=m.lineup[ev.team];
    const onEv=m.events.find(e=>e.pair===ev.pair&&e.type==='sub_on');
    const offEv=m.events.find(e=>e.pair===ev.pair&&e.type==='sub_off');
    if(onEv&&offEv){ const si=L.starters.indexOf(onEv.player); if(si>=0)L.starters[si]=offEv.player; const bi=L.bench.indexOf(offEv.player); if(bi>=0)L.bench[bi]=onEv.player; }
    m.events=m.events.filter(e=>e.pair!==ev.pair);
    saveData(); closeModal(); renderAll(); showToast('Substitution removed'); return;
  }
  m.events.splice(idx,1); recomputeScore(m); saveData(); closeModal(); renderAll(); showToast('Event deleted');
}

let teamOverrides = {};   // id -> {nick?, role?, photo?, dept?, deleted?}  (also holds admin-added members)
let teamUnsub = null;

function subscribeTeam(){
  if(!db || teamUnsub) return;
  teamUnsub = db.collection(TEAM_COLL).onSnapshot(snap=>{
    teamOverrides = {};
    snap.docs.forEach(d=>{ teamOverrides[d.id] = d.data(); });
    if(document.getElementById('screen-team').classList.contains('active')) renderTeam();
  }, e=>console.error('[team]', e));
}

// merge baked seed with Firestore overrides → final member list
function teamMembers(){
  const out = [];
  const seedIds = new Set();
  TEAM_SEED.forEach(s=>{
    seedIds.add(s.id);
    const ov = teamOverrides[s.id] || {};
    if(ov.deleted) return;
    out.push({ id:s.id, user:s.user,
      nick: ov.nick!==undefined ? ov.nick : s.nick,
      role: ov.role!==undefined ? ov.role : s.role,
      dept: ov.dept!==undefined ? ov.dept : s.dept,
      lead: ov.lead!==undefined ? ov.lead : (s.lead||false),
      head: ov.head!==undefined ? ov.head : (s.head||false),
      subhead: ov.subhead!==undefined ? ov.subhead : (s.subhead||false),
      photo: ov.photo || '' });
  });
  // admin-added members (ids not in seed)
  Object.keys(teamOverrides).forEach(id=>{
    if(seedIds.has(id)) return;
    const ov = teamOverrides[id];
    if(ov.deleted) return;
    out.push({ id, user:ov.user||'', nick:ov.nick||'', role:ov.role||'', dept:ov.dept||'Lens & Code', lead:!!ov.lead, head:!!ov.head, subhead:!!ov.subhead, photo:ov.photo||'' });
  });
  return out;
}

function subgroupSports(arr){
  const g={'Big Field 7v7':[], 'Small Field 6v6':[], 'General':[]};
  arr.forEach(m=>{

    if(r.includes('7v7')||r.includes('big field')) g['Big Field 7v7'].push(m);
    else if(r.includes('6v6')||r.includes('small field')) g['Small Field 6v6'].push(m);

  return g;
}

function renderTeam(){
  const el = document.getElementById('team-body'); if(!el) return;
  const members = teamMembers();
  const admin = !!adminSession;
  const heads = members.filter(m=>m.head);
  if(!members.length){ el.innerHTML = `<div class="info-card"><p>No team members yet.</p></div>`; return; }

  let html = '';
  if(admin) html += `<button class="btn-primary" style="margin-bottom:16px" onclick="openTeamManage()">\u270E Manage team</button>`;

  const subheads = members.filter(m=>m.subhead && !m.head);

  html += `<div class="oc">`;
  // ---- top: head coordinator ----
  if(heads.length){
    html += `<div class="oc-top">` + heads.map(m=>`
      <div class="oc-head" onclick="${admin?`openTeamEdit('${m.id}')`:`viewTeamMember('${m.id}')`}">
        ${teamAvatar(m,true)}
        <div class="oc-head-info">
          <div class="oc-head-tag">Head coordinator</div>
          <div class="oc-head-nm">${escHtml(teamDisplayName(m))}</div>
          <div class="oc-head-rl">${escHtml(m.role||'')}</div>
        </div>
      </div>`).join('') + `</div>` + (subheads.length||true ? `<div class="oc-trunk"></div>` : '');
  }
  // ---- second level: deputies / cross-event roles (below head) ----
  if(subheads.length){
    html += `<div class="oc-subtop">` + subheads.map(m=>`
      <div class="oc-subhead" onclick="${admin?`openTeamEdit('${m.id}')`:`viewTeamMember('${m.id}')`}">
        ${teamAvatar(m)}
        <div class="oc-subhead-info">
          <div class="oc-subhead-nm">${escHtml(teamDisplayName(m))}</div>
          <div class="oc-subhead-rl">${escHtml(m.role||'')}</div>
        </div>
      </div>`).join('') + `</div><div class="oc-trunk"></div>`;
  }

  // ---- tree of departments (left spine + branch stubs) ----
  html += `<div class="oc-tree">`;
  const known = new Set(TEAM_DEPTS);
  const renderDept = (dept)=>{
    const inDept = members.filter(m=>m.dept===dept && !m.head && !m.subhead);
    if(!inDept.length) return '';
    const leads = inDept.filter(m=>m.lead);
    const rest  = inDept.filter(m=>!m.lead);
    let h = `<div class="oc-branch"><div class="oc-dept">
      <div class="oc-dept-head"><span class="oc-dept-ic">${DEPT_ICON[dept]||'\uD83D\uDC65'}</span> ${escHtml(dept)} <span class="oc-count">${inDept.length}</span></div>`;
    if(leads.length) h += `<div class="oc-row oc-pocs">${leads.map(m=>ocNode(m,admin,'poc')).join('')}</div>`;
    if(leads.length && rest.length) h += `<div class="oc-link"></div>`;
    if(dept==='Sports'){
      const g = subgroupSports(rest);
      Object.keys(g).forEach(label=>{
        const a=g[label]; if(!a.length) return;
        h += `<div class="oc-sub">${escHtml(label)}</div><div class="oc-row">${a.map(m=>ocNode(m,admin,'mem')).join('')}</div>`;
      });
    } else if(rest.length){
      h += `<div class="oc-row">${rest.map(m=>ocNode(m,admin,'mem')).join('')}</div>`;
    }
    return h + `</div></div>`;
  };
  TEAM_DEPTS.forEach(dept=>{ html += renderDept(dept); });
  // catch-all: any member with a department not in TEAM_DEPTS still shows
  const extraDepts = [...new Set(members.filter(m=>!m.head && !m.subhead && !known.has(m.dept)).map(m=>m.dept))];
  extraDepts.forEach(dept=>{ html += renderDept(dept); });
  html += `</div></div>`;
  el.innerHTML = html;
}

async function teamHandlePhoto(input){
  const file=input.files[0]; if(!file) return;
  const r=new FileReader();
  r.onload=async e=>{
    const c=await teamCompress(e.target.result, 240, 240, 0.72);
    teamPhotoBuf=c;
    const img=document.getElementById('tm-edit-img');
    const av=document.getElementById('tm-edit-av');
    if(img){ img.src=c; } else { av.innerHTML=`<img src="${c}" id="tm-edit-img">`; }
  };
  r.readAsDataURL(file);
}
function teamCompress(dataUrl,maxW,maxH,q){
  return new Promise(res=>{
    const img=new Image();
    img.onload=()=>{
      const cv=document.createElement('canvas');
      let w=img.width,h=img.height;
      if(w>h){ if(w>maxW){h=h*maxW/w;w=maxW;} } else { if(h>maxH){w=w*maxH/h;h=maxH;} }
      cv.width=w; cv.height=h; cv.getContext('2d').drawImage(img,0,0,w,h);
      res(cv.toDataURL('image/jpeg',q));
    };
    img.src=dataUrl;
  });
}
async function saveTeamEdit(isNew){
  if(!db){ showToast('Cloud not connected'); return; }
  const nick=(document.getElementById('tm-nick').value||'').trim();
  const role=(document.getElementById('tm-role').value||'').trim();
  const dept=document.getElementById('tm-dept').value;
  const rank=document.getElementById('tm-rank').value;
  let id=document.getElementById('tm-id').value;
  // Write fields explicitly (no trimming) — merge:true would otherwise leave a
  // stale override when a value is changed back to its seed default.
  const payload = { nick, role, dept, lead: rank==='lead', head: rank==='head', subhead: rank==='subhead' };
  if(teamPhotoBuf) payload.photo = teamPhotoBuf;
  if(isNew){
    id = 'tx_'+Date.now().toString(36);
    const user=(document.getElementById('tm-user')||{}).value||'';
    payload.user=user.trim();
  }
  try{
    await db.collection(TEAM_COLL).doc(id).set(payload, {merge:true});
    showToast('Saved'); openTeamManage();
  }catch(e){ showToast('Error: '+e.message); }
}
async function deleteTeamMember(id){
  if(!confirm('Remove this person from the team?')) return;
  const seed = TEAM_SEED.find(s=>s.id===id);
  try{
    if(seed) await db.collection(TEAM_COLL).doc(id).set({deleted:true}, {merge:true});  // hide seed member
    else await db.collection(TEAM_COLL).doc(id).delete();                                // remove added member
    showToast('Removed'); openTeamManage();
  }catch(e){ showToast('Error: '+e.message); }
}

function rr2SwapTimes(){
  const na=parseInt((document.getElementById('sw-a')||{}).value);
  const nb=parseInt((document.getElementById('sw-b')||{}).value);
  if(!na||!nb||na===nb){ showToast('Enter two different match numbers'); return; }
  const rows=[...document.querySelectorAll('.rr2-row:not(.rr2-deleted)')];
  const rowA=rows.find(r=>parseInt(r.querySelector('.rr2-no').value)===na);
  const rowB=rows.find(r=>parseInt(r.querySelector('.rr2-no').value)===nb);
  if(!rowA){ showToast('Match #'+na+' not found'); return; }
  if(!rowB){ showToast('Match #'+nb+' not found'); return; }
  const tA=rowA.querySelector('.rr2-time'); const tB=rowB.querySelector('.rr2-time');
  const fA=rowA.querySelector('.rr2-field'); const fB=rowB.querySelector('.rr2-field');
  [tA.value,tB.value]=[tB.value,tA.value];
  [fA.value,fB.value]=[fB.value,fA.value];
  // Visual flash
  [rowA,rowB].forEach(r=>{ r.classList.add('rr2-swapped'); setTimeout(()=>r.classList.remove('rr2-swapped'),1200); });
  showToast('Swapped #'+na+' ↔ #'+nb);
}

function applyMatchEdits(){
  const rows=[...document.querySelectorAll('.rr2-row')];
  const toDelete=new Set();
  const edits=[];
  let errors=[];

  rows.forEach(row=>{
    const id=row.dataset.id;
    if(row.classList.contains('rr2-deleted')){ toDelete.add(id); return; }
    const no=parseInt(row.querySelector('.rr2-no').value)||0;
    const home=(row.querySelector('.rr2-home').value||'').trim();
    const away=(row.querySelector('.rr2-away').value||'').trim();
    const time=(row.querySelector('.rr2-time').value||'').trim();
    const field=row.querySelector('.rr2-field').value||'';
    if(home===away) errors.push('#'+no+': home = away ('+escHtml(home)+')');
    edits.push({id, no, home, away, time, field});
  });

  if(errors.length){ showToast('Error: '+errors[0]); return; }

  // Build change summary for log
  const changes=[];
  edits.forEach(e=>{
    const m=getMatchById(e.id); if(!m) return;
    const parts=[];
    if(m.no!==e.no) parts.push('# '+m.no+'→'+e.no);
    if(m.home!==e.home) parts.push('home: '+m.home+'→'+e.home);
    if(m.away!==e.away) parts.push('away: '+m.away+'→'+e.away);
    if(m.time!==e.time) parts.push('time: '+(m.time||'?')+'→'+e.time);
    if(m.field!==e.field) parts.push('field: '+(m.field||'?')+'→'+e.field);
    if(parts.length) changes.push(e.home+' v '+e.away+': '+parts.join(', '));
  });
  if(toDelete.size) toDelete.forEach(id=>{ const m=getMatchById(id); if(m) changes.push('DELETED: '+m.home+' v '+m.away); });

  // Apply edits
  edits.forEach(e=>{
    const m=getMatchById(e.id); if(!m) return;
    m.no=e.no; m.home=e.home; m.away=e.away; m.time=e.time; m.field=e.field;
    // Reset lineup if format changed
    const want=starterCount(m);
    ['home','away'].forEach(side=>{
      const ln=m.lineup&&m.lineup[side];
      if(ln&&Array.isArray(ln.starters)&&ln.starters.length!==want) m.lineup=null;
    });
  });

  // Apply deletions — remove from each set's array
  if(toDelete.size){
    namedMatchSets().forEach(s=>{
      const before=s.arr.length;
      s.arr.splice(0,s.arr.length,...s.arr.filter(m=>!toDelete.has(m.id)));
    });
  }

  if(changes.length) scheduleLog.unshift({at:Date.now(), by:adminSession, msg:changes.join(' | ')});
  saveData(); renderAll();
  showToast(changes.length?'Saved — '+changes.length+' change'+(changes.length>1?'s':''):'No changes to save');
  openRearrange();
}

// ═══════════════════════════════════════════
// LINEUP  (formation pitch + bench + paired subs)
// ═══════════════════════════════════════════
function starterCount(m){ const mt=(m.field||'').match(/(\d+)\s*v/i); return mt?parseInt(mt[1]):7; }
function ensureLineup(m){
  const n=starterCount(m);
  if(!m.lineup) m.lineup={};
  ['home','away'].forEach(side=>{
    const team=side==='home'?m.home:m.away;
    const roster=(PLAYERS[team]||[]);
    const rosterSet=new Set(roster);
    const L=m.lineup[side];
    if(!L || !Array.isArray(L.starters) || !Array.isArray(L.bench)){
      m.lineup[side]={starters:roster.slice(0,n),bench:roster.slice(n)};   // fresh
      return;
    }
    let starters=L.starters.slice(), bench=L.bench.slice();
    // Roster players not currently placed anywhere (e.g. added players, or players
    // whose name changed in the roster) — used to refill stale/empty slots in order.
    const placed=new Set([...starters,...bench].filter(x=>rosterSet.has(x)));
    const unplaced=roster.filter(p=>!placed.has(p));
    let ui=0;
    const fix=arr=>arr.map(x=> rosterSet.has(x) ? x : (ui<unplaced.length?unplaced[ui++]:null)).filter(x=>x!=null);
    starters=fix(starters); bench=fix(bench);
    while(ui<unplaced.length) bench.push(unplaced[ui++]);   // append any leftovers
    const seen=new Set();
    const dedupe=a=>a.filter(x=>(rosterSet.has(x)&&!seen.has(x)) ? (seen.add(x),true) : false);
    starters=dedupe(starters); bench=dedupe(bench);
    while(starters.length<n && bench.length) starters.push(bench.shift());   // fill up to format
    while(starters.length>n) bench.unshift(starters.pop());                  // trim extras to bench
    m.lineup[side]={starters,bench};
  });
}
function shortName(n){ const p=String(n||'').trim().split(/\s+/); return p.length>=2 ? p[0][0]+'. '+p[p.length-1] : (n||''); }
function shortInit(n){ const p=String(n||'').trim().split(/\s+/); return (p[0]?p[0][0]:'')+(p.length>=2?p[p.length-1][0]:''); }
function formationRows(n){
  if(n<=0)return[]; if(n===7)return[1,3,2,1]; if(n===6)return[1,2,2,1]; if(n===5)return[1,2,2];
  const rest=n-1, per=Math.max(1,Math.ceil(rest/3)), rows=[1]; let r=rest;
  while(r>0){ const t=Math.min(per,r); rows.push(t); r-=t; } return rows;
}
function sliceRows(arr,counts){ const out=[]; let i=0; counts.forEach(c=>{ out.push(arr.slice(i,i+c)); i+=c; }); if(i<arr.length)out.push(arr.slice(i)); return out; }
function playerBadges(m,side,name){
  let goals=0,yellow=false,red=false,subOff=false,subOn=false;
  (m.events||[]).forEach(e=>{ if(e.team!==side||e.player!==name)return;
    if(e.type==='goal')goals++; else if(e.type==='yellow')yellow=true; else if(e.type==='red')red=true;
    else if(e.type==='sub_off')subOff=true; else if(e.type==='sub_on')subOn=true; });
  return {goals,yellow,red,subOff,subOn};
}
function playerToken(m,team,name,side){
  const num=jerseyNo(team,name); const b=playerBadges(m,side,name);
  const card=b.red?'<span class="pt-card red"></span>':b.yellow?'<span class="pt-card yel"></span>':'';
  const sub=b.subOff?'<span class="pt-sub off">\u25BE</span>':'';
  const goal=b.goals?`<span class="pt-goal">\u26BD${b.goals>1?'\u00D7'+b.goals:''}</span>`:'';
  return `<div class="ptoken"><div class="pt-shirt ${side} ${b.subOff?'off':''}">${num||''}${card}${sub}</div><div class="pt-name">${goal}${shortName(name)}</div></div>`;
}
function renderHalf(m,side){
  const team=side==='home'?m.home:m.away; const L=m.lineup[side];
  let rows=sliceRows(L.starters, formationRows(L.starters.length));
  if(side==='away')rows=rows.slice().reverse();
  return `<div class="phalf ${side}">${rows.map(r=>`<div class="prow">${r.map(p=>playerToken(m,team,p,side)).join('')}</div>`).join('')}</div>`;
}
function renderBenchCol(m,side){
  const team=side==='home'?m.home:m.away; const L=m.lineup[side];
  const items=L.bench.length ? L.bench.map(p=>{
    const b=playerBadges(m,side,p);
    const status=b.subOn?'<span class="bon">\u25B2</span>':b.red?'<span class="pt-card red" style="position:static"></span>':b.yellow?'<span class="pt-card yel" style="position:static"></span>':'';
    return `<div class="bitem"><div class="bava">${shortInit(p)}</div><div class="binfo"><div class="bname">${p}</div><div class="bnum">#${jerseyNo(team,p)}</div></div>${status}</div>`;
  }).join('') : '<div class="bench-empty">No bench players</div>';
  return `<div class="bcol ${side}"><div class="bteam">${getLogo(team)}<span>${team}</span></div>${items}</div>`;
}
function renderLineup(m){
  ensureLineup(m);
  const n=starterCount(m);
  const lineupBtns=[], subBtns=[];
  ['home','away'].forEach(side=>{
    const team=side==='home'?m.home:m.away;
    if(canEditLineup(m,team)) lineupBtns.push(`<button onclick="openLineupEditor('${side}')">\u270E Lineup \u00B7 ${team}</button>`);
    if(canSub(m,team))        subBtns.push(`<button onclick="openSubSheet('${side}')">\u21C4 Sub \u00B7 ${team}</button>`);
  });
  const tools = (lineupBtns.length?`<div class="lu-tools">${lineupBtns.join('')}</div>`:'')
              + (subBtns.length?`<div class="sub-bar">${subBtns.join('')}</div>`:'');
  // Manager of a team in this match, after kickoff: show why lineup editing is gone.
  const myTeamHere = managerSession===m.home || managerSession===m.away;
  const lock = (managerSession && myTeamHere && m.status!=='upcoming')
    ? `<div class="lu-lock">\u26A0 Match started \u2014 starting lineup is locked. Substitutions only.</div>` : '';
  return `<div class="pitch"><div class="pbox top"></div><div class="pbox bot"></div>${renderHalf(m,'home')}${renderHalf(m,'away')}</div>
    <div class="lineup-note">${escHtml(m.field || (n + ' v ' + n))}</div>
    <div class="bench-wrap">${tools}${lock}<div class="bench-head">Substitutes</div>
      <div class="bench-cols">${renderBenchCol(m,'home')}${renderBenchCol(m,'away')}</div></div>`;
}

// ---- manual lineup editor (pre-match setup, no events logged) ----
function slotLabels(n){
  const rows=formationRows(n), labels=[];
  rows.forEach((c,ri)=>{ let lab; if(ri===0)lab='GK'; else if(ri===rows.length-1)lab='FWD'; else if(rows.length>=4&&ri===1)lab='DEF'; else lab='MID'; for(let k=0;k<c;k++)labels.push(lab); });
  return labels;
}
function openLineupEditor(side){
  const m=getMatchById(openMatchId); if(!m)return; ensureLineup(m);
  const team=side==='home'?m.home:m.away;
  if(!canEditLineup(m,team)){ showToast(m.status!=='upcoming'?'Lineup is locked once the match starts':'Not allowed'); return; }
  window._luSide=side;
  window._luTeam=side==='home'?m.home:m.away;
  window._lu={ starters:m.lineup[side].starters.slice(), bench:m.lineup[side].bench.slice() };
  renderLineupEditor();
}
function renderLineupEditor(){
  const team=window._luTeam, L=window._lu;
  const roster=PLAYERS[team]||[];
  const labels=slotLabels(L.starters.length);
  const slots=L.starters.map((p,i)=>{
    const opts=roster.map(n=>`<option value="${n}"${n===p?' selected':''}>${jerseyNo(team,n)} \u00B7 ${n}</option>`).join('');
    return `<div class="lu-slot"><span class="lu-pos">${labels[i]||''}</span><select onchange="lineupSlotChange(${i},this.value)">${opts}</select></div>`;
  }).join('');
  const benchTxt=L.bench.length?L.bench.map(p=>`<b>${p}</b>`).join(', '):'<i>none</i>';
  openSheet('\u270E Edit lineup \u2014 '+team,
    `<div class="save-state" style="text-align:left;margin:0 0 12px">Set the starting ${L.starters.length}. Picking a bench player for a slot swaps them in. This is setup only \u2014 it does not log a substitution.</div>
     ${slots}
     <div class="lu-bench">Bench: ${benchTxt}</div>
     <button class="btn-primary" style="margin-top:16px" onclick="saveLineupEditor()">Save lineup</button>
     <button class="btn-secondary" onclick="closeModal()">Cancel</button>`);
}
function lineupSlotChange(i,P){
  const L=window._lu; const Q=L.starters[i]; if(P===Q){renderLineupEditor();return;}
  const j=L.starters.indexOf(P);
  if(j>=0){ L.starters[j]=Q; L.starters[i]=P; }
  else { const bi=L.bench.indexOf(P); L.starters[i]=P; if(bi>=0)L.bench[bi]=Q; else L.bench.push(Q); }
  renderLineupEditor();
}
function saveLineupEditor(){
  const m=getMatchById(openMatchId); if(!m)return;
  const team=window._luSide==='home'?m.home:m.away;
  if(!canEditLineup(m,team)){ showToast('Lineup is locked'); closeModal(); return; }
  m.lineup[window._luSide]={ starters:window._lu.starters.slice(), bench:window._lu.bench.slice() };
  saveData(); closeModal(); renderAll(); showToast('Lineup saved');
}

function peSyncFromDOM(){

function renderPlayerEditor(){

      <input class="pname-input" id="pe-name-${i}" value="${escHtml(r.name)}" oninput="peEdit()" autocomplete="off" placeholder="Player name">
      <span class="num-hash">#</span>

     <div class="num-warn" id="pe-warn"></div>

     <button class="btn-secondary" onclick="${(window._peBack||'openPlayerEditorPick')}()">\u2190 Back</button>`);
  peValidate();

function peEdit(){ peSyncFromDOM(); peValidate(); }
function peAdd(){
  peSyncFromDOM();
  window._peRows.push({ name:'', number:peNextNumber(), origName:null });
  renderPlayerEditor();
  const last=document.getElementById('pe-name-'+(window._peRows.length-1)); if(last) last.focus();
}
function peDelete(i){ peSyncFromDOM(); window._peRows.splice(i,1); renderPlayerEditor(); }
function peValidate(){
  const rows=window._peRows;
  const nameInputs=rows.map((_,i)=>document.getElementById('pe-name-'+i)).filter(Boolean);
  const numInputs =rows.map((_,i)=>document.getElementById('pe-num-'+i)).filter(Boolean);
  const nNorm=v=>v.trim().toLowerCase();
  const nameCounts={}, numCounts={};
  nameInputs.forEach(el=>{ const v=nNorm(el.value); if(v) nameCounts[v]=(nameCounts[v]||0)+1; });
  numInputs.forEach(el=>{ const v=el.value.trim(); if(v) numCounts[v]=(numCounts[v]||0)+1; });
  let err='';
  nameInputs.forEach(el=>{
    const blank=el.value.trim()==='';
    const dup=!blank && nameCounts[nNorm(el.value)]>1;
    el.classList.toggle('dup', blank||dup);
    if(blank&&!err) err='Every player needs a name.';
    else if(dup&&!err) err='Two players have the same name.';
  });
  numInputs.forEach(el=>{
    const v=el.value.trim(); const num=parseInt(v,10);
    const blank=v==='';
    const bad=!blank && (isNaN(num)||num<1||num>99);
    const dup=!blank && numCounts[v]>1;
    el.classList.toggle('dup', blank||bad||dup);
    if(blank&&!err) err='Every player needs a number.';
    else if(bad&&!err) err='Numbers must be between 1 and 99.';
    else if(dup&&!err) err='Two players have the same number.';
  });
  if(!rows.length && !err) err='Add at least one player.';
  const warn=document.getElementById('pe-warn'); if(warn) warn.textContent=err;
  const save=document.getElementById('pe-save'); if(save){ save.disabled=!!err; save.style.opacity=err?'.5':'1'; }
  return err||null;
}
function savePlayerEditor(){
  peSyncFromDOM();
  if(managerSession && managerSession!==window._peTeam){ showToast('You can only edit your own team'); return; }
  if(peValidate()){ showToast('Fix the highlighted fields first'); return; }
  const team=window._peTeam, rows=window._peRows;
  const origRoster=(PLAYERS[team]||[]).slice();
  const renameMapping={};
  rows.forEach(r=>{ const nn=r.name.trim(); if(r.origName && nn!==r.origName) renameMapping[r.origName]=nn; });
  const finalRoster=rows.map(r=>r.name.trim());
  const survivingOrig=new Set(rows.map(r=>r.origName).filter(Boolean));
  const removedNames=origRoster.filter(n=>!survivingOrig.has(n));
  const numbersMap={}; rows.forEach(r=>{ numbersMap[r.name.trim()]=parseInt(r.number,10); });
  applyRosterEdit(team, renameMapping, removedNames, finalRoster, numbersMap);
  saveData(); closeModal(); renderAll(); showToast('Players saved');
}
// Rename map (old→new), removed list, final roster, and explicit numbers — applied
// so the lineup, goals, cards and subs all stay consistent.
function applyRosterEdit(team, renameMapping, removedNames, finalRoster, numbersMap){
  // 1. cascade renames through events + lineups (single pass; safe for swaps)
  if(renameMapping && Object.keys(renameMapping).length){
    eachMatch(m=>{
      const sides=[]; if(m.home===team)sides.push('home'); if(m.away===team)sides.push('away');
      if(!sides.length) return;
      (m.events||[]).forEach(e=>{ if(sides.includes(e.team) && e.player && renameMapping[e.player]) e.player=renameMapping[e.player]; });
      if(m.lineup) sides.forEach(side=>{
        const L=m.lineup[side]; if(!L)return;
        ['starters','bench'].forEach(k=>{ if(Array.isArray(L[k])) L[k]=L[k].map(x=>renameMapping[x]||x); });
      });
    });
  }
  // 2. set the roster + explicit numbers
  PLAYERS[team].length=0; finalRoster.forEach(n=>PLAYERS[team].push(n));
  PLAYER_NUMBERS[team]=numbersMap;
  // 3. removals: drop the player's events (then recompute) — names already renamed above
  const removeSet=new Set(removedNames);
  // 4. reconcile every lineup for this team to only contain current roster
  const rosterSet=new Set(finalRoster);
  eachMatch(m=>{
    const sides=[]; if(m.home===team)sides.push('home'); if(m.away===team)sides.push('away');
    if(!sides.length) return;
    if(removeSet.size && m.events && m.events.length){
      m.events=m.events.filter(e=>!(sides.includes(e.team) && removeSet.has(e.player)));
      recomputeScore(m);
    }
    if(m.lineup) sides.forEach(side=>{
      const L=m.lineup[side]; if(!L)return;
      ['starters','bench'].forEach(k=>{ if(Array.isArray(L[k])) L[k]=L[k].filter(x=>rosterSet.has(x)); });
    });
  });
}

function setMatchView(v){ matchView=v; if(openMatchId)renderMatchScreen(openMatchId); }


// ---- paired substitution ----
function openSubSheet(side){
  const m=getMatchById(openMatchId); if(!m)return; ensureLineup(m);
  const team=side==='home'?m.home:m.away; const L=m.lineup[side];
  if(!canSub(m,team)){ showToast('Substitutions open once the match is live'); return; }
  if(!L.bench.length){ showToast('No bench players to bring on'); return; }
  const max=matchMaxMinute(m); const def=Math.min(Math.floor(clockSeconds(m)/60),max);
  openSheet(`\u21C4 Substitution \u2014 ${team}`,
    `<div class="field"><label>Player OUT (on pitch)</label><select id="sub-out">${L.starters.map(p=>`<option value="${p}">${jerseyNo(team,p)} \u00B7 ${p}</option>`).join('')}</select></div>
     <div class="field"><label>Player IN (from bench)</label><select id="sub-in">${L.bench.map(p=>`<option value="${p}">${jerseyNo(team,p)} \u00B7 ${p}</option>`).join('')}</select></div>
     <div class="field"><label>Minute (0\u2013${max})</label><select id="sub-min">${minuteOptions(max,def)}</select></div>
     <div class="save-state" style="text-align:left;margin:0 0 12px">Out and in are recorded together, so the team stays at ${starterCount(m)} players.</div>
     <button class="btn-primary" onclick="confirmSub('${side}')">Confirm substitution</button>
     <button class="btn-secondary" onclick="closeModal()">Cancel</button>`);
}
function confirmSub(side){
  const m=getMatchById(openMatchId); if(!m)return; ensureLineup(m);
  const out=document.getElementById('sub-out').value, inp=document.getElementById('sub-in').value, minute=document.getElementById('sub-min').value;
  if(!out||!inp){ showToast('Choose both players'); return; }
  if(out===inp){ showToast('Pick two different players'); return; }
  const L=m.lineup[side]; const oi=L.starters.indexOf(out), bi=L.bench.indexOf(inp);
  if(oi<0||bi<0){ showToast('Lineup changed \u2014 reopen'); return; }
  L.starters[oi]=inp; L.bench[bi]=out;
  const pair='sub'+Date.now();
  m.events=m.events||[];
  m.events.push({team:side,type:'sub_off',player:out,minute,pair});
  m.events.push({team:side,type:'sub_on', player:inp,minute,pair});
  if(m.status==='upcoming')m.status='live';
  saveData(); closeModal(); renderAll(); showToast(`${shortName(out)} \u2193  ${shortName(inp)} \u2191`);
}

function renderAll(){
  updateAdminChip();
  renderHomeMeta();
  renderUpNext();
  renderAbout();
  renderHowTo();
  renderListScreen();
  renderDashboard();
  if(openMatchId) renderMatchScreen(openMatchId);
}
