<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#22a85e" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#0e1116" media="(prefers-color-scheme: dark)">
<title>LiveScore · Sports Day 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Archivo+Narrow:wght@400;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    /* Velocity Grid — clean light, card-first */
    --bg:#eef1f4;            /* surface gray page bg */
    --surface:#ffffff;       /* pure white cards */
    --surface2:#f1f4f7;      /* subtle tint */
    --ink:#161b22;           /* stadium dark text */
    --muted:#6d7a6e;         /* outline / secondary text */
    --line:#e3e7ec;          /* hairline dividers */
    --green:#22a85e;         /* turf green */
    --green-d:#006d38;       /* deep green (primary) */
    --orange:#f47b20;        /* live orange */
    --orange-d:#994700;
    --red:#ba1a1a;
    --yellow:#e3a900;
    --teal:#22a85e;
    --dark:#161b22;          /* stadium dark panels */
    --card-shadow:0 4px 20px rgba(0,0,0,.05);
    --card-radius:24px;
    --pill:9999px;
    /* Football accent palette */
    --fb-blue:#1e51d4;
    --fb-red:#f22929;
    --fb-grn:#46f026;
    --fb-org:#ff5e00;
    --fb-gld:#ffd700;
  }
  @media(prefers-color-scheme:dark){
    :root{
      --bg:#0e1116;
      --surface:#1a1f26;
      --surface2:#222932;
      --ink:#dde3ec;
      --muted:#8896a0;
      --line:#2b3340;
      --green:#2bbf6c;
      --green-d:#4fd88a;
      --orange:#f98c30;
      --orange-d:#ffb060;
      --red:#ff6060;
      --yellow:#f0c840;
      --dark:#0e1116;
      --card-shadow:0 4px 20px rgba(0,0,0,.35);
    }
    .topbar{box-shadow:0 1px 0 var(--line)!important;}
    .btm-nav{box-shadow:0 -1px 0 var(--line)!important;}
    .fixture,.menu-card,.info-card,.panel-card,.upnext-card{box-shadow:none!important;}
    .fx-ft{color:#7aef5a!important;background:rgba(70,240,38,.12)!important;}
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{background:var(--bg);color:var(--ink);font-family:'Inter',system-ui,sans-serif;min-height:100vh;}
  #app{max-width:620px;margin:0 auto;background:var(--bg);min-height:100vh;position:relative;padding-bottom:86px;}
  /* Velocity Grid bottom tab bar */
  .btm-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:620px;
    background:var(--surface);border-top:1px solid var(--line);box-shadow:0 -4px 20px rgba(0,0,0,.05);
    display:flex;justify-content:space-around;align-items:center;padding:8px 10px;z-index:90;
    padding-bottom:calc(8px + env(safe-area-inset-bottom));}
  .btm-nav button{flex:1;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;
    align-items:center;gap:2px;color:var(--muted);font-family:'Inter',sans-serif;font-size:10px;font-weight:600;padding:2px 0;}
  .bn-ico{font-size:19px;line-height:1;padding:4px 16px;border-radius:9999px;transition:background .15s,color .15s;}
  #nav-home.active{color:var(--fb-blue)!important;}
  #nav-home.active .bn-ico{background:rgba(30,81,212,.12);color:var(--fb-blue)!important;}
  #nav-matches.active{color:var(--fb-red)!important;}
  #nav-matches.active .bn-ico{background:rgba(242,41,41,.1);color:var(--fb-red)!important;}
  #nav-teams.active{color:#00873a!important;}
  #nav-teams.active .bn-ico{background:rgba(70,240,38,.1);color:#00873a!important;}
  #nav-info.active{color:var(--fb-org)!important;}
  #nav-info.active .bn-ico{background:rgba(255,94,0,.1);color:var(--fb-org)!important;}
  .fab{position:fixed;bottom:84px;right:max(16px,calc(50vw - 310px + 16px));
    width:56px;height:56px;border-radius:50%;background:var(--green);color:#fff;border:none;
    box-shadow:0 6px 20px rgba(34,168,94,.4);font-size:22px;cursor:pointer;z-index:91;
    display:flex;align-items:center;justify-content:center;transition:filter .15s,transform .1s;}
  .fab:active{transform:scale(.92);}

  /* ============ DESKTOP DASHBOARD (Premier-style) ============ */
  .side-nav{display:none;}
  #screen-dash{display:none;}
  @media (min-width:1024px){
    body{background:var(--bg);}
    .topbar{display:none;}
    .btm-nav,.fab{display:none!important;}
    #app{max-width:none;margin:0 0 0 248px;padding:0 36px 48px;min-height:100vh;}
    /* sidebar */
    .side-nav{display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;width:248px;
      background:#060d1f;color:#cfd6dd;padding:22px 16px;z-index:120;gap:6px;border-right:1px solid rgba(30,81,212,.3);}
    .sn-brand{font-family:'Oswald',sans-serif;font-weight:700;font-size:24px;letter-spacing:.06em;text-transform:uppercase;
      color:#fff;padding:6px 10px 4px;cursor:pointer;}
    .sn-brand b{color:var(--fb-gld);}
    .sn-sub{font-size:11px;color:#7f8a94;padding:0 10px 18px;letter-spacing:.04em;}
    .sn-item{display:flex;align-items:center;gap:12px;width:100%;background:none;border:none;cursor:pointer;
      color:#cfd6dd;font-family:'Inter',sans-serif;font-size:14px;font-weight:600;text-align:left;
      padding:11px 12px;border-radius:12px;transition:background .15s,color .15s;}
    .sn-item .sn-ic{font-size:17px;width:20px;text-align:center;}
    .sn-item:hover{background:rgba(255,255,255,.06);color:#fff;}
    .sn-item.active{background:var(--fb-blue);color:#fff;box-shadow:0 2px 12px rgba(30,81,212,.4);}
    .sn-spacer{flex:1;}
    .sn-login{margin-top:8px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);
      color:#fff;border-radius:12px;padding:11px 12px;font-size:13px;font-weight:700;cursor:pointer;
      display:flex;align-items:center;gap:10px;}
    .sn-login:hover{background:rgba(255,255,255,.14);}
    /* dashboard layout */
    #screen-dash.active{display:block;}
    .dash-head{display:flex;align-items:center;justify-content:space-between;padding:26px 0 18px;}
    .dash-h1{font-family:'Oswald',sans-serif;font-size:30px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;}
    .dash-h1 span{color:var(--green-d);}
    .seg{display:inline-flex;background:var(--surface);border:1px solid var(--line);border-radius:9999px;padding:4px;gap:2px;box-shadow:var(--card-shadow);}
    .seg button{border:none;background:none;cursor:pointer;font-family:'Inter';font-size:13px;font-weight:700;
      color:var(--muted);padding:8px 18px;border-radius:9999px;}
    .seg button.on{background:var(--green);color:#fff;}
    .dash-grid{display:grid;grid-template-columns:1fr 380px;gap:24px;align-items:start;}
    .dash-rail{display:flex;flex-direction:column;gap:24px;}
    .panel-card{background:var(--surface);border:1px solid var(--line);border-radius:20px;
      box-shadow:var(--card-shadow);padding:18px 20px;}
    .panel-card h3{font-family:'Oswald',sans-serif;font-size:13px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;
      color:var(--fb-blue);margin-bottom:14px;display:flex;align-items:center;gap:8px;padding-bottom:8px;border-bottom:2px solid var(--fb-blue);}
    /* featured hero */
    .feat{color:#fff;border-radius:24px;overflow:hidden;
      position:relative;padding:26px 28px;margin-bottom:24px;box-shadow:var(--card-shadow);
      background-size:cover;background-position:center 30%;background-color:#0a1a22;}
    .feat-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(5,20,15,.55) 0%,rgba(5,15,30,.88) 100%);pointer-events:none;z-index:0;}
    .feat>*:not(.feat-overlay){position:relative;z-index:1;}
    .feat-single{display:block;}
    .feat-multi{display:grid;grid-template-columns:1fr 1fr;gap:0;}
    .feat-match-block{padding:4px 8px;cursor:pointer;transition:background .15s;}
    .feat-match-block:hover{background:rgba(255,255,255,.06);}
    .feat-divider{width:1px;background:rgba(255,255,255,.2);align-self:stretch;margin:8px 0;}
    .feat-logo-svg{width:52px;height:52px;flex-shrink:0;}
    .feat-logo-svg svg{width:52px;height:52px;display:block;}
    .feat-logo-img{width:52px;height:52px;border-radius:50%;object-fit:cover;border:2px solid rgba(255,255,255,.3);flex-shrink:0;}
    .feat-tag{display:inline-flex;align-items:center;gap:7px;background:var(--orange);color:#fff;
      font-size:11px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;padding:5px 12px;border-radius:9999px;}
    .feat-tag.up{background:rgba(255,255,255,.18);}
    .feat-tag .dot{background:#fff;}
    .feat-grid{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:16px;margin-top:20px;}
    .feat-team{display:flex;flex-direction:column;align-items:center;gap:10px;text-align:center;}
    .feat-team .cr{font-size:40px;width:64px;height:64px;display:flex;align-items:center;justify-content:center;
      background:rgba(255,255,255,.1);border-radius:16px;}
    .feat-team .nm{font-family:'Archivo Narrow';font-size:20px;font-weight:700;text-transform:uppercase;letter-spacing:.02em;}
    .feat-score{font-family:'Archivo Narrow';font-size:56px;font-weight:700;line-height:1;text-align:center;}
    .feat-score small{display:block;font-family:'Inter';font-size:13px;font-weight:600;color:#9fd9b6;margin-top:8px;letter-spacing:.04em;}
    .feat-meta{font-size:12px;color:rgba(255,255,255,.7);margin-top:4px;}
    .feat-cta{margin-top:22px;display:flex;gap:10px;}
    .feat-cta button{background:#fff;color:#0a2c4a;border:none;border-radius:9999px;padding:11px 22px;
      font-family:'Inter';font-size:13px;font-weight:700;cursor:pointer;}
    .feat-cta button.ghost{background:rgba(255,255,255,.12);color:#fff;}
    /* desktop fixtures use card grid */
    #screen-dash .fixture{border-radius:16px;border:1px solid var(--line);box-shadow:var(--card-shadow);}
    .dash-fixtures{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
    .dash-fixtures .sec-label{grid-column:1/-1;}
    .dash-empty{color:var(--muted);font-size:13px;padding:8px 2px;}
    .panel-card .panel{border:none!important;box-shadow:none!important;padding:0!important;background:none!important;margin:0!important;}
    .panel-card .tbl{width:100%;}
    .panel-card .q-note{margin-top:8px;}
    /* widen other screens on desktop */
    #screen-team .page-head,#screen-about .page-head,#screen-howto .page-head,#screen-list .tab-nav{position:static;}
    #screen-about .page-body,#screen-team .page-body{max-width:900px;}
  }

  /* TOP BAR */
  .topbar{background:var(--surface);color:var(--ink);box-shadow:0 1px 0 var(--line);
    display:flex;align-items:center;justify-content:space-between;
    padding:0 16px;height:56px;position:sticky;top:0;z-index:100;}
  .brand{font-family:'Oswald',sans-serif;font-weight:700;font-size:22px;
    letter-spacing:.03em;text-transform:uppercase;color:var(--green);}
  .brand span{font-weight:400;color:var(--muted);}
  .admin-chip{background:var(--surface2);border:1px solid var(--line);color:var(--ink);
    font-family:'Oswald',sans-serif;font-size:13px;font-weight:500;letter-spacing:.05em;
    padding:7px 14px;border-radius:var(--pill);cursor:pointer;min-width:38px;text-transform:uppercase;}
  .admin-chip.on{background:var(--green);border-color:var(--green);color:#fff;}

  .screen{display:none;}
  .screen.active{display:block;}

  /* HERO */
  .hero{padding:20px 16px 8px;}
  .hero-title{font-family:'Oswald',sans-serif;font-size:34px;font-weight:700;letter-spacing:.02em;text-transform:uppercase;line-height:1.0;}
  .hero-title b{color:var(--green);}
  .hero-sub{color:var(--muted);font-size:13px;margin-top:2px;display:flex;align-items:center;gap:6px;}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--fb-red);display:inline-block;animation:pulse 1.4s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}

  /* TABS */
  .tabbar{display:flex;gap:6px;padding:10px 16px 4px;position:sticky;top:54px;background:var(--bg);z-index:40;}
  .tabbtn{flex:1;padding:9px 4px;font-family:'Oswald',sans-serif;font-size:13px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;border-radius:10px;border:none;cursor:pointer;
    background:var(--surface);color:var(--muted);box-shadow:0 1px 2px rgba(0,0,0,.04);transition:.15s;}
  .tabbtn.active{background:var(--fb-blue);color:#fff;}

  .list-body{padding:8px 16px 40px;}
  .sec-label{font-family:'Oswald',sans-serif;font-size:12px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);
    margin:18px 4px 8px;display:flex;align-items:center;gap:8px;}
  .sec-label::after{content:'';flex:1;height:1px;background:var(--line);}
  .sec-label.ko{color:var(--fb-org);}

  /* FIXTURE ROW */
  .fixture{background:var(--surface);border-radius:14px;padding:11px 14px;margin-bottom:10px;cursor:pointer;
    box-shadow:0 1px 3px rgba(20,30,45,.06);transition:transform .08s,box-shadow .15s;}
  .fixture:active{transform:scale(.99);}
  .fx-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
  .fx-live{display:inline-flex;align-items:center;gap:5px;font-family:'Oswald',sans-serif;font-size:11px;font-weight:700;color:var(--fb-red);letter-spacing:.08em;text-transform:uppercase;}
  .fx-live b{font-family:'Archivo Narrow';font-variant-numeric:tabular-nums;}
  .fx-ft{font-family:'Oswald',sans-serif;font-size:11px;font-weight:600;color:#1a6a00;background:#e6fae0;padding:2px 8px;border-radius:5px;letter-spacing:.06em;text-transform:uppercase;}
  .fx-up{font-size:11px;font-weight:700;color:var(--muted);}
  .fx-field{font-size:10px;color:var(--muted);background:var(--surface2);padding:2px 7px;border-radius:5px;}
  .fx-row{display:flex;align-items:center;gap:8px;}
  .fx-team{flex:1;display:flex;align-items:center;gap:9px;min-width:0;}
  .fx-team.away{flex-direction:row-reverse;text-align:right;}
  .fx-crest{width:30px;height:30px;flex-shrink:0;}
  .fx-crest svg{width:100%;height:100%;display:block;}
  .fx-name{font-size:13.5px;font-weight:600;line-height:1.15;overflow:hidden;}
  .fx-score{font-family:'Oswald',monospace;font-weight:700;font-size:26px;flex-shrink:0;display:flex;gap:6px;font-variant-numeric:tabular-nums;color:var(--ink);}
  .fx-score span{color:var(--muted);font-weight:600;}
  .fx-time{font-family:'Inter',sans-serif;font-weight:700;font-size:12px;color:var(--orange);flex-shrink:0;min-width:42px;text-align:center;letter-spacing:.05em;}

  /* STANDINGS / SCORERS */
  .panel{background:var(--surface);border-radius:14px;padding:6px 4px;margin-bottom:14px;box-shadow:0 1px 3px rgba(20,30,45,.06);overflow:hidden;}
  table.tbl{width:100%;border-collapse:collapse;font-size:12.5px;}
  .tbl th{font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);font-weight:800;padding:8px 3px;text-align:center;}
  .tbl th.l{text-align:left;padding-left:10px;}
  .tbl td{padding:9px 3px;text-align:center;border-top:1px solid var(--line);}
  .tbl td.l{text-align:left;padding-left:10px;font-weight:600;}
  .tbl .nm{display:flex;align-items:center;gap:8px;}
  .tbl .nm svg{width:20px;height:20px;}
  .tbl .pos{color:var(--muted);width:20px;}
  .tbl tr.q td.pos{color:var(--green);font-weight:800;}
  .tbl tr.q td.l{box-shadow:inset 3px 0 0 var(--green);}
  .tbl .pts{font-family:'Oswald',sans-serif;font-weight:700;color:var(--fb-gld);}
  .q-note{font-size:11px;color:var(--muted);padding:8px 10px 4px;}
  .sc-rank{font-family:'Inter',sans-serif;font-weight:700;font-size:11px;width:34px;color:var(--muted);}
  .sc-goals{font-family:'Archivo Narrow',sans-serif;font-weight:700;font-size:18px;color:var(--green-d);width:46px;}
  .sc-team{color:var(--muted);font-size:11px;}
  .sc-top td{background:rgba(34,168,94,.06);}
  .empty{color:var(--muted);font-size:13px;padding:18px;text-align:center;}

  /* MATCH DETAIL */
  #match-body{padding-bottom:152px;}
  .md-top{color:#fff;padding:12px 14px;position:sticky;top:0;z-index:30;}
  .md-back{background:none;border:none;color:#fff;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:4px;}
  .md-scoreboard{background:var(--surface);border:1px solid var(--line);border-radius:var(--card-radius);box-shadow:var(--card-shadow);display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:6px;
    padding:18px 14px;border-bottom:1px solid var(--line);}
  .md-team{display:flex;flex-direction:column;align-items:center;gap:6px;text-align:center;}
  .md-crest{width:46px;height:46px;}
  .md-crest svg{width:100%;height:100%;}
  .md-tname{font-size:12px;font-weight:700;line-height:1.2;max-width:120px;}
  .md-scorewrap{display:flex;align-items:center;gap:12px;}
  .md-score{font-family:'Archivo Narrow';font-weight:900;font-size:46px;line-height:1;font-variant-numeric:tabular-nums;}
  .md-v{font-family:'Archivo Narrow';font-weight:700;font-size:20px;color:var(--muted);}
  .md-statusbar{background:#2c333c;color:#fff;font-size:12.5px;font-weight:700;letter-spacing:.5px;
    text-align:center;padding:9px;}

  /* TIMELINE */
  .timeline{position:relative;padding:18px 12px 22px;}
  .timeline::before{content:'';position:absolute;top:0;bottom:0;left:50%;width:2px;background:var(--line);transform:translateX(-50%);}
  .tl-empty{position:relative;text-align:center;color:var(--muted);font-size:13px;padding:30px 0;}
  .tl-row{display:grid;grid-template-columns:1fr 56px 1fr;align-items:center;margin-bottom:16px;position:relative;}
  .tl-side{display:flex;align-items:center;gap:8px;min-width:0;}
  .tl-side.left{justify-content:flex-end;text-align:right;}
  .tl-side.right{justify-content:flex-start;text-align:left;}
  .tl-text .tl-type{font-size:11px;font-weight:800;letter-spacing:.5px;}
  .tl-text .tl-name{font-size:12.5px;font-weight:600;color:var(--ink);margin-top:1px;}
  .tl-icon{font-size:15px;line-height:1;flex-shrink:0;}
  .tl-center{display:flex;justify-content:center;}
  .tl-min{font-family:'Archivo Narrow';font-weight:800;font-size:12px;background:var(--surface);
    border:2px solid var(--green);color:var(--green);border-radius:50%;width:34px;height:34px;
    display:flex;align-items:center;justify-content:center;font-variant-numeric:tabular-nums;z-index:1;}
  .tl-edit{background:var(--surface2);border:1px solid var(--line);color:var(--muted);font-size:12px;cursor:pointer;padding:3px 7px;border-radius:6px;line-height:1;}
  .tl-edit:hover{color:var(--green-d);border-color:var(--green);}
  .ee-del{border-color:var(--red)!important;color:var(--red)!important;}

  /* DOCK (console + footer) */
  .md-dock{position:fixed;bottom:0;left:0;right:0;z-index:35;}
  .dock-inner{max-width:620px;margin:0 auto;}
  .console{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:1px;background:var(--line);}
  .act{border:none;padding:16px 4px;font-size:13px;font-weight:800;cursor:pointer;color:#fff;}
  .act-goal{background:var(--green);}
  .act-goal:active{background:var(--green-d);}
  .act-evt{background:#3a424c;}
  .act-evt:active{background:#2c333c;}
  .md-footer{background:#1f262e;color:#fff;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:8px 14px;}
  .mf-clock{text-align:center;}
  .mf-status{font-size:10px;font-weight:700;letter-spacing:1.5px;color:#9aa6b2;}
  .mf-time{font-family:'Archivo Narrow';font-weight:800;font-size:26px;line-height:1;font-variant-numeric:tabular-nums;}
  .mf-side{display:flex;}
  .mf-side.right{justify-content:flex-end;}
  .mf-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;font-size:13px;font-weight:700;
    padding:8px 16px;border-radius:8px;cursor:pointer;}
  .mf-btn.start{background:var(--green);border-color:var(--green);}
  .mf-btn.stop{background:var(--orange);border-color:var(--orange);}

  /* SHEET / MODAL */
  .sheet-overlay{display:none;position:fixed;inset:0;background:rgba(22,27,34,.45);z-index:1000;align-items:flex-end;justify-content:center;}
  .sheet-overlay.open{display:flex;}
  .sheet{background:var(--surface);border-radius:24px 24px 0 0;box-shadow:0 -8px 40px rgba(0,0,0,.18);width:100%;max-width:620px;padding:8px 18px 26px;
    max-height:86vh;overflow-y:auto;animation:slideup .2s ease;}
  @keyframes slideup{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .sheet-handle{width:40px;height:4px;border-radius:9999px;background:var(--line);margin:6px auto 14px;}
  .sheet-title{font-family:'Archivo Narrow';font-weight:800;font-size:18px;margin-bottom:16px;}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:11px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
  .field select,.field input{width:100%;background:var(--surface2);border:1.5px solid var(--line);color:var(--ink);
    border-radius:10px;padding:12px;font-family:'Inter';font-size:15px;outline:none;}
  .field select:focus,.field input:focus{border-color:var(--green);}
  .btn-primary{display:block;width:100%;background:var(--green);color:#fff;border:none;border-radius:9999px;
    padding:13px;font-family:'Inter',sans-serif;font-size:11px;font-weight:700;
    letter-spacing:.08em;text-transform:uppercase;cursor:pointer;text-align:center;
    margin-bottom:10px;transition:filter .15s,transform .1s;
    border:none;border-radius:10px;cursor:pointer;}
  .btn-primary:active{opacity:.85;}
  .btn-secondary{display:block;width:100%;background:var(--surface2);color:var(--ink);border-radius:9999px;
    border:1px solid var(--line);padding:12px;font-family:'Inter',sans-serif;
    font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;
    cursor:pointer;text-align:center;margin-bottom:10px;transition:box-shadow .15s;
    border:1.5px solid var(--line);border-radius:10px;cursor:pointer;margin-top:8px;}
  .backup-row{display:flex;gap:8px;}
  .backup-row .btn-secondary{margin-top:0;}
  .save-state{font-size:11px;color:var(--muted);text-align:center;margin-bottom:12px;}
  .save-state b{color:var(--green);}
  .err{color:var(--red);font-size:12px;margin-bottom:10px;}


  /* LINEUP / PITCH */
  .view-toggle{display:flex;gap:6px;padding:12px 14px 6px;background:var(--surface);}
  .vt{flex:1;padding:9px;border:none;border-radius:9px;font-weight:700;font-size:13px;background:var(--surface2);color:var(--muted);cursor:pointer;}
  .vt.on{background:var(--ink);color:#fff;}
  .pitch{position:relative;display:flex;flex-direction:column;padding:6px;overflow:hidden;
    background-color:#249150;background-image:repeating-linear-gradient(#249150 0 30px,#2c9c58 30px 60px);min-height:480px;}
  .pitch::before{content:'';position:absolute;left:8px;right:8px;top:50%;height:2px;background:rgba(255,255,255,.35);}
  .pitch::after{content:'';position:absolute;left:50%;top:50%;width:78px;height:78px;border:2px solid rgba(255,255,255,.35);border-radius:50%;transform:translate(-50%,-50%);}
  .pbox{position:absolute;left:50%;transform:translateX(-50%);width:54%;height:50px;border:2px solid rgba(255,255,255,.3);z-index:0;}
  .pbox.top{top:-2px;border-top:none;}
  .pbox.bot{bottom:-2px;border-bottom:none;}
  .phalf{flex:1;display:flex;flex-direction:column;justify-content:space-around;position:relative;z-index:1;padding:14px 0;}
  .prow{display:flex;justify-content:space-around;align-items:center;}
  .ptoken{display:flex;flex-direction:column;align-items:center;gap:4px;width:64px;}
  .phalf.away .ptoken{flex-direction:column-reverse;}
  .pt-shirt{position:relative;width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-family:'Archivo Narrow';font-weight:800;font-size:13px;box-shadow:0 2px 6px rgba(0,0,0,.35);}
  .pt-shirt.home{background:#ffffff;color:#15321e;}
  .pt-shirt.away{background:#13233f;color:#fff;}
  .pt-shirt.off{opacity:.4;}
  .pt-name{font-size:9.5px;font-weight:700;color:#fff;text-align:center;text-shadow:0 1px 2px rgba(0,0,0,.6);line-height:1.12;max-width:74px;overflow-wrap:anywhere;}
  .pt-goal{margin-right:1px;}
  .pt-card{position:absolute;top:-2px;right:-3px;width:8px;height:11px;border-radius:2px;display:inline-block;}
  .pt-card.yel{background:var(--yellow);}
  .pt-card.red{background:var(--red);}
  .pt-sub{position:absolute;bottom:-4px;left:-4px;font-size:12px;font-weight:900;}
  .pt-sub.off{color:#ff5a5a;text-shadow:0 0 2px #000;}
  .lineup-note{background:#2c333c;color:#cdd6df;font-size:11px;font-weight:700;letter-spacing:.5px;text-align:center;padding:7px;}
  .bench-wrap{background:var(--surface);padding:14px;}
  .sub-bar{display:flex;gap:8px;margin-bottom:14px;}
  .sub-bar button{flex:1;padding:11px;border:1.5px solid var(--green);background:rgba(34,168,94,.08);color:var(--green-d);font-weight:700;font-size:12.5px;border-radius:10px;cursor:pointer;}
  .bench-head{font-size:11px;font-weight:800;letter-spacing:1.4px;text-transform:uppercase;color:var(--muted);margin-bottom:12px;}
  .bench-cols{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .bteam{font-size:11px;font-weight:800;color:var(--ink);margin-bottom:10px;display:flex;align-items:center;gap:6px;}
  .bteam svg{width:18px;height:18px;flex-shrink:0;}
  .bteam span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .bcol.away{text-align:right;}
  .bcol.away .bteam{flex-direction:row-reverse;}
  .bitem{display:flex;align-items:center;gap:8px;padding:5px 0;}
  .bcol.away .bitem{flex-direction:row-reverse;}
  .bava{width:26px;height:26px;border-radius:50%;background:var(--surface2);border:1px solid var(--line);font-size:9px;font-weight:800;color:var(--muted);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .binfo{min-width:0;}
  .bname{font-size:12px;font-weight:600;line-height:1.2;overflow-wrap:anywhere;}
  .bnum{font-size:10px;color:var(--muted);}
  .bon{color:var(--green);font-size:12px;font-weight:900;}
  .bench-empty{font-size:12px;color:var(--muted);}


  .lu-tools{display:flex;gap:8px;margin-bottom:8px;}
  .lu-tools button{flex:1;padding:11px;border:1.5px solid var(--line);background:var(--surface2);color:var(--ink);font-weight:700;font-size:12.5px;border-radius:10px;cursor:pointer;}
  .lu-slot{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
  .lu-pos{width:40px;flex-shrink:0;font-size:10px;font-weight:800;letter-spacing:.5px;color:var(--green);}
  .lu-slot select{flex:1;background:var(--surface2);border:1.5px solid var(--line);color:var(--ink);border-radius:10px;padding:11px;font-family:'Inter';font-size:14px;}
  .lu-bench{font-size:12.5px;color:var(--muted);margin-top:12px;line-height:1.6;}
  .lu-bench b{color:var(--ink);font-weight:600;}

  /* TOAST */
  .toast{position:fixed;bottom:170px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--ink);color:#fff;
    font-weight:700;font-size:13.5px;padding:11px 22px;border-radius:24px;z-index:2000;transition:transform .3s,opacity .3s;
    opacity:0;visibility:hidden;pointer-events:none;}
  .toast.show{transform:translateX(-50%) translateY(0);opacity:.97;visibility:visible;}
  /* REARRANGE / SCHEDULE EDITOR */
  .rr-setlabel{font-size:11px;font-weight:800;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);margin:16px 2px 8px;}
  .rr-row{display:flex;align-items:center;gap:8px;background:var(--surface2);border:1.5px solid var(--line);border-radius:11px;padding:8px 10px;margin-bottom:7px;}
  .rr-row.moved{border-color:var(--fb-org);background:rgba(255,94,0,.05);}
  /* New full editor */
  .rr2-row{background:var(--surface2);border:1.5px solid var(--line);border-radius:12px;padding:10px;margin-bottom:8px;transition:border-color .15s,opacity .15s;}
  .rr2-row.rr2-deleted{opacity:.4;border-color:var(--red)!important;border-style:dashed;}
  .rr2-row.rr2-swapped{border-color:var(--fb-org);background:rgba(255,94,0,.07);}
  .rr2-row-top{display:flex;align-items:center;gap:6px;margin-bottom:6px;}
  .rr2-row-bot{display:flex;align-items:center;gap:6px;}
  .rr2-no-wrap{display:flex;align-items:center;gap:2px;flex-shrink:0;}
  .rr2-no-lbl{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.05em;}
  .rr2-no{width:42px;border:1px solid var(--line);border-radius:7px;padding:5px 6px;font-family:'Oswald',sans-serif;font-size:14px;font-weight:700;background:var(--surface);color:var(--fb-blue);text-align:center;}
  .rr2-home,.rr2-away{flex:1;min-width:0;border:1px solid var(--line);border-radius:7px;padding:5px 6px;font-size:12px;background:var(--surface);color:var(--ink);}
  .rr2-vs{font-size:10px;font-weight:800;color:var(--muted);flex-shrink:0;padding:0 2px;}
  .rr2-time{flex:1;border:1px solid var(--line);border-radius:7px;padding:5px 8px;font-size:13px;background:var(--surface);color:var(--ink);min-width:0;}
  .rr2-field{border:1px solid var(--line);border-radius:7px;padding:5px 6px;font-size:12px;background:var(--surface);color:var(--ink);flex-shrink:0;}
  .rr2-del-btn{background:none;border:none;font-size:16px;cursor:pointer;color:var(--red);padding:4px;flex-shrink:0;border-radius:6px;}
  .rr2-del-btn:active{background:rgba(186,26,26,.1);}
  .rr2-swap-box{background:rgba(30,81,212,.07);border:1.5px solid var(--fb-blue);border-radius:12px;padding:12px;margin-bottom:14px;}
  .rr2-swap-label{font-family:'Oswald',sans-serif;font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--fb-blue);margin-bottom:8px;}
  .rr2-swap-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
  .rr2-swap-row span{font-size:13px;color:var(--muted);}
  .rr2-swap-in{width:64px;border:1px solid var(--line);border-radius:7px;padding:7px 8px;font-size:14px;font-weight:700;background:var(--surface);color:var(--ink);text-align:center;}
  .rr2-swap-btn{background:var(--fb-blue);color:#fff;border:none;border-radius:9999px;padding:8px 16px;font-family:'Oswald',sans-serif;font-size:13px;font-weight:600;cursor:pointer;letter-spacing:.05em;}
  .rr-timehead{font-family:'Oswald',sans-serif;font-size:12px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--fb-blue);background:rgba(30,81,212,.07);border-left:3px solid var(--fb-blue);padding:6px 10px;margin:12px 0 6px;border-radius:0 8px 8px 0;}
  .rr-grouptag{font-size:10px;color:var(--muted);margin-top:2px;}
  .rr-info{background:var(--surface2);border:1px solid var(--line);border-left:3px solid var(--fb-org);border-radius:10px;padding:10px 12px;font-size:13px;color:var(--ink);line-height:1.5;margin-bottom:14px;}
  .rr-arrows{display:flex;flex-direction:column;gap:3px;}
  .rr-arrows button{width:30px;height:22px;border:1px solid var(--line);background:var(--surface);color:var(--ink);border-radius:6px;font-size:11px;font-weight:800;cursor:pointer;line-height:1;padding:0;}
  .rr-arrows button:disabled{opacity:.3;cursor:default;}
  .rr-arrows button:active:not(:disabled){background:var(--green);color:#fff;border-color:var(--green);}
  .rr-main{flex:1;min-width:0;}
  .rr-no{font-size:10px;font-weight:800;letter-spacing:.6px;color:var(--green-d);text-transform:uppercase;}
  .rr-teams{font-size:13px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .rr-time{width:88px;flex-shrink:0;background:var(--surface);border:1.5px solid var(--line);color:var(--ink);
    border-radius:8px;padding:9px 6px;font-family:'Inter';font-size:12.5px;text-align:center;outline:none;}
  .rr-time:focus{border-color:var(--green);}
  .rr-field{width:104px;flex-shrink:0;background:var(--surface);border:1.5px solid var(--line);color:var(--ink);
    border-radius:8px;padding:9px 4px;font-family:'Inter';font-size:11.5px;text-align:center;outline:none;cursor:pointer;}
  .rr-field:focus{border-color:var(--green);}
  .rr-field.changed{border-color:var(--orange);color:var(--orange-d);font-weight:700;}
  .rr-pending{font-size:12px;color:var(--orange-d);font-weight:700;text-align:center;margin:6px 0 10px;}
  .rr-diff{background:var(--surface2);border-radius:11px;padding:12px 14px;margin-bottom:12px;font-size:13px;line-height:1.6;}
  .rr-diff b{color:var(--green-d);}
  .rr-diff .arrow{color:var(--orange-d);font-weight:800;}
  .rr-logitem{background:var(--surface2);border-radius:10px;padding:10px 12px;margin-bottom:8px;font-size:12.5px;line-height:1.5;}
  .rr-logitem .rr-logmeta{font-size:10.5px;color:var(--muted);font-weight:700;letter-spacing:.4px;margin-bottom:4px;}
  .fx-delay{background:#fff8e1;border:1px solid #f59e0b;border-radius:8px;padding:6px 10px;font-size:12px;font-weight:600;color:#92400e;margin-top:8px;}
  .fixture.fx-delayed{border-color:#f59e0b!important;box-shadow:0 0 0 1.5px #f59e0b22;}
  .fx-grand-final{border-color:var(--fb-gld)!important;border-width:2px!important;box-shadow:0 4px 24px rgba(255,215,0,.22)!important;}
  .fx-gf-banner{background:linear-gradient(90deg,#b8860b,#ffd700,#b8860b);color:#1a1000;font-family:'Oswald',sans-serif;font-size:11px;font-weight:700;letter-spacing:.14em;text-align:center;padding:5px 10px;border-radius:8px 8px 0 0;margin:-11px -11px 10px;text-transform:uppercase;}
  @media(prefers-color-scheme:dark){.fx-delay{background:rgba(245,158,11,.1);color:#fcd34d;border-color:#f59e0b;}}
  .rr-note-input{width:100%;background:var(--surface2);border:1.5px solid var(--line);color:var(--ink);border-radius:10px;padding:11px;font-family:'Inter';font-size:14px;outline:none;resize:vertical;min-height:64px;}
  .rr-note-input:focus{border-color:var(--green);}
  /* SQUAD NUMBER EDITOR */
  .num-row{display:flex;align-items:center;gap:10px;background:var(--surface2);border:1.5px solid var(--line);border-radius:11px;padding:8px 12px;margin-bottom:7px;}
  .num-name{flex:1;font-size:14px;font-weight:600;color:var(--ink);min-width:0;overflow-wrap:anywhere;line-height:1.25;}
  .pname-input{flex:1;min-width:0;background:var(--surface);border:1.5px solid var(--line);color:var(--ink);border-radius:8px;padding:10px 11px;font-family:'Inter';font-size:14px;outline:none;}
  .pname-input:focus{border-color:var(--green);}
  .pname-input.dup{border-color:var(--red);background:rgba(226,59,59,.10);}
  .pe-del{flex-shrink:0;width:30px;height:36px;border:1px solid var(--line);background:var(--surface);color:var(--red);border-radius:8px;font-size:13px;font-weight:800;cursor:pointer;line-height:1;padding:0;}
  .pe-del:active{background:var(--red);color:#fff;border-color:var(--red);}
  .pe-add{width:100%;background:var(--surface2);border:1.5px dashed var(--line);color:var(--green-d);border-radius:11px;padding:11px;font-family:'Inter';font-weight:700;font-size:13.5px;cursor:pointer;margin:2px 0 12px;}
  .pe-add:active{border-color:var(--green);color:var(--green);}
  .lu-lock{background:rgba(244,123,32,.10);border:1px solid var(--orange);color:var(--orange-d);border-radius:10px;padding:9px 12px;font-size:12.5px;font-weight:700;text-align:center;margin-bottom:12px;}
  /* HOME / ABOUT / HOW-TO */
  .home-hero{position:relative;border-radius:0 0 26px 26px;overflow:hidden;min-height:418px;display:flex;align-items:flex-end;}
  .home-hero .hh-bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center 28%;}
  .home-hero .hh-in{position:relative;width:100%;text-align:center;color:#fff;padding:24px 18px 22px;background:linear-gradient(to top,rgba(6,30,22,.92) 8%,rgba(6,30,22,.6) 45%,rgba(6,30,22,0));}
  .home-hero .hh-kicker{font-size:11px;font-weight:800;letter-spacing:3px;text-transform:uppercase;color:#ffd9a8;}
  .home-hero .hh-title{font-family:'Archivo Narrow',sans-serif;font-size:40px;font-weight:900;letter-spacing:-1px;line-height:.98;margin-top:4px;text-shadow:0 2px 14px rgba(0,0,0,.55);}
  .home-hero .hh-title b{color:var(--orange);}
  .home-hero .hh-meta{font-size:12.5px;color:rgba(255,255,255,.95);margin-top:9px;display:flex;gap:7px;align-items:center;justify-content:center;flex-wrap:wrap;font-weight:600;text-shadow:0 1px 6px rgba(0,0,0,.5);}
  .home-menu{padding:0 16px 16px;display:flex;flex-direction:column;gap:11px;position:relative;z-index:2;}
  .home-upnext{padding:14px 16px 2px;position:relative;z-index:2;}
  .upnext-lbl{font-size:11px;font-weight:800;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);margin-bottom:9px;}
  .upnext-card{background:var(--surface);border:1.5px solid var(--line);border-radius:18px;padding:14px 16px;cursor:pointer;box-shadow:var(--card-shadow);}
  .upnext-card:active{transform:scale(.99);}
  .upnext-tag{display:inline-flex;align-items:center;gap:6px;font-family:'Oswald',sans-serif;font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--fb-org);margin-bottom:10px;}
  .upnext-tag .dot{width:7px;height:7px;border-radius:50%;background:var(--fb-red);animation:pulse-live 1.4s infinite;}
  .upnext-score{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;}
  .upnext-team{display:flex;flex-direction:column;align-items:center;gap:6px;text-align:center;}
  .upnext-team .cr{font-size:28px;}
  .upnext-team .nm{font-family:'Archivo Narrow',sans-serif;font-size:13px;font-weight:700;text-transform:uppercase;line-height:1.2;}
  .upnext-ctr{text-align:center;}
  .upnext-vs{font-family:'Oswald',sans-serif;font-size:24px;font-weight:700;color:var(--muted);letter-spacing:.06em;}
  .upnext-sc{font-family:'Oswald',sans-serif;font-size:38px;font-weight:700;line-height:1;}
  .upnext-clock{font-size:12px;font-weight:700;color:var(--orange);margin-top:4px;}
  .upnext-time{font-size:12px;color:var(--muted);margin-top:4px;}
  .upnext-cta{margin-top:12px;text-align:center;}
  .upnext-cta button{background:var(--green);color:#fff;border:none;border-radius:9999px;padding:10px 24px;font-family:'Inter',sans-serif;font-size:13px;font-weight:700;cursor:pointer;}
  .upnext-empty{color:var(--muted);font-size:13px;text-align:center;padding:12px 0;}
  .upnext-logo-img{width:40px;height:40px;border-radius:50%;object-fit:cover;border:2px solid var(--line);}
  .upnext-logo-svg{width:40px;height:40px;flex-shrink:0;}
  .upnext-logo-svg svg{width:40px;height:40px;display:block;}
  .upnext-logo-emoji{font-size:32px;line-height:1;display:block;}
  .upnext-team{display:flex;flex-direction:column;align-items:center;gap:5px;text-align:center;min-width:0;}
  /* overwrite old .cr size since we now use img/emoji variants */
  .upnext-team .cr{font-size:32px;}
  /* stats card */
  .home-stats-card{background:var(--surface);border:1.5px solid var(--line);border-radius:18px;padding:14px 16px;margin-bottom:6px;box-shadow:var(--card-shadow);}
  .home-stat-lbl{font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
  .home-stat-row{display:flex;align-items:center;gap:12px;padding:6px 0;}
  .home-stat-logo{width:32px;height:32px;border-radius:50%;object-fit:cover;border:1.5px solid var(--line);flex-shrink:0;}
  .home-stat-logo-svg{width:32px;height:32px;flex-shrink:0;}
  .home-stat-logo-svg svg{width:32px;height:32px;display:block;}
  .home-stat-info{flex:1;min-width:0;}
  .home-stat-name{display:block;font-size:13.5px;font-weight:700;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .home-stat-sub{display:block;font-size:11px;color:var(--muted);margin-top:1px;}
  .home-stat-val{font-family:'Oswald',sans-serif;font-size:17px;font-weight:700;color:var(--fb-gld);flex-shrink:0;}
  .home-stat-divider{height:1px;background:var(--line);margin:8px 0;}
  .menu-card{display:flex;align-items:center;gap:14px;background:var(--surface);border:1.5px solid var(--line);border-radius:16px;padding:16px;cursor:pointer;text-align:left;width:100%;transition:transform .08s;}
  .menu-card:active{transform:scale(.985);}
  .menu-card .mc-ico{flex-shrink:0;width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;background:rgba(34,168,94,.12);color:var(--green-d);}
  .menu-card.accent .mc-ico{background:rgba(244,123,32,.14);color:var(--orange-d);}
  .menu-card .mc-tt{flex:1;}
  .menu-card .mc-tt b{display:block;font-size:16px;font-weight:700;color:var(--ink);}
  .menu-card .mc-tt span{display:block;font-size:12.5px;color:var(--muted);margin-top:1px;}
  .menu-card .mc-arr{color:var(--muted);font-size:18px;}
  .page-head{display:flex;align-items:center;gap:10px;padding:16px 16px 6px;}
  #screen-about{position:relative;}
  .about-art{position:absolute;inset:0;z-index:0;pointer-events:none;color:var(--green);opacity:.05;overflow:hidden;}
  
  #screen-about .page-head, #screen-about .page-body{position:relative;z-index:1;}
  .page-back{width:38px;height:38px;border-radius:10px;border:1.5px solid var(--line);background:var(--surface);color:var(--ink);font-size:16px;cursor:pointer;flex-shrink:0;}
  .page-title{font-family:'Oswald',sans-serif;font-size:20px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--ink);}
  .page-body{padding:6px 16px 28px;}
  .info-card{background:var(--surface);border:1.5px solid var(--line);border-radius:16px;padding:16px;margin-bottom:14px;}
  .info-card h4{font-size:15px;font-weight:700;margin:0 0 6px;}
  .info-card p{font-size:14px;line-height:1.6;color:var(--ink);margin:0;white-space:pre-wrap;}
  .info-row{display:flex;gap:10px;font-size:13.5px;color:var(--ink);padding:7px 0;border-top:1px solid var(--line);}
  .info-row:first-of-type{border-top:none;}
  .info-row .ir-k{color:var(--muted);min-width:74px;font-weight:600;}
  .ht-venue-name{font-size:17px;font-weight:800;margin-bottom:2px;}
  .ht-venue-addr{font-size:13px;color:var(--muted);margin-bottom:10px;}
  .ht-photos{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin:10px 0;}
  .ht-photo{width:100%;height:110px;object-fit:cover;border-radius:12px;cursor:pointer;transition:opacity .15s;}
  .ht-photo:active{opacity:.8;}
  .ht-nophoto{background:var(--surface2);border-radius:12px;padding:20px;text-align:center;color:var(--muted);font-size:13px;margin:10px 0;}
  .ht-add-photo-btn{background:none;border:1.5px dashed var(--line);color:var(--green-d);font-size:13px;font-weight:700;padding:10px 16px;border-radius:12px;cursor:pointer;width:100%;margin-top:6px;}
  .ht-time-badge{display:inline-flex;align-items:center;gap:6px;background:#e7f5ec;color:var(--green-d);font-size:13px;font-weight:700;padding:6px 14px;border-radius:9999px;margin-bottom:10px;}
  .ht-list{padding:0;margin:0 0 12px;list-style:none;display:flex;flex-direction:column;gap:8px;}
  .ht-list li{display:flex;gap:10px;align-items:flex-start;}
  .ht-num{min-width:24px;height:24px;border-radius:50%;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0;margin-top:1px;}
  .ht-list li span:last-child{font-size:13.5px;line-height:1.5;color:var(--ink);}
  .ht-note-p{font-size:13.5px;line-height:1.6;color:var(--ink);margin-bottom:12px;}
  .ht-card{padding-bottom:4px;}
  .venue-name{font-size:17px;font-weight:800;}
  .venue-addr{font-size:13px;color:var(--muted);margin-top:2px;}
  .mode-pills{display:flex;gap:7px;margin:14px 0 12px;flex-wrap:wrap;}
  .mode-pill{display:flex;align-items:center;gap:5px;font-size:12.5px;font-weight:700;padding:8px 12px;border-radius:10px;border:1.5px solid var(--line);background:var(--surface);color:var(--ink);cursor:pointer;}
  .mode-pill.on{background:var(--green);border-color:var(--green);color:#fff;}
  .map-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:8px;background:var(--green);color:#fff;border:none;border-radius:12px;padding:13px;font-family:'Inter';font-weight:700;font-size:14.5px;cursor:pointer;text-decoration:none;margin-top:12px;}
  .map-btn:active{background:var(--green-d);}
  .field textarea{width:100%;background:var(--surface2);border:1.5px solid var(--line);color:var(--ink);border-radius:10px;padding:11px;font-family:'Inter';font-size:14px;outline:none;resize:vertical;min-height:70px;}
  .field textarea:focus{border-color:var(--green);}
  /* AGENDA */
  .agenda{padding-top:8px;padding-bottom:4px;}
  .ag-group{font-family:'Inter',sans-serif;font-size:16px;font-weight:700;letter-spacing:-.01em;color:var(--ink);padding-bottom:10px;margin-bottom:4px;border-bottom:1px solid var(--line);}
  .ag-item{display:flex;gap:10px;}
  .ag-time{font-family:'Inter',sans-serif;width:64px;flex-shrink:0;font-size:10px;font-weight:700;color:var(--green-d);text-align:right;padding-top:2px;line-height:1.25;white-space:normal;letter-spacing:.02em;}
  .ag-rail{width:12px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;}
  .ag-rail .d{width:9px;height:9px;border-radius:50%;background:var(--green);margin-top:4px;flex-shrink:0;}
  .ag-rail .l{flex:1;width:2px;background:var(--line);margin-top:3px;min-height:14px;}
  .ag-body{flex:1;padding-bottom:16px;}
  .ag-title{font-family:'Inter',sans-serif;font-size:14px;font-weight:600;line-height:1.3;}
  .ag-note{font-size:12px;color:var(--muted);margin-top:2px;line-height:1.3;}
  .ag-edit-row{background:var(--surface2);border:1.5px solid var(--line);border-radius:12px;padding:12px;margin-bottom:10px;}
  .ag-edit-section{background:rgba(34,168,94,.07);border-color:var(--green);}
  .ag-edit-head{display:flex;align-items:center;justify-content:space-between;font-size:12px;font-weight:800;color:var(--muted);margin-bottom:8px;letter-spacing:.4px;}
  .ag-edit-btns button{background:var(--surface);border:1.5px solid var(--line);color:var(--ink);border-radius:7px;width:30px;height:28px;font-size:12px;cursor:pointer;margin-left:4px;}
  .ag-edit-btns button:disabled{opacity:.4;}
  .ag-edit-btns .ag-del{color:var(--red);border-color:var(--red);}
  .ag-inp{width:100%;background:var(--surface);border:1.5px solid var(--line);color:var(--ink);border-radius:9px;padding:10px 11px;font-family:'Inter';font-size:14px;outline:none;margin-bottom:7px;}
  .ag-inp:last-child{margin-bottom:0;}
  .ag-inp:focus{border-color:var(--green);}
  /* OUR TEAM — org chart */
  .tm-av,.tm-av-lg{border-radius:50%;overflow:hidden;flex-shrink:0;background:var(--surface2);display:flex;align-items:center;justify-content:center;}
  .tm-av{width:50px;height:50px;}
  .tm-av-lg{width:64px;height:64px;border:2px solid rgba(255,255,255,.5);}
  .tm-av img,.tm-av-lg img{width:100%;height:100%;object-fit:cover;}
  .tm-av-init{font-weight:800;font-size:17px;color:var(--muted);}
  .tm-av-init-lg{font-weight:800;font-size:22px;color:var(--muted);}
  .oc{display:flex;flex-direction:column;align-items:center;}
  .oc-top{width:100%;display:flex;justify-content:center;}
  .oc-head{display:flex;align-items:center;gap:14px;
    background:linear-gradient(135deg,#0d2b1a 0%,#0a1f35 100%);
    border:1px solid #1a6640;border-radius:16px;
    box-shadow:0 0 24px rgba(34,168,94,.18);
    padding:14px 18px;color:#fff;max-width:340px;width:100%;cursor:pointer;}
  .oc-head-info{flex:1;}
  .oc-head-tag{font-family:'Archivo Narrow',sans-serif;font-size:10px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:#63de8d;}
  .oc-head-nm{font-family:'Archivo Narrow',sans-serif;font-size:26px;font-weight:900;line-height:1.1;color:#fff;}
  .oc-head-rl{font-size:13px;color:#9fd9b6;margin-top:2px;}
  .oc-trunk{width:2px;height:24px;background:rgba(34,168,94,.35);}
  .oc-subtop{width:100%;display:flex;justify-content:center;}
  .oc-subhead{display:flex;align-items:center;gap:12px;
    background:#131a1c;
    border:1px solid rgba(34,168,94,.45);
    border-radius:14px;box-shadow:0 0 12px rgba(34,168,94,.12);
    padding:11px 16px;max-width:340px;width:100%;cursor:pointer;}
  .oc-subhead-info{flex:1;}
  .oc-subhead-nm{font-size:15px;font-weight:800;color:#e0e3e5;line-height:1.1;}
  .oc-subhead-rl{font-family:'Inter',sans-serif;font-size:11px;color:#63de8d;font-weight:600;margin-top:2px;}
  .oc-tree{width:100%;position:relative;padding-left:20px;}
  .oc-tree::before{content:"";position:absolute;left:7px;top:0;bottom:18px;width:2px;background:rgba(34,168,94,.3);}
  .oc-branch{position:relative;margin-bottom:16px;}
  .oc-branch::before{content:"";position:absolute;left:-13px;top:26px;width:13px;height:2px;background:rgba(34,168,94,.3);}
  .oc-dept{background:#131a1c;border:1px solid #1d2a2c;border-radius:16px;box-shadow:0 2px 10px rgba(0,0,0,.4);padding:14px;}
  .oc-dept-head{display:flex;align-items:center;gap:7px;font-family:'Archivo Narrow',sans-serif;font-size:14px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:#e0e3e5;margin-bottom:12px;}
  .oc-dept-ic{font-size:17px;}
  .oc-count{margin-left:auto;background:#1d2a2c;border-radius:9999px;padding:2px 10px;font-family:'Archivo Narrow',sans-serif;font-size:11px;font-weight:700;color:#63de8d;}
  .oc-row{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;}
  .oc-pocs{grid-template-columns:repeat(2,1fr);justify-content:center;margin-bottom:0;}
  .oc-link{width:2px;height:14px;background:rgba(34,168,94,.3);margin:0 auto;}
  .oc-sub{font-family:'Archivo Narrow',sans-serif;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#7a9a8a;margin:14px 0 8px;display:flex;align-items:center;gap:8px;}
  .oc-sub::after{content:"";flex:1;height:1px;background:#1d2a2c;}
  .oc-node{background:#1c2022;border:1px solid #263030;border-radius:10px;padding:12px 8px;display:flex;flex-direction:column;align-items:center;gap:5px;position:relative;transition:border-color .15s;}
  .oc-node[onclick]{cursor:pointer;}
  .oc-node[onclick]:hover{border-color:rgba(34,168,94,.5);}
  .oc-node.poc{border-color:#22a85e;border-width:1.5px;background:#0d1f16;padding-top:16px;}
  .oc-badge{position:absolute;top:-1px;left:50%;transform:translateX(-50%);background:#22a85e;color:#fff;font-family:'Archivo Narrow',sans-serif;font-size:8px;font-weight:700;letter-spacing:.12em;border-radius:0 0 8px 8px;padding:2px 9px;}
  .oc-nm{font-family:'Archivo Narrow',sans-serif;font-size:14px;font-weight:700;text-align:center;overflow-wrap:anywhere;line-height:1.15;text-transform:uppercase;color:#e0e3e5;}
  .oc-rl{font-size:10px;color:#7a9a8a;text-align:center;line-height:1.3;}
  /* manage list + edit sheet (reused) */
  .tm-row{display:flex;align-items:center;gap:12px;padding:10px 4px;border-bottom:1px solid var(--line);cursor:pointer;}
  .tm-row .tm-av{width:42px;height:42px;}
  .tm-row .tm-av-init{font-size:15px;}
  .tm-row-info{flex:1;min-width:0;}
  .tm-row-name{font-size:14.5px;font-weight:700;}
  .tm-row-sub{font-size:12px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .tm-row-arr{color:var(--muted);font-size:20px;}
  .tm-photo-edit{display:flex;flex-direction:column;align-items:center;gap:10px;margin-bottom:16px;}
  .tm-photo-edit .tm-av-lg{width:90px;height:90px;border:2.5px dashed var(--line);cursor:pointer;}
  .tm-photo-label{font-size:12.5px;color:var(--muted);}
  .num-hash{font-family:'Archivo Narrow';font-weight:800;color:var(--muted);font-size:15px;}
  .num-input{width:58px;text-align:center;background:var(--surface);border:1.5px solid var(--line);color:var(--ink);border-radius:8px;padding:9px 4px;font-family:'Archivo Narrow';font-weight:800;font-size:15px;outline:none;}
  .num-input:focus{border-color:var(--green);}
  .num-input.dup{border-color:var(--red);background:rgba(226,59,59,.10);color:var(--red);}
  .num-warn{color:var(--red);font-size:12.5px;font-weight:700;text-align:center;margin:2px 0 10px;min-height:17px;}
</style>
</head>

const PASSWORDS = { male: 'male2025', female: 'female2025' };
const ADMIN_USERS = { 'admin.m': 'male', 'admin.f': 'female' };   // username → tournament
let adminSession = null;
let managerSession = null;   // team name when signed in as that team's captain/manager

// Keep admin/manager signed in across page refreshes on this device (avoids
// re-login on every refresh, which also means fewer redundant cloud reads).
const SESSION_KEY = 'livescore_session';
function saveSession(){
  try{
    if(adminSession) localStorage.setItem(SESSION_KEY, JSON.stringify({role:'admin', value:adminSession}));
    else if(managerSession) localStorage.setItem(SESSION_KEY, JSON.stringify({role:'manager', value:managerSession}));
    else localStorage.removeItem(SESSION_KEY);
  }catch(e){}
}
function restoreSession(){
  try{
    const raw=localStorage.getItem(SESSION_KEY); if(!raw) return;
    const s=JSON.parse(raw);
    if(s.role==='admin' && PASSWORDS[s.value]!==undefined) adminSession=s.value;
    else if(s.role==='manager' && allTeams().includes(s.value)) managerSession=s.value;
  }catch(e){}
}

// ── Team manager credentials ────────────────────────────────────────────────
// Each team gets a username (slug) and a stable password derived from its name.
// Admins can view the full list under Admin → Team manager logins to hand out.
// Changing TEAM_SALT rotates every team password at once.
const TEAM_SALT = 'sportsday2026';
function allTeams(){ return [...data.male.groupA.teams, ...data.male.groupB.teams, ...data.female.group.teams]; }
function teamDivision(team){
  if([...data.male.groupA.teams, ...data.male.groupB.teams].includes(team)) return 'male';
  if(data.female.group.teams.includes(team)) return 'female';
  return null;
}
function teamUsername(team){ return team.toLowerCase().replace(/[^a-z0-9]+/g,'').slice(0,18); }
function teamPassword(team){
  let h = 2166136261 >>> 0; const s = TEAM_SALT + '|' + team.toLowerCase();
  for(let i=0;i<s.length;i++){ h = Math.imul(h ^ s.charCodeAt(i), 16777619) >>> 0; }
  const chars = 'abcdefghijkmnpqrstuvwxyz23456789'; let out = '';
  for(let i=0;i<6;i++){ h = Math.imul(h ^ (h>>>13), 16777619) >>> 0; out += chars[h % chars.length]; }
  return out;
}
function findTeamByUsername(u){ u=(u||'').toLowerCase().trim(); return allTeams().find(t=>teamUsername(t)===u)||null; }

// ── Permission helpers ──────────────────────────────────────────────────────
function isDivAdmin(m){ return adminSession === matchDivision(m.id); }
// Can the current user edit this team in this match at all? (admin of its division, or its manager)
function canEditTeamInMatch(m, team){
  if(team!==m.home && team!==m.away) return false;
  return isDivAdmin(m) || managerSession === team;
}
// Lineup (formation) edits: admins anytime; managers only before kickoff.
function canEditLineup(m, team){ return canEditTeamInMatch(m, team) && (isDivAdmin(m) || m.status === 'upcoming'); }
// Substitutions: admins anytime; managers only once the match is live.
function canSub(m, team){ return canEditTeamInMatch(m, team) && (isDivAdmin(m) || m.status === 'live'); }
function managerChip(team){ const w=team.split(/\s+/)[0].toUpperCase(); return w.length>9?w.slice(0,8)+'\u2026':w; }

// PERSISTENCE  —  local drive (localStorage) + web drive (JSON export/import)
// ═══════════════════════════════════════════
const STORAGE_KEY = 'livescore_sportsday2026_v4';

// Pull only the editable, per-match fields so structure stays code-controlled.
function serializeState() {
  const matches = {};
  eachMatch(m => {
    matches[m.id] = {
      status:m.status, time:m.time, no:m.no, field:m.field,
      homeScore:m.homeScore, awayScore:m.awayScore,
      home:m.home, away:m.away, events:m.events||[],
      clockElapsed:m.clockElapsed||0, clockStart:m.clockStart||null, clockRunning:!!m.clockRunning,
      lineup:m.lineup||null
    };
  });
  const order = {};
  namedMatchSets().forEach(s => { order[s.key] = s.arr.map(m => m.id); });
  const playerRosters = {};
  Object.keys(PLAYERS).forEach(t => { playerRosters[t] = PLAYERS[t].slice(); });
  return { savedAt: Date.now(), version: 4, matches, order, scheduleLog, playerNumbers: PLAYER_NUMBERS, playerRosters, eventInfo };
}

function saveData() {
  const state = serializeState();
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch (e) { /* storage full or blocked — silent */ }
  cloudPush(state);            // push the same state to the shared online store
  updateSaveState();
}

function applyState(state) {
  if (!state || !state.matches) return;
  eachMatch(m => {
    const s = state.matches[m.id];
    if (!s) return;
    m.status=s.status; m.time=s.time;
    if (s.no!==undefined) m.no=s.no;
    if (s.field!==undefined) m.field=s.field;
    m.homeScore=(s.homeScore===undefined?null:s.homeScore);
    m.awayScore=(s.awayScore===undefined?null:s.awayScore);
    if (s.home) m.home=s.home;
    if (s.away) m.away=s.away;
    m.events=s.events||[];
    m.clockElapsed=s.clockElapsed||0;
    m.clockStart=s.clockStart||null;
    m.clockRunning=!!s.clockRunning;
    if(s.lineup)m.lineup=s.lineup;
  });
  // Restore the saved display order per set (reorder arrays in place).
  if (state.order) {
    namedMatchSets().forEach(s => {
      const ord = state.order[s.key];
      if (!ord) return;
      const byId = {}; s.arr.forEach(m => byId[m.id] = m);
      const reordered = ord.map(id => byId[id]).filter(Boolean);
      s.arr.forEach(m => { if (!ord.includes(m.id)) reordered.push(m); }); // keep any new code-added matches
      if (reordered.length === s.arr.length) { s.arr.length = 0; reordered.forEach(m => s.arr.push(m)); }
    });
  }
  if (Array.isArray(state.scheduleLog)) scheduleLog = state.scheduleLog;
  if (state.playerNumbers && typeof state.playerNumbers === 'object') PLAYER_NUMBERS = state.playerNumbers;
  if (state.playerRosters && typeof state.playerRosters === 'object') {
    Object.entries(state.playerRosters).forEach(([t, arr]) => {
      if (PLAYERS[t] && Array.isArray(arr)) { PLAYERS[t].length = 0; arr.forEach(n => PLAYERS[t].push(n)); }
    });
  }
  if (state.eventInfo && typeof state.eventInfo === 'object') {
    eventInfo = Object.assign({}, eventInfo, state.eventInfo);   // merge so new fields keep defaults
  }
}

// Web drive: download a backup file the user saves to OneDrive / Google Drive.
function exportData() {
  const blob = new Blob([JSON.stringify(serializeState(), null, 2)], { type:'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const stamp = new Date().toISOString().slice(0,16).replace(/[:T]/g,'-');
  a.href = url; a.download = `sportsday2026-scores-${stamp}.json`;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
  showToast('Backup downloaded');
}

// Web drive: restore from a backup file.
function importData(input) {
  const file = input.files && input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const state = JSON.parse(reader.result);
      applyState(state);
      saveData();
      renderAll();
      if (document.getElementById('modal').classList.contains('open') && adminSession) openAdminMenu();
      showToast('Backup restored');
    } catch (e) { showToast('Error: invalid backup file'); }
  };
  reader.readAsText(file);
  input.value = '';
}

function updateSaveState() {
  const el = document.getElementById('save-state');
  if (!el) return;
  let raw; try { raw = JSON.parse(localStorage.getItem(STORAGE_KEY)); } catch(e){}
  const t = raw && raw.savedAt ? new Date(raw.savedAt) : null;
  const stamp = t ? `${String(t.getHours()).padStart(2,'0')}:${String(t.getMinutes()).padStart(2,'0')}:${String(t.getSeconds()).padStart(2,'0')}` : null;
  if (!cloudEnabled()) {
    el.innerHTML = stamp
      ? `Saved to this device only · <b>${stamp}</b><br><span style="color:var(--orange)">Cloud sync not set up — viewers won't see live updates.</span>`
      : 'Not saved yet';
    return;
  }
  const tag = cloudOnline
    ? `<b style="color:var(--green)">● Online</b> — synced to all devices`
    : `<b style="color:var(--orange)">● Offline</b> — saved locally, will sync when back online`;
  const errLine = (cloudError || rtError) ? `<br><span style="color:var(--red)">⚠ ${cloudError || rtError}</span>` : '';
  el.innerHTML = (stamp ? `${tag} · last save <b>${stamp}</b>` : tag) + errLine;
}

let fbApp = null, db = null, docRef = null, unsubscribeSnap = null;

// A per-device id so we can ignore the echo of our own writes coming back over the listener.
let DEVICE_ID;
try {

  if (!DEVICE_ID) { DEVICE_ID = 'dev_' + Math.random().toString(36).slice(2) + Date.now().toString(36); localStorage.setItem('livescore_device_id', DEVICE_ID); }

function cloudEnabled() {
  const c = FIREBASE_CONFIG;
  return !!(c.apiKey && c.projectId
    && !c.apiKey.startsWith('YOUR-') && !c.projectId.startsWith('YOUR-'));
}

function setCloudOnline(on) { cloudOnline = on; updateSaveState(); }

function initCloud() {
  if (!cloudEnabled()) { console.log('[cloud] Firebase config not filled in — running device-only'); return; }
  if (!window.firebase) {                       // CDN blocked / didn't load
    cloudError = 'Cloud library failed to load (check internet / ad-blockers).';
    console.error('[cloud] window.firebase is undefined — the CDN script did not load');
    updateSaveState();
    return;
  }
  try {
    fbApp = firebase.initializeApp(FIREBASE_CONFIG);
    db = firebase.firestore();
    try { db.settings({ ignoreUndefinedProperties: true }); } catch (e) {}   // knockout matches have no `no` field
    docRef = db.collection(FIRESTORE_DOC_PATH[0]).doc(FIRESTORE_DOC_PATH[1]);
    cloudReady = true;
    console.log('[cloud] Firebase initialized, attaching listener…');
    // onSnapshot fires immediately with current data (acts as the initial pull),
    // then again in real time whenever any device writes — no separate pull call needed.
    unsubscribeSnap = docRef.onSnapshot(
      snap => {
        rtError = '';
        if (!snap.exists) { setCloudOnline(true); return; }   // no doc yet — first save will create it
        const row = snap.data();
        if (!row || !row.data) { setCloudOnline(true); return; }
        if (row.updatedBy === DEVICE_ID) { cloudError = ''; setCloudOnline(true); return; }  // our own write echoing back
        console.log('[cloud] remote update received');
        applyRemoteState(row.data);
        showToast('Scores updated');
        cloudError = ''; setCloudOnline(true);
      },
      err => {
        rtError = 'Live updates off: ' + err.message + ' (check Firestore rules allow read/write).';
        console.error('[cloud] listener error', err);
        setCloudOnline(false);
      }
    );
    subscribeTeam();
  } catch (e) { cloudError = 'Init error: ' + e.message; cloudReady = false; console.error('[cloud]', e); updateSaveState(); }
}

function applyRemoteState(state) {
  applyingRemote = true;
  applyState(state);
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
  applyingRemote = false;
  renderAll();
  if (adminSession && document.getElementById('save-state')) updateSaveState();
}

// Firestore rejects undefined values; drop any undefined keys at every level.
function cleanForFirestore(v){
  if(Array.isArray(v)) return v.map(cleanForFirestore);
  if(v && typeof v==='object'){
    const out={};
    for(const k in v){ const cv=cleanForFirestore(v[k]); if(cv!==undefined) out[k]=cv; }
    return out;
  }
  return v;
}
async function cloudPush(state) {
  if (!cloudReady || applyingRemote) return;          // don't re-push state we just received
  try {
    await docRef.set({ data: cleanForFirestore(state), updatedBy: DEVICE_ID, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
    cloudError = ''; setCloudOnline(true);
  } catch (e) { cloudError = 'Save failed: ' + (e.message || e); console.error('[cloud] push', e); setCloudOnline(false); }
}

// LIVE CLOCK  —  counts up from kickoff, manual start/stop
// ═══════════════════════════════════════════
function clockSeconds(m) {
  let s = m.clockElapsed || 0;
  if (m.clockRunning && m.clockStart) s += (Date.now() - m.clockStart) / 1000;
  const cap = matchMaxMinute(m) * 60;
  return Math.min(s, cap);
}
function fmtClock(s) {
  const mm = Math.floor(s / 60), ss = Math.floor(s % 60);
  return String(mm).padStart(2,'0') + ':' + String(ss).padStart(2,'0');
}
function startClock(id) {
  const m = getMatchById(id); if (!m) return;
  if (!m.clockRunning) {
    m.clockRunning = true;
    m.clockStart = Date.now();
    if (m.status === 'upcoming') m.status = 'live';
  }
  saveData(); renderAll(); if (adminSession) showEditMatch(id);
}
function pauseClock(id) {
  const m = getMatchById(id); if (!m) return;
  m.clockElapsed = clockSeconds(m);
  m.clockRunning = false; m.clockStart = null;
  saveData(); renderAll(); if (adminSession) showEditMatch(id);
}
function resetClock(id) {
  const m = getMatchById(id); if (!m) return;
  m.clockElapsed = 0; m.clockRunning = false; m.clockStart = null;
  saveData(); renderAll(); if (adminSession) showEditMatch(id);
}
// Tick running clocks once per second without a full re-render.
setInterval(() => {
  eachMatch(m => {
    if (!m.clockRunning) return;
    const secs = clockSeconds(m);
    const card = document.getElementById('clock-' + m.id);
    if (card) card.textContent = fmtClock(secs);
    const modal = document.getElementById('modalclock-' + m.id);
    if (modal) modal.textContent = fmtClock(secs);
  });
}, 1000);

// ---------- STANDINGS (compute unchanged) ----------
function computeStandings(teams, matches){
  const table={};
  teams.forEach(t=>{ table[t]={played:0,w:0,d:0,l:0,gf:0,ga:0,pts:0}; });
  matches.forEach(m=>{
    const hasScore=m.homeScore!==null&&m.awayScore!==null;
    if((m.status==='ft'||m.status==='live')||(hasScore&&m.status==='upcoming')){
      const h=m.home,a=m.away,hs=m.homeScore??0,as=m.awayScore??0;
      if(!table[h]||!table[a])return;
      if(m.status==='ft'||m.status==='live'){
        table[h].played++;table[a].played++;
        if(hs>as){table[h].w++;table[h].pts+=3;table[a].l++;}
        else if(hs<as){table[a].w++;table[a].pts+=3;table[h].l++;}
        else{table[h].d++;table[h].pts++;table[a].d++;table[a].pts++;}
      }
      table[h].gf+=hs;table[h].ga+=as;table[a].gf+=as;table[a].ga+=hs;
    }
  });
  return Object.entries(table).map(([name,s])=>({name,...s,gd:s.gf-s.ga}))
    .sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf);
}
function computeScorers(allMatches){
  const sc={};
  allMatches.forEach(m=>{(m.events||[]).forEach(e=>{
    if(e.type!=='goal')return;
    const name=(e.player||'').trim(); if(!name)return;
    let team;
    if(e.team==='home')team=m.home; else if(e.team==='away')team=m.away;
    else{const pl=name.toLowerCase();const aw=(PLAYERS[m.away]||[]).map(p=>p.toLowerCase());const ho=(PLAYERS[m.home]||[]).map(p=>p.toLowerCase());team=(aw.includes(pl)&&!ho.includes(pl))?m.away:m.home;}
    const key=team+'|'+name;
    if(!sc[key])sc[key]={name,team,goals:0};
    sc[key].goals++;
  });});
  return Object.values(sc).sort((a,b)=>b.goals-a.goals);
}

function renderHowTo(){

  const modes=[['car','\uD83D\uDE97','Car / Grab'],['bike','\uD83C\uDFCD','Motorbike'],['bts','\uD83D\uDE86','BTS + walk'],['walk','\uD83D\uDEB6','Walk']];
  const key='mode'+howToMode.charAt(0).toUpperCase()+howToMode.slice(1);
  const cur=eventInfo[key]||{time:'',note:''};

  // Venue photos grid
  const photos = eventInfo.venuePhotos || [];
  const photoGrid = photos.length
    ? `<div class="ht-photos">${photos.map((src,i)=>`<img class="ht-photo" src="${src}" alt="Venue photo" onclick="openPhotoFull('${i}')">`).join('')}</div>`
    : `<div class="ht-nophoto">📷 No venue photos yet${adminSession?` — <a onclick="openHowToPhotoUpload()" style="color:var(--green-d);cursor:pointer">Add photos</a>`:''}</div>`;

  // Parse note into numbered/point list
  function formatNote(text){
    if(!text) return '';
    const lines = text.split('\n').map(l=>l.trim()).filter(Boolean);
    if(lines.length<=1) return `<p class="ht-note-p">${escHtml(text)}</p>`;
    const items = lines.map((l,i)=>`<li><span class="ht-num">${i+1}</span><span>${escHtml(l)}</span></li>`).join('');
    return `<ol class="ht-list">${items}</ol>`;
  }

  el.innerHTML=`
    <div class="info-card ht-card">
      <div class="ht-venue-name">${escHtml(eventInfo.venueName||'Venue')}</div>
      <div class="ht-venue-addr">📍 ${escHtml(eventInfo.venueAddress||'')}</div>
      ${photoGrid}
      ${adminSession?`<button class="ht-add-photo-btn" onclick="openHowToPhotoUpload()">📷 Manage photos</button>`:''}
    </div>
    <div class="info-card">
      <div class="mode-pills">${modes.map(([k,ic,lb])=>`<button class="mode-pill ${k===howToMode?'on':''}" onclick="setHowToMode('${k}')"><span>${ic}</span>${lb}</button>`).join('')}</div>
      ${cur.time?`<div class="ht-time-badge">⏱ ${escHtml(cur.time)}</div>`:''}
      ${formatNote(cur.note)}
      <a class="map-btn" href="${mapsUrl(howToMode)}" target="_blank" rel="noopener"><span>🧭</span> Open in Maps</a>
    </div>
    ${eventInfo.parking?`<div class="info-card"><h4>🅿️ Parking &amp; drop-off</h4>${formatNote(eventInfo.parking)}</div>`:''}
    ${eventInfo.contact?`<div class="info-card"><h4>📞 Event contact</h4><p>${escHtml(eventInfo.contact)}</p></div>`:''}
  `;
}
function openPhotoFull(idx){
  const photos=eventInfo.venuePhotos||[];
  let cur=parseInt(idx)||0;
  function render(){
    const src=photos[cur]||'';
    const html=`<div style="text-align:center">
      <img src="${src}" style="max-width:100%;max-height:70vh;border-radius:12px;margin-bottom:12px">
      <div style="display:flex;gap:8px;justify-content:center;margin-bottom:10px">
        <button class="btn-secondary" style="flex:1" ${cur===0?'disabled':''} onclick="(function(){document.querySelector('.pf-cur').textContent='Refreshing...';})();openPhotoFull(${cur-1})">&#9664; Prev</button>
        <span class="pf-cur" style="padding:10px;color:var(--muted);font-size:13px">${cur+1} / ${photos.length}</span>
        <button class="btn-secondary" style="flex:1" ${cur>=photos.length-1?'disabled':''} onclick="openPhotoFull(${cur+1})">Next &#9654;</button>
      </div>
      ${adminSession?`<button class="btn-secondary" style="color:var(--red);border-color:var(--red)" onclick="removeVenuePhoto(${cur})">🗑 Remove this photo</button>`:''}
      <button class="btn-secondary" onclick="closeModal()">Close</button>
    </div>`;
    openSheet(`Venue photo ${cur+1}`, html);
  }
  render();
}
function removeVenuePhoto(idx){
  if(!confirm('Remove this photo?')) return;
  const photos=(eventInfo.venuePhotos||[]).slice();
  photos.splice(idx,1);
  eventInfo=Object.assign({},eventInfo,{venuePhotos:photos});
  saveData(); renderHowTo(); closeModal(); showToast('Photo removed');
}
function openHowToPhotoUpload(){
  openSheet('📷 Venue photos',
    `<div class="save-state" style="text-align:left;margin:0 0 12px">Upload photos of the venue — entrance, parking, landmark. Tap any photo on the How-to-go page to view full size.</div>
     <div class="field"><label>Select photo (JPEG / PNG)</label>
       <input type="file" accept="image/*" id="ht-photo-file" style="font-size:14px" onchange="previewHowToPhoto(this)">
     </div>
     <div id="ht-photo-preview" style="margin-bottom:8px"></div>
     <button class="btn-primary" id="ht-photo-upload-btn" style="display:none" onclick="confirmHowToPhoto()">Upload photo</button>
     <button class="btn-secondary" onclick="goHowTo()">&#8592; Back</button>`);
}
function previewHowToPhoto(input){
  const file=input.files[0]; if(!file) return;
  if(file.size>5*1024*1024){showToast('Photo too large (max 5 MB)'); return;}
  const r=new FileReader();
  r.onload=function(e){
    const prev=document.getElementById('ht-photo-preview');
    if(prev) prev.innerHTML=`<img src="${e.target.result}" style="max-width:100%;border-radius:10px;margin-top:8px">`;
    const btn=document.getElementById('ht-photo-upload-btn');
    if(btn){ btn.style.display='block'; btn._src=e.target.result; }
  };
  r.readAsDataURL(file);
}
function confirmHowToPhoto(){
  const btn=document.getElementById('ht-photo-upload-btn');
  const src=btn&&btn._src; if(!src){showToast('No photo selected'); return;}
  // Compress: draw to canvas at max 1200px
  const img=new Image(); img.onload=function(){
    const MAX=1200; let w=img.width,h=img.height;
    if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}
    const c=document.createElement('canvas'); c.width=w; c.height=h;
    c.getContext('2d').drawImage(img,0,0,w,h);
    const compressed=c.toDataURL('image/jpeg',0.78);
    const photos=(eventInfo.venuePhotos||[]).slice();
    photos.push(compressed);
    eventInfo=Object.assign({},eventInfo,{venuePhotos:photos});
    saveData(); showToast('Photo added ('+photos.length+' total)'); goHowTo();
  };
  img.src=src;
}
