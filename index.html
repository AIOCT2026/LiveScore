// ═══════════════════════════════════════════
// LINEUP  (formation pitch + bench + paired subs)
// ═══════════════════════════════════════════
function starterCount(m){ const mt=(m.field||'').match(/(\d+)\s*v/i); return mt?parseInt(mt[1]):7; }
function ensureLineup(m){
  const n=starterCount(m);
  if(!m.lineup) m.lineup={};
  ['home','away'].forEach(side=>{
    const team=side==='home'?m.home:m.away;
    const roster=(PLAYERS[team]||[]);
    const rosterSet=new Set(roster);
    const L=m.lineup[side];
    if(!L || !Array.isArray(L.starters) || !Array.isArray(L.bench)){
      m.lineup[side]={starters:roster.slice(0,n),bench:roster.slice(n)};   // fresh
      return;
    }
    let starters=L.starters.slice(), bench=L.bench.slice();
    // Roster players not currently placed anywhere (e.g. added players, or players
    // whose name changed in the roster) — used to refill stale/empty slots in order.
    const placed=new Set([...starters,...bench].filter(x=>rosterSet.has(x)));
    const unplaced=roster.filter(p=>!placed.has(p));
    let ui=0;
    const fix=arr=>arr.map(x=> rosterSet.has(x) ? x : (ui<unplaced.length?unplaced[ui++]:null)).filter(x=>x!=null);
    starters=fix(starters); bench=fix(bench);
    while(ui<unplaced.length) bench.push(unplaced[ui++]);   // append any leftovers
    const seen=new Set();
    const dedupe=a=>a.filter(x=>(rosterSet.has(x)&&!seen.has(x)) ? (seen.add(x),true) : false);
    starters=dedupe(starters); bench=dedupe(bench);
    while(starters.length<n && bench.length) starters.push(bench.shift());   // fill up to format
    while(starters.length>n) bench.unshift(starters.pop());                  // trim extras to bench
    m.lineup[side]={starters,bench};
  });
}
function shortName(n){ const p=String(n||'').trim().split(/\s+/); return p.length>=2 ? p[0][0]+'. '+p[p.length-1] : (n||''); }
function shortInit(n){ const p=String(n||'').trim().split(/\s+/); return (p[0]?p[0][0]:'')+(p.length>=2?p[p.length-1][0]:''); }
function formationRows(n){
  if(n<=0)return[]; if(n===7)return[1,3,2,1]; if(n===6)return[1,2,2,1]; if(n===5)return[1,2,2];
  const rest=n-1, per=Math.max(1,Math.ceil(rest/3)), rows=[1]; let r=rest;
  while(r>0){ const t=Math.min(per,r); rows.push(t); r-=t; } return rows;
}
function sliceRows(arr,counts){ const out=[]; let i=0; counts.forEach(c=>{ out.push(arr.slice(i,i+c)); i+=c; }); if(i<arr.length)out.push(arr.slice(i)); return out; }
function playerBadges(m,side,name){
  let goals=0,yellow=false,red=false,subOff=false,subOn=false;
  (m.events||[]).forEach(e=>{ if(e.team!==side||e.player!==name)return;
    if(e.type==='goal')goals++; else if(e.type==='yellow')yellow=true; else if(e.type==='red')red=true;
    else if(e.type==='sub_off')subOff=true; else if(e.type==='sub_on')subOn=true; });
  return {goals,yellow,red,subOff,subOn};
}
function playerToken(m,team,name,side){
  const num=jerseyNo(team,name); const b=playerBadges(m,side,name);
  const card=b.red?'<span class="pt-card red"></span>':b.yellow?'<span class="pt-card yel"></span>':'';
  const sub=b.subOff?'<span class="pt-sub off">\u25BE</span>':'';
  const goal=b.goals?`<span class="pt-goal">\u26BD${b.goals>1?'\u00D7'+b.goals:''}</span>`:'';
  return `<div class="ptoken"><div class="pt-shirt ${side} ${b.subOff?'off':''}">${num||''}${card}${sub}</div><div class="pt-name">${goal}${shortName(name)}</div></div>`;
}
function renderHalf(m,side){
  const team=side==='home'?m.home:m.away; const L=m.lineup[side];
  let rows=sliceRows(L.starters, formationRows(L.starters.length));
  if(side==='away')rows=rows.slice().reverse();
  return `<div class="phalf ${side}">${rows.map(r=>`<div class="prow">${r.map(p=>playerToken(m,team,p,side)).join('')}</div>`).join('')}</div>`;
}
function renderBenchCol(m,side){
  const team=side==='home'?m.home:m.away; const L=m.lineup[side];
  const items=L.bench.length ? L.bench.map(p=>{
    const b=playerBadges(m,side,p);
    const status=b.subOn?'<span class="bon">\u25B2</span>':b.red?'<span class="pt-card red" style="position:static"></span>':b.yellow?'<span class="pt-card yel" style="position:static"></span>':'';
    return `<div class="bitem"><div class="bava">${shortInit(p)}</div><div class="binfo"><div class="bname">${p}</div><div class="bnum">#${jerseyNo(team,p)}</div></div>${status}</div>`;
  }).join('') : '<div class="bench-empty">No bench players</div>';
  return `<div class="bcol ${side}"><div class="bteam">${getLogo(team)}<span>${team}</span></div>${items}</div>`;
}
function renderLineup(m){
  ensureLineup(m);
  const n=starterCount(m);
  const lineupBtns=[], subBtns=[];
  ['home','away'].forEach(side=>{
    const team=side==='home'?m.home:m.away;
    if(canEditLineup(m,team)) lineupBtns.push(`<button onclick="openLineupEditor('${side}')">\u270E Lineup \u00B7 ${team}</button>`);
    if(canSub(m,team))        subBtns.push(`<button onclick="openSubSheet('${side}')">\u21C4 Sub \u00B7 ${team}</button>`);
  });
  const tools = (lineupBtns.length?`<div class="lu-tools">${lineupBtns.join('')}</div>`:'')
              + (subBtns.length?`<div class="sub-bar">${subBtns.join('')}</div>`:'');
  // Manager of a team in this match, after kickoff: show why lineup editing is gone.
  const myTeamHere = managerSession===m.home || managerSession===m.away;
  const lock = (managerSession && myTeamHere && m.status!=='upcoming')
    ? `<div class="lu-lock">\u26A0 Match started \u2014 starting lineup is locked. Substitutions only.</div>` : '';
  return `<div class="pitch"><div class="pbox top"></div><div class="pbox bot"></div>${renderHalf(m,'home')}${renderHalf(m,'away')}</div>
    <div class="lineup-note">${escHtml(m.field || (n + ' v ' + n))}</div>
    <div class="bench-wrap">${tools}${lock}<div class="bench-head">Substitutes</div>
      <div class="bench-cols">${renderBenchCol(m,'home')}${renderBenchCol(m,'away')}</div></div>`;
}

// ---- manual lineup editor (pre-match setup, no events logged) ----
function slotLabels(n){
  const rows=formationRows(n), labels=[];
  rows.forEach((c,ri)=>{ let lab; if(ri===0)lab='GK'; else if(ri===rows.length-1)lab='FWD'; else if(rows.length>=4&&ri===1)lab='DEF'; else lab='MID'; for(let k=0;k<c;k++)labels.push(lab); });
  return labels;
}
function openLineupEditor(side){
  const m=getMatchById(openMatchId); if(!m)return; ensureLineup(m);
  const team=side==='home'?m.home:m.away;
  if(!canEditLineup(m,team)){ showToast(m.status!=='upcoming'?'Lineup is locked once the match starts':'Not allowed'); return; }
  window._luSide=side;
  window._luTeam=side==='home'?m.home:m.away;
  window._lu={ starters:m.lineup[side].starters.slice(), bench:m.lineup[side].bench.slice() };
  renderLineupEditor();
}
function renderLineupEditor(){
  const team=window._luTeam, L=window._lu;
  const roster=PLAYERS[team]||[];
  const labels=slotLabels(L.starters.length);
  const slots=L.starters.map((p,i)=>{
    const opts=roster.map(n=>`<option value="${n}"${n===p?' selected':''}>${jerseyNo(team,n)} \u00B7 ${n}</option>`).join('');
    return `<div class="lu-slot"><span class="lu-pos">${labels[i]||''}</span><select onchange="lineupSlotChange(${i},this.value)">${opts}</select></div>`;
  }).join('');
  const benchTxt=L.bench.length?L.bench.map(p=>`<b>${p}</b>`).join(', '):'<i>none</i>';
  openSheet('\u270E Edit lineup \u2014 '+team,
    `<div class="save-state" style="text-align:left;margin:0 0 12px">Set the starting ${L.starters.length}. Picking a bench player for a slot swaps them in. This is setup only \u2014 it does not log a substitution.</div>
     ${slots}
     <div class="lu-bench">Bench: ${benchTxt}</div>
     <button class="btn-primary" style="margin-top:16px" onclick="saveLineupEditor()">Save lineup</button>
     <button class="btn-secondary" onclick="closeModal()">Cancel</button>`);
}
function lineupSlotChange(i,P){
  const L=window._lu; const Q=L.starters[i]; if(P===Q){renderLineupEditor();return;}
  const j=L.starters.indexOf(P);
  if(j>=0){ L.starters[j]=Q; L.starters[i]=P; }
  else { const bi=L.bench.indexOf(P); L.starters[i]=P; if(bi>=0)L.bench[bi]=Q; else L.bench.push(Q); }
  renderLineupEditor();
}
function saveLineupEditor(){
  const m=getMatchById(openMatchId); if(!m)return;
  const team=window._luSide==='home'?m.home:m.away;
  if(!canEditLineup(m,team)){ showToast('Lineup is locked'); closeModal(); return; }
  m.lineup[window._luSide]={ starters:window._lu.starters.slice(), bench:window._lu.bench.slice() };
  saveData(); closeModal(); renderAll(); showToast('Lineup saved');
}

// ═══════════════════════════════════════════
// PLAYER EDITOR  (admin menu · names + numbers + add/remove · changes cascade)
// One screen per team: edit a name, edit a number, ✕ to remove, + to add.
// Names and numbers are each kept unique within the team. Renames and removals
// cascade to the lineup, goals, cards and subs so nothing is left orphaned.
// ═══════════════════════════════════════════
function teamsForDivision(div){
  return div==='female'
    ? data.female.group.teams.slice()
    : [...data.male.groupA.teams, ...data.male.groupB.teams];
}
function openPlayerEditorPick(){
  window._peTeams = teamsForDivision(adminSession);
  const btns = window._peTeams.map((t,i) =>
    `<button class="btn-secondary" style="text-align:left" onclick="openPlayerEditor(${i})">${getLogo(t)} &nbsp;${escHtml(t)}</button>`
  ).join('');
  openSheet('\u270E Edit players',
    `<div class="save-state" style="text-align:left;margin:0 0 12px">Pick a team to edit its players \u2014 names, numbers, add or remove. Changes update the lineup, goals, cards and subs automatically.</div>
     ${btns}
     <button class="btn-secondary" onclick="openAdminMenu()">\u2190 Back</button>`);
}
function openPlayerEditor(i){
  const team = window._peTeams[i]; if(!team) return;
  openTeamPlayerEditor(team, 'openPlayerEditorPick');
}
function openTeamPlayerEditor(team, back){
  if(managerSession && managerSession!==team){ showToast('You can only edit your own team'); return; }
  window._peTeam = team;
  window._peBack = back || 'openPlayerEditorPick';
  window._peRows = (PLAYERS[team]||[]).map(p => ({ name:p, number:String(jerseyNo(team,p)), origName:p }));
  renderPlayerEditor();
}
function peNextNumber(){
  const used = new Set(window._peRows.map(r => parseInt(r.number,10)).filter(n => !isNaN(n)));
  for(let n=1;n<=99;n++) if(!used.has(n)) return String(n);
  return '';
}
function peSyncFromDOM(){
  window._peRows.forEach((r,i) => {
    const ni=document.getElementById('pe-name-'+i), nu=document.getElementById('pe-num-'+i);
    if(ni) r.name=ni.value;
    if(nu) r.number=nu.value;
  });
}
function renderPlayerEditor(){
  const team=window._peTeam, rows=window._peRows;
  const html=rows.map((r,i)=>`<div class="num-row">
      <input class="pname-input" id="pe-name-${i}" value="${escHtml(r.name)}" oninput="peEdit()" autocomplete="off" placeholder="Player name">
      <span class="num-hash">#</span>
      <input class="num-input" id="pe-num-${i}" inputmode="numeric" maxlength="3" value="${escHtml(r.number)}" oninput="peEdit()">
      <button class="pe-del" onclick="peDelete(${i})" title="Remove player">\u2715</button>
    </div>`).join('');
  openSheet('\u270E '+team,
    `<div class="save-state" style="text-align:left;margin:0 0 12px">Edit names and numbers. \u2715 removes a player, + adds one. Names and numbers must each be unique on the team.</div>
     ${html}
     <button class="pe-add" onclick="peAdd()">+ Add player</button>
     <div class="num-warn" id="pe-warn"></div>
     <button class="btn-primary" id="pe-save" onclick="savePlayerEditor()">Save</button>
     <button class="btn-secondary" onclick="${(window._peBack||'openPlayerEditorPick')}()">\u2190 Back</button>`);
  peValidate();
}
function peEdit(){ peSyncFromDOM(); peValidate(); }
function peAdd(){
  peSyncFromDOM();
  window._peRows.push({ name:'', number:peNextNumber(), origName:null });
  renderPlayerEditor();
  const last=document.getElementById('pe-name-'+(window._peRows.length-1)); if(last) last.focus();
}
function peDelete(i){ peSyncFromDOM(); window._peRows.splice(i,1); renderPlayerEditor(); }
function peValidate(){
  const rows=window._peRows;
  const nameInputs=rows.map((_,i)=>document.getElementById('pe-name-'+i)).filter(Boolean);
  const numInputs =rows.map((_,i)=>document.getElementById('pe-num-'+i)).filter(Boolean);
  const nNorm=v=>v.trim().toLowerCase();
  const nameCounts={}, numCounts={};
  nameInputs.forEach(el=>{ const v=nNorm(el.value); if(v) nameCounts[v]=(nameCounts[v]||0)+1; });
  numInputs.forEach(el=>{ const v=el.value.trim(); if(v) numCounts[v]=(numCounts[v]||0)+1; });
  let err='';
  nameInputs.forEach(el=>{
    const blank=el.value.trim()==='';
    const dup=!blank && nameCounts[nNorm(el.value)]>1;
    el.classList.toggle('dup', blank||dup);
    if(blank&&!err) err='Every player needs a name.';
    else if(dup&&!err) err='Two players have the same name.';
  });
  numInputs.forEach(el=>{
    const v=el.value.trim(); const num=parseInt(v,10);
    const blank=v==='';
    const bad=!blank && (isNaN(num)||num<1||num>99);
    const dup=!blank && numCounts[v]>1;
    el.classList.toggle('dup', blank||bad||dup);
    if(blank&&!err) err='Every player needs a number.';
    else if(bad&&!err) err='Numbers must be between 1 and 99.';
    else if(dup&&!err) err='Two players have the same number.';
  });
  if(!rows.length && !err) err='Add at least one player.';
  const warn=document.getElementById('pe-warn'); if(warn) warn.textContent=err;
  const save=document.getElementById('pe-save'); if(save){ save.disabled=!!err; save.style.opacity=err?'.5':'1'; }
  return err||null;
}
function savePlayerEditor(){
  peSyncFromDOM();
  if(managerSession && managerSession!==window._peTeam){ showToast('You can only edit your own team'); return; }
  if(peValidate()){ showToast('Fix the highlighted fields first'); return; }
  const team=window._peTeam, rows=window._peRows;
  const origRoster=(PLAYERS[team]||[]).slice();
  const renameMapping={};
  rows.forEach(r=>{ const nn=r.name.trim(); if(r.origName && nn!==r.origName) renameMapping[r.origName]=nn; });
  const finalRoster=rows.map(r=>r.name.trim());
  const survivingOrig=new Set(rows.map(r=>r.origName).filter(Boolean));
  const removedNames=origRoster.filter(n=>!survivingOrig.has(n));
  const numbersMap={}; rows.forEach(r=>{ numbersMap[r.name.trim()]=parseInt(r.number,10); });
  applyRosterEdit(team, renameMapping, removedNames, finalRoster, numbersMap);
  saveData(); closeModal(); renderAll(); showToast('Players saved');
}
// Rename map (old→new), removed list, final roster, and explicit numbers — applied
// so the lineup, goals, cards and subs all stay consistent.
function applyRosterEdit(team, renameMapping, removedNames, finalRoster, numbersMap){
  // 1. cascade renames through events + lineups (single pass; safe for swaps)
  if(renameMapping && Object.keys(renameMapping).length){
    eachMatch(m=>{
      const sides=[]; if(m.home===team)sides.push('home'); if(m.away===team)sides.push('away');
      if(!sides.length) return;
      (m.events||[]).forEach(e=>{ if(sides.includes(e.team) && e.player && renameMapping[e.player]) e.player=renameMapping[e.player]; });
      if(m.lineup) sides.forEach(side=>{
        const L=m.lineup[side]; if(!L)return;
        ['starters','bench'].forEach(k=>{ if(Array.isArray(L[k])) L[k]=L[k].map(x=>renameMapping[x]||x); });
      });
    });
  }
  // 2. set the roster + explicit numbers
  PLAYERS[team].length=0; finalRoster.forEach(n=>PLAYERS[team].push(n));
  PLAYER_NUMBERS[team]=numbersMap;
  // 3. removals: drop the player's events (then recompute) — names already renamed above
  const removeSet=new Set(removedNames);
  // 4. reconcile every lineup for this team to only contain current roster
  const rosterSet=new Set(finalRoster);
  eachMatch(m=>{
    const sides=[]; if(m.home===team)sides.push('home'); if(m.away===team)sides.push('away');
    if(!sides.length) return;
    if(removeSet.size && m.events && m.events.length){
      m.events=m.events.filter(e=>!(sides.includes(e.team) && removeSet.has(e.player)));
      recomputeScore(m);
    }
    if(m.lineup) sides.forEach(side=>{
      const L=m.lineup[side]; if(!L)return;
      ['starters','bench'].forEach(k=>{ if(Array.isArray(L[k])) L[k]=L[k].filter(x=>rosterSet.has(x)); });
    });
  });
}

function setMatchView(v){ matchView=v; if(openMatchId)renderMatchScreen(openMatchId); }


// ---- paired substitution ----
function openSubSheet(side){
  const m=getMatchById(openMatchId); if(!m)return; ensureLineup(m);
  const team=side==='home'?m.home:m.away; const L=m.lineup[side];
  if(!canSub(m,team)){ showToast('Substitutions open once the match is live'); return; }
  if(!L.bench.length){ showToast('No bench players to bring on'); return; }
  const max=matchMaxMinute(m); const def=Math.min(Math.floor(clockSeconds(m)/60),max);
  openSheet(`\u21C4 Substitution \u2014 ${team}`,
    `<div class="field"><label>Player OUT (on pitch)</label><select id="sub-out">${L.starters.map(p=>`<option value="${p}">${jerseyNo(team,p)} \u00B7 ${p}</option>`).join('')}</select></div>
     <div class="field"><label>Player IN (from bench)</label><select id="sub-in">${L.bench.map(p=>`<option value="${p}">${jerseyNo(team,p)} \u00B7 ${p}</option>`).join('')}</select></div>
     <div class="field"><label>Minute (0\u2013${max})</label><select id="sub-min">${minuteOptions(max,def)}</select></div>
     <div class="save-state" style="text-align:left;margin:0 0 12px">Out and in are recorded together, so the team stays at ${starterCount(m)} players.</div>
     <button class="btn-primary" onclick="confirmSub('${side}')">Confirm substitution</button>
     <button class="btn-secondary" onclick="closeModal()">Cancel</button>`);
}
function confirmSub(side){
  const m=getMatchById(openMatchId); if(!m)return; ensureLineup(m);
  const out=document.getElementById('sub-out').value, inp=document.getElementById('sub-in').value, minute=document.getElementById('sub-min').value;
  if(!out||!inp){ showToast('Choose both players'); return; }
  if(out===inp){ showToast('Pick two different players'); return; }
  const L=m.lineup[side]; const oi=L.starters.indexOf(out), bi=L.bench.indexOf(inp);
  if(oi<0||bi<0){ showToast('Lineup changed \u2014 reopen'); return; }
  L.starters[oi]=inp; L.bench[bi]=out;
  const pair='sub'+Date.now();
  m.events=m.events||[];
  m.events.push({team:side,type:'sub_off',player:out,minute,pair});
  m.events.push({team:side,type:'sub_on', player:inp,minute,pair});
  if(m.status==='upcoming')m.status='live';
  saveData(); closeModal(); renderAll(); showToast(`${shortName(out)} \u2193  ${shortName(inp)} \u2191`);
}

function renderAll(){
  updateAdminChip();
  renderHomeMeta();
  renderAbout();
  renderHowTo();
  renderListScreen();
  if(openMatchId) renderMatchScreen(openMatchId);
}

loadData();      // 1. instant load from this device
restoreSession(); // 1b. stay signed in across refreshes
renderAll();     // 2. paint immediately
initCloud();     // 3. then sync with the shared cloud store (newest wins) + go live
</script>
